<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Glow Survival+</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #090b14;
    touch-action: none;
    user-select: none;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    z-index: 10;
}

#score {
    font-size: 30px;
    font-weight: bold;
}

#combo {
    font-size: 20px;
    color: #ffe600;
    margin-top: 5px;
}

#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    display: none;
    z-index: 20;
}

#gameOver h1 {
    font-size: 60px;
    margin: 0;
}

#finalScore {
    font-size: 28px;
    margin-top: 10px;
}

button {
    margin-top: 20px;
    padding: 16px 32px;
    border: none;
    border-radius: 16px;
    background: #00e5ff;
    color: black;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="combo">x1</div>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <div id="finalScore">Score: 0</div>
    <button onclick="restartGame()">PLAY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const scoreText = document.getElementById("score");
const comboText = document.getElementById("combo");
const gameOverScreen = document.getElementById("gameOver");
const finalScoreText = document.getElementById("finalScore");

let touchX = canvas.width / 2;
let touchY = canvas.height / 2;

let player;
let enemies = [];
let gems = [];
let particles = [];

let score = 0;
let combo = 1;
let running = false;

let spawnTimeout;
let lastTime = 0;

document.addEventListener("mousemove", e => {
    touchX = e.clientX;
    touchY = e.clientY;
});

document.addEventListener("touchmove", e => {
    e.preventDefault();

    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
}, { passive: false });

class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = 22;
    }

    update() {
        this.x += (touchX - this.x) * 0.12;
        this.y += (touchY - this.y) * 0.12;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);

        ctx.fillStyle = "#00e5ff";
        ctx.shadowBlur = 25;
        ctx.shadowColor = "#00e5ff";

        ctx.fill();
    }
}

class Enemy {
    constructor() {

        this.radius = Math.random() * 20 + 16;

        const side = Math.floor(Math.random() * 4);

        if (side === 0) {
            this.x = -50;
            this.y = Math.random() * canvas.height;
        }

        if (side === 1) {
            this.x = canvas.width + 50;
            this.y = Math.random() * canvas.height;
        }

        if (side === 2) {
            this.x = Math.random() * canvas.width;
            this.y = -50;
        }

        if (side === 3) {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 50;
        }

        this.speed = Math.random() * 2 + 1.5;

        this.color =
        `hsl(${Math.random() * 360},100%,60%)`;
    }

    update() {

        const angle =
        Math.atan2(player.y - this.y,
                   player.x - this.x);

        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
    }

    draw() {
        ctx.beginPath();

        ctx.arc(this.x, this.y,
        this.radius, 0, Math.PI * 2);

        ctx.fillStyle = this.color;

        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;

        ctx.fill();
    }
}

class Gem {
    constructor() {

        this.radius = 12;

        this.x =
        Math.random() * (canvas.width - 100) + 50;

        this.y =
        Math.random() * (canvas.height - 100) + 50;
    }

    draw() {

        ctx.beginPath();

        ctx.arc(this.x, this.y,
        this.radius, 0, Math.PI * 2);

        ctx.fillStyle = "#ffe600";

        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffe600";

        ctx.fill();
    }
}

class Particle {
    constructor(x, y, color) {

        this.x = x;
        this.y = y;

        this.size = Math.random() * 5 + 2;

        this.speedX = (Math.random() - 0.5) * 8;
        this.speedY = (Math.random() - 0.5) * 8;

        this.life = 40;

        this.color = color;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        this.life--;
    }

    draw() {

        ctx.globalAlpha = this.life / 40;

        ctx.beginPath();

        ctx.arc(this.x, this.y,
        this.size, 0, Math.PI * 2);

        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

function createExplosion(x, y, color) {

    for (let i = 0; i < 15; i++) {

        particles.push(
            new Particle(x, y, color)
        );
    }
}

function spawnEnemies() {

    if (!running) return;

    enemies.push(new Enemy());

    const delay =
    Math.max(250, 1200 - score * 2);

    spawnTimeout =
    setTimeout(spawnEnemies, delay);
}

function updateCombo() {

    if (score > 300) {
        combo = 10;
        comboText.innerText = "MEGA COMBO x10";
    }

    else if (score > 200) {
        combo = 5;
        comboText.innerText = "x5";
    }

    else if (score > 100) {
        combo = 2;
        comboText.innerText = "x2";
    }

    else {
        combo = 1;
        comboText.innerText = "x1";
    }
}

function animate(timestamp) {

    if (!running) return;

    requestAnimationFrame(animate);

    const delta = timestamp - lastTime;
    lastTime = timestamp;

    ctx.fillStyle = "rgba(9,11,20,0.25)";
    ctx.fillRect(0, 0,
    canvas.width, canvas.height);

    player.update();
    player.draw();

    gems.forEach((gem, gemIndex) => {

        gem.draw();

        const dist =
        Math.hypot(player.x - gem.x,
                   player.y - gem.y);

        if (dist < player.radius + gem.radius) {

            score += 10 * combo;

            createExplosion(
                gem.x,
                gem.y,
                "#ffe600"
            );

            gems.splice(gemIndex, 1);

            gems.push(new Gem());

            updateCombo();
        }
    });

    enemies.forEach((enemy, enemyIndex) => {

        enemy.update();
        enemy.draw();

        const dist =
        Math.hypot(player.x - enemy.x,
                   player.y - enemy.y);

        if (dist <
            player.radius + enemy.radius) {

            endGame();
        }
    });

    particles.forEach((particle, index) => {

        particle.update();
        particle.draw();

        if (particle.life <= 0) {
            particles.splice(index, 1);
        }
    });

    score += delta * 0.01;

    scoreText.innerText =
    "Score: " + Math.floor(score);
}

function startGame() {

    score = 0;
    combo = 1;

    enemies = [];
    gems = [];
    particles = [];

    player = new Player();

    gems.push(new Gem());

    running = true;

    gameOverScreen.style.display = "none";

    spawnEnemies();

    requestAnimationFrame(animate);
}

function endGame() {

    running = false;

    clearTimeout(spawnTimeout);

    finalScoreText.innerText =
    "Score: " + Math.floor(score);

    gameOverScreen.style.display = "block";

    canvas.style.transform = "translate(10px,0)";

    setTimeout(() => {
        canvas.style.transform =
        "translate(0,0)";
    }, 80);
}

function restartGame() {
    startGame();
}

window.addEventListener("resize", () => {

    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

startGame();
</script>

</body>
</html>

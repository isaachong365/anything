<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glow Survival</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #0a0a12;
    touch-action: none;
    font-family: Arial;
}

canvas {
    display: block;
}

#score {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 28px;
    font-weight: bold;
}

#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    display: none;
}

button {
    padding: 16px 32px;
    border: none;
    border-radius: 15px;
    font-size: 24px;
    margin-top: 20px;
    background: #00e5ff;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="gameOver">
    <h1>Game Over</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const scoreText = document.getElementById("score");
const gameOverScreen = document.getElementById("gameOver");

let touchX = canvas.width / 2;
let touchY = canvas.height / 2;

document.addEventListener("touchmove", e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener("mousemove", e => {
    touchX = e.clientX;
    touchY = e.clientY;
});

class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = 22;
    }

    update() {
        this.x += (touchX - this.x) * 0.15;
        this.y += (touchY - this.y) * 0.15;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#00e5ff";
        ctx.shadowBlur = 25;
        ctx.shadowColor = "#00e5ff";
        ctx.fill();
    }
}

class Enemy {
    constructor() {
        this.radius = Math.random() * 25 + 15;

        let side = Math.floor(Math.random() * 4);

        if (side === 0) {
            this.x = -50;
            this.y = Math.random() * canvas.height;
        } else if (side === 1) {
            this.x = canvas.width + 50;
            this.y = Math.random() * canvas.height;
        } else if (side === 2) {
            this.x = Math.random() * canvas.width;
            this.y = -50;
        } else {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 50;
        }

        this.speed = Math.random() * 2 + 1;
        this.color = `hsl(${Math.random() * 360},100%,60%)`;
    }

    update(player) {
        let angle = Math.atan2(player.y - this.y, player.x - this.x);

        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
    }
}

class Gem {
    constructor() {
        this.radius = 12;
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffe600";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffe600";
        ctx.fill();
    }
}

let player;
let enemies;
let gem;
let score;
let running;

function startGame() {
    player = new Player();
    enemies = [];
    gem = new Gem();
    score = 0;
    running = true;

    gameOverScreen.style.display = "none";

    spawnEnemies();

    animate();
}

function spawnEnemies() {
    if (!running) return;

    enemies.push(new Enemy());

    let delay = Math.max(300, 1200 - score * 2);

    setTimeout(spawnEnemies, delay);
}

function animate() {
    if (!running) return;

    requestAnimationFrame(animate);

    ctx.fillStyle = "rgba(10,10,18,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    player.update();
    player.draw();

    gem.draw();

    let gemDist = Math.hypot(player.x - gem.x, player.y - gem.y);

    if (gemDist < player.radius + gem.radius) {
        score += 10;
        gem = new Gem();
    }

    enemies.forEach(enemy => {
        enemy.update(player);
        enemy.draw();

        let dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);

        if (dist < player.radius + enemy.radius) {
            endGame();
        }
    });

    score++;
    scoreText.innerText = "Score: " + score;
}

function endGame() {
    running = false;
    gameOverScreen.style.display = "block";
}

function restartGame() {
    startGame();
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
    canvas.style.transform = "translate(5px, 0)";
setTimeout(() => {
  canvas.style.transform = "translate(0, 0)";
}, 50);

startGame();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Glow Survival (Clean)</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#050816;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    font-size:16px;
    line-height:1.5;
}

#upgradeMenu, #gameOver{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.8);
    color:white;
    z-index:20;
}

.card{
    background:#101828;
    border:2px solid #00e5ff;
    padding:15px;
    margin:10px;
    cursor:pointer;
    border-radius:10px;
    min-width:120px;
    text-align:center;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>
<div id="xp">XP: 0/100</div>
<div id="wave">Wave: 1</div>
<div id="hp">HP: 100</div>
</div>

<div id="upgradeMenu"></div>

<div id="gameOver">
<h1>GAME OVER</h1>
<button onclick="location.reload()">Restart</button>
</div>

<script>
// =====================
// CANVAS
// =====================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// =====================
// INPUT
// =====================
const keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// =====================
// GAME STATE
// =====================
let bullets = [];
let enemies = [];
let gems = [];

let score = 0;
let wave = 1;
let running = true;

// =====================
// PLAYER
// =====================
class Player{
    constructor(){
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.r = 18;
        this.speed = 5;

        this.hp = 100;
        this.damage = 20;

        this.xp = 0;
        this.nextXP = 100;
        this.level = 1;

        this.lastShot = 0;
        this.fireRate = 300;
    }

    update(){
        let dx = 0, dy = 0;

        if(keys["w"]) dy--;
        if(keys["s"]) dy++;
        if(keys["a"]) dx--;
        if(keys["d"]) dx++;

        const len = Math.hypot(dx,dy) || 1;

        this.x += (dx/len)*this.speed;
        this.y += (dy/len)*this.speed;

        this.x = Math.max(this.r, Math.min(canvas.width-this.r,this.x));
        this.y = Math.max(this.r, Math.min(canvas.height-this.r,this.y));

        if(Date.now() - this.lastShot > this.fireRate){
            this.shoot();
            this.lastShot = Date.now();
        }
    }

    shoot(){
        const e = enemies[0];
        if(!e) return;

        const a = Math.atan2(e.y-this.y, e.x-this.x);
        bullets.push(new Bullet(this.x,this.y,a,this.damage));
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="#00e5ff";
        ctx.fill();
    }

    gainXP(x){
        this.xp += x;

        if(this.xp >= this.nextXP){
            this.xp -= this.nextXP;
            this.level++;
            this.nextXP += 50;
            openUpgrade();
        }
    }
}

// =====================
// BULLET
// =====================
class Bullet{
    constructor(x,y,a,d){
        this.x=x;
        this.y=y;
        this.a=a;
        this.d=d;
        this.s=10;
        this.r=5;
    }

    update(){
        this.x += Math.cos(this.a)*this.s;
        this.y += Math.sin(this.a)*this.s;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    }
}

// =====================
// ENEMY
// =====================
class Enemy{
    constructor(){
        const side = Math.floor(Math.random()*4);

        if(side===0){this.x=-40; this.y=Math.random()*canvas.height;}
        if(side===1){this.x=canvas.width+40; this.y=Math.random()*canvas.height;}
        if(side===2){this.x=Math.random()*canvas.width; this.y=-40;}
        if(side===3){this.x=Math.random()*canvas.width; this.y=canvas.height+40;}

        this.r = 18;
        this.hp = 40 + wave*5;
        this.speed = 1.5 + wave*0.05;
    }

    update(){
        const a = Math.atan2(player.y-this.y, player.x-this.x);
        this.x += Math.cos(a)*this.speed;
        this.y += Math.sin(a)*this.speed;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.fill();
    }
}

// =====================
// GEM
// =====================
class Gem{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.r=6;
    }

    update(){
        const dx = player.x-this.x;
        const dy = player.y-this.y;

        this.x += dx*0.02;
        this.y += dy*0.02;

        if(Math.hypot(dx,dy)<20){
            player.gainXP(20);
            score += 10;
            return true;
        }
        return false;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.fill();
    }
}

// =====================
// SYSTEMS
// =====================
function spawnEnemy(){
    if(!running) return;
    enemies.push(new Enemy());
    setTimeout(spawnEnemy, Math.max(300, 1200-wave*20));
}

function openUpgrade(){
    running=false;

    const menu = document.getElementById("upgradeMenu");
    menu.innerHTML="";
    menu.style.display="flex";

    const upgrades = [
        ()=>player.damage+=5,
        ()=>player.speed+=0.5,
        ()=>player.hp+=20,
        ()=>player.fireRate=Math.max(80,player.fireRate-30)
    ];

    for(let i=0;i<3;i++){
        const u = upgrades[Math.floor(Math.random()*upgrades.length)];

        const c = document.createElement("div");
        c.className="card";
        c.innerText="Upgrade";

        c.onclick = ()=>{
            u();
            menu.style.display="none";
            running=true;
            loop();
        };

        menu.appendChild(c);
    }
}

// =====================
// INIT
// =====================
const player = new Player();
spawnEnemy();

// =====================
// LOOP
// =====================
function loop(){
    if(!running) return;

    requestAnimationFrame(loop);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    player.update();
    player.draw();

    // bullets
    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.update();
        b.draw();

        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
            continue;
        }

        for(let j=enemies.length-1;j>=0;j--){
            let e=enemies[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
                e.hp -= b.d;
                bullets.splice(i,1);

                if(e.hp<=0){
                    enemies.splice(j,1);
                    gems.push(new Gem(e.x,e.y));
                    score += 20;
                }
                break;
            }
        }
    }

    // enemies
    for(const e of enemies){
        e.update();
        e.draw();

        if(Math.hypot(player.x-e.x,player.y-e.y)<e.r+player.r){
            player.hp -= 0.5;
        }
    }

    // gems
    for(let i=gems.length-1;i>=0;i--){
        if(gems[i].update()) gems.splice(i,1);
        else gems[i].draw();
    }

    // wave system
    wave = 1 + Math.floor(score/300);

    // UI
    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("level").innerText="Level: "+player.level;
    document.getElementById("xp").innerText=`XP: ${player.xp}/${player.nextXP}`;
    document.getElementById("wave").innerText="Wave: "+wave;
    document.getElementById("hp").innerText="HP: "+Math.floor(player.hp);

    if(player.hp<=0){
        running=false;
        document.getElementById("gameOver").style.display="flex";
    }
}

loop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>Glow Survival Complete</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
}

#ui div{
    margin:5px 0;
}

#upgradeMenu{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    z-index:20;
}

.card{
    width:220px;
    padding:20px;
    margin:10px;
    border-radius:14px;
    background:#101828;
    border:2px solid #00e5ff;
    color:white;
    cursor:pointer;
    text-align:center;
}

.card:hover{
    transform:scale(1.05);
}

#gameOver{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.8);
    color:white;
    z-index:30;
}

button{
    padding:16px 30px;
    font-size:22px;
    border:none;
    border-radius:14px;
    background:#00e5ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
    <div id="xp">XP: 0 / 100</div>
    <div id="wave">Wave: 1</div>
    <div id="health">HP: 100</div>
    <div id="weapon">Weapon: Blaster</div>
</div>

<div id="upgradeMenu"></div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");
const xpText = document.getElementById("xp");
const waveText = document.getElementById("wave");
const healthText = document.getElementById("health");
const weaponText = document.getElementById("weapon");

const upgradeMenu = document.getElementById("upgradeMenu");
const gameOverScreen = document.getElementById("gameOver");

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.key === " "){
        dash();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

let enemies = [];
let bullets = [];
let particles = [];
let gems = [];
let enemyBullets = [];

let score = 0;
let wave = 1;
let running = true;

let shake = 0;

class Player{

    constructor(){

        this.x = canvas.width/2;
        this.y = canvas.height/2;

        this.radius = 20;

        this.speed = 5;

        this.hp = 100;

        this.level = 1;

        this.xp = 0;
        this.nextXP = 100;

        this.weapon = "blaster";

        this.fireRate = 250;

        this.lastShot = 0;

        this.damage = 20;
    }

    update(delta){

        let dx=0;
        let dy=0;

        if(keys["w"] || keys["arrowup"]) dy--;
        if(keys["s"] || keys["arrowdown"]) dy++;
        if(keys["a"] || keys["arrowleft"]) dx--;
        if(keys["d"] || keys["arrowright"]) dx++;

        const len = Math.hypot(dx,dy);

        if(len){
            dx/=len;
            dy/=len;
        }

        this.x += dx * this.speed * delta * 0.06;
        this.y += dy * this.speed * delta * 0.06;

        this.x = Math.max(this.radius,
            Math.min(canvas.width-this.radius,this.x));

        this.y = Math.max(this.radius,
            Math.min(canvas.height-this.radius,this.y));

        if(Date.now() - this.lastShot > this.fireRate){

            this.shoot();

            this.lastShot = Date.now();
        }
    }

    shoot(){

        const target = getNearestEnemy();

        if(!target) return;

        const angle = Math.atan2(
            target.y - this.y,
            target.x - this.x
        );

        if(this.weapon === "blaster"){

            bullets.push(
                new Bullet(
                    this.x,
                    this.y,
                    angle,
                    this.damage,
                    "#ffffff"
                )
            );
        }

        if(this.weapon === "shotgun"){

            for(let i=-2;i<=2;i++){

                bullets.push(
                    new Bullet(
                        this.x,
                        this.y,
                        angle + i*0.15,
                        this.damage*0.7,
                        "#ffe600"
                    )
                );
            }
        }

        if(this.weapon === "laser"){

            bullets.push(
                new Bullet(
                    this.x,
                    this.y,
                    angle,
                    this.damage*2,
                    "#ff00ff",
                    18
                )
            );
        }
    }

    gainXP(amount){

        this.xp += amount;

        if(this.xp >= this.nextXP){

            this.level++;

            this.xp = 0;

            this.nextXP += 50;

            openUpgradeMenu();
        }
    }

    draw(){

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle="#00e5ff";

        ctx.shadowBlur=30;
        ctx.shadowColor="#00e5ff";

        ctx.fill();
    }
}

class Bullet{

    constructor(x,y,angle,damage,color,size=6){

        this.x=x;
        this.y=y;

        this.angle=angle;

        this.speed=12;

        this.damage=damage;

        this.radius=size;

        this.color=color;
    }

    update(delta){

        this.x += Math.cos(this.angle)
        * this.speed * delta * 0.06;

        this.y += Math.sin(this.angle)
        * this.speed * delta * 0.06;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle=this.color;

        ctx.shadowBlur=20;
        ctx.shadowColor=this.color;

        ctx.fill();
    }
}

class Enemy{

    constructor(type="normal"){

        this.type=type;

        const side=Math.floor(Math.random()*4);

        if(side===0){
            this.x=-50;
            this.y=Math.random()*canvas.height;
        }

        if(side===1){
            this.x=canvas.width+50;
            this.y=Math.random()*canvas.height;
        }

        if(side===2){
            this.x=Math.random()*canvas.width;
            this.y=-50;
        }

        if(side===3){
            this.x=Math.random()*canvas.width;
            this.y=canvas.height+50;
        }

        this.radius=20;
        this.speed=2;
        this.hp=50;
        this.color="red";

        if(type==="fast"){
            this.speed=5;
            this.radius=12;
            this.hp=20;
            this.color="#ffe600";
        }

        if(type==="tank"){
            this.speed=1;
            this.radius=40;
            this.hp=200;
            this.color="#8b5cf6";
        }

        if(type==="shooter"){
            this.speed=1.5;
            this.radius=24;
            this.hp=70;
            this.color="#00ff99";

            this.lastShot=0;
        }

        if(type==="split"){
            this.speed=2.5;
            this.radius=30;
            this.hp=80;
            this.color="#ff6600";
        }

        if(type==="boss"){
            this.speed=1;
            this.radius=90;
            this.hp=1000;
            this.color="#ff00aa";

            this.lastShot=0;
        }
    }

    update(delta){

        const angle=Math.atan2(
            player.y-this.y,
            player.x-this.x
        );

        this.x += Math.cos(angle)
        * this.speed * delta * 0.06;

        this.y += Math.sin(angle)
        * this.speed * delta * 0.06;

        if(
            (this.type==="shooter" ||
             this.type==="boss")
            &&
            Date.now()-this.lastShot > 1200
        ){

            enemyBullets.push(
                new EnemyBullet(
                    this.x,
                    this.y,
                    angle
                )
            );

            this.lastShot=Date.now();
        }
    }

    draw(){

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle=this.color;

        ctx.shadowBlur=20;
        ctx.shadowColor=this.color;

        ctx.fill();
    }
}

class EnemyBullet{

    constructor(x,y,angle){

        this.x=x;
        this.y=y;

        this.angle=angle;

        this.radius=8;

        this.speed=6;
    }

    update(delta){

        this.x += Math.cos(this.angle)
        * this.speed * delta * 0.06;

        this.y += Math.sin(this.angle)
        * this.speed * delta * 0.06;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle="#ff4444";

        ctx.fill();
    }
}

class Gem{

    constructor(x,y){

        this.x=x;
        this.y=y;

        this.radius=8;
    }

    update(){

        const dx=player.x-this.x;
        const dy=player.y-this.y;

        this.x += dx * 0.02;
        this.y += dy * 0.02;

        const dist=Math.hypot(dx,dy);

        if(dist < player.radius + this.radius){

            player.gainXP(20);

            score += 10;

            gems.splice(gems.indexOf(this),1);
        }
    }

    draw(){

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle="#ffe600";

        ctx.shadowBlur=20;
        ctx.shadowColor="#ffe600";

        ctx.fill();
    }
}

class Particle{

    constructor(x,y,color){

        this.x=x;
        this.y=y;

        this.dx=(Math.random()-0.5)*10;
        this.dy=(Math.random()-0.5)*10;

        this.life=30;

        this.color=color;
    }

    update(){

        this.x+=this.dx;
        this.y+=this.dy;

        this.life--;
    }

    draw(){

        ctx.globalAlpha=this.life/30;

        ctx.fillStyle=this.color;

        ctx.fillRect(this.x,this.y,4,4);

        ctx.globalAlpha=1;
    }
}

function createExplosion(x,y,color){

    shake = 10;

    for(let i=0;i<20;i++){

        particles.push(
            new Particle(x,y,color)
        );
    }
}

function getNearestEnemy(){

    let nearest=null;
    let dist=Infinity;

    enemies.forEach(enemy=>{

        const d=Math.hypot(
            enemy.x-player.x,
            enemy.y-player.y
        );

        if(d<dist){

            dist=d;

            nearest=enemy;
        }
    });

    return nearest;
}

function dash(){

    let dx=0;
    let dy=0;

    if(keys["w"]) dy--;
    if(keys["s"]) dy++;
    if(keys["a"]) dx--;
    if(keys["d"]) dx++;

    player.x += dx * 120;
    player.y += dy * 120;

    createExplosion(
        player.x,
        player.y,
        "#00e5ff"
    );
}

function spawnEnemy(){

    if(!running) return;

    const rand=Math.random();

    let type="normal";

    if(rand<0.2) type="fast";
    else if(rand<0.35) type="tank";
    else if(rand<0.5) type="shooter";
    else if(rand<0.6) type="split";

    enemies.push(new Enemy(type));

    if(score > 2000 && Math.random()<0.03){

        enemies.push(new Enemy("boss"));
    }

    setTimeout(
        spawnEnemy,
        Math.max(250,1000-wave*40)
    );
}

spawnEnemy();

function openUpgradeMenu(){

    running=false;

    upgradeMenu.style.display="flex";

    upgradeMenu.innerHTML="";

    const upgrades=[

        {
            name:"Shotgun",
            effect:()=>{
                player.weapon="shotgun";
            }
        },

        {
            name:"Laser",
            effect:()=>{
                player.weapon="laser";
            }
        },

        {
            name:"Attack Speed",
            effect:()=>{
                player.fireRate -= 30;
            }
        },

        {
            name:"Damage",
            effect:()=>{
                player.damage += 10;
            }
        },

        {
            name:"Speed",
            effect:()=>{
                player.speed += 1;
            }
        },

        {
            name:"Heal",
            effect:()=>{
                player.hp += 30;
            }
        }
    ];

    const selected=[];

    while(selected.length<3){

        const random=
        upgrades[
            Math.floor(Math.random()*upgrades.length)
        ];

        if(!selected.includes(random)){

            selected.push(random);
        }
    }

    selected.forEach(up=>{

        const card=document.createElement("div");

        card.className="card";

        card.innerHTML=`
        <h2>${up.name}</h2>
        `;

        card.onclick=()=>{

            up.effect();

            weaponText.innerText =
            "Weapon: " + player.weapon;

            upgradeMenu.style.display="none";

            running=true;

            requestAnimationFrame(animate);
        };

        upgradeMenu.appendChild(card);
    });
}

const player = new Player();

let lastTime=0;

function animate(timestamp){

    if(!running) return;

    requestAnimationFrame(animate);

    const delta=timestamp-lastTime;

    lastTime=timestamp;

    ctx.save();

    if(shake>0){

        ctx.translate(
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );

        shake*=0.9;
    }

    ctx.fillStyle="rgba(5,8,22,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    player.update(delta);
    player.draw();

    bullets.forEach((bullet,bIndex)=>{

        bullet.update(delta);
        bullet.draw();

        enemies.forEach((enemy,eIndex)=>{

            const dist=Math.hypot(
                bullet.x-enemy.x,
                bullet.y-enemy.y
            );

            if(dist < bullet.radius + enemy.radius){

                enemy.hp -= bullet.damage;

                createExplosion(
                    bullet.x,
                    bullet.y,
                    enemy.color
                );

                bullets.splice(bIndex,1);

                if(enemy.hp<=0){

                    gems.push(
                        new Gem(enemy.x,enemy.y)
                    );

                    if(enemy.type==="split"){

                        enemies.push(
                            new Enemy("fast")
                        );

                        enemies.push(
                            new Enemy("fast")
                        );
                    }

                    enemies.splice(eIndex,1);

                    score += 20;
                }
            }
        });
    });

    enemyBullets.forEach((bullet,index)=>{

        bullet.update(delta);
        bullet.draw();

        const dist=Math.hypot(
            bullet.x-player.x,
            bullet.y-player.y
        );

        if(dist < bullet.radius + player.radius){

            player.hp -= 10;

            enemyBullets.splice(index,1);

            shake=15;
        }
    });

    enemies.forEach(enemy=>{

        enemy.update(delta);
        enemy.draw();

        const dist=Math.hypot(
            player.x-enemy.x,
            player.y-enemy.y
        );

        if(dist < player.radius + enemy.radius){

            player.hp -= 0.2;

            shake=5;
        }
    });

    gems.forEach(g=>{
        g.update();
        g.draw();
    });

    particles.forEach((p,index)=>{

        p.update();
        p.draw();

        if(p.life<=0){

            particles.splice(index,1);
        }
    });

    if(player.hp <= 0){

        running=false;

        gameOverScreen.style.display="flex";
    }

    wave = 1 + Math.floor(score / 400);

    scoreText.innerText =
    "Score: " + Math.floor(score);

    levelText.innerText =
    "Level: " + player.level;

    xpText.innerText =
    "XP: " + player.xp +
    " / " + player.nextXP;

    waveText.innerText =
    "Wave: " + wave;

    healthText.innerText =
    "HP: " + Math.floor(player.hp);

    ctx.restore();
}

animate(0);

window.addEventListener("resize",()=>{

    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

</script>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const scoreText = document.getElementById("score");
const waveText = document.getElementById("wave");
const healthText = document.getElementById("health");
const upgradeMenu = document.getElementById("upgrade");
const gameOverScreen = document.getElementById("gameOver");

let score = 0;
let wave = 1;
let running = true;

let enemies = [];
let bullets = [];
let particles = [];
let gems = [];

let shake = 0;

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.key === " "){
        dash();
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

class Player{
    constructor(){
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.radius = 20;
        this.speed = 5;
        this.hp = 100;

        this.fireRate = 300;
        this.lastShot = 0;

        this.damage = 20;

        this.magnet = 120;
    }

    update(delta){

        let dx = 0;
        let dy = 0;

        if(keys["w"] || keys["arrowup"]) dy--;
        if(keys["s"] || keys["arrowdown"]) dy++;
        if(keys["a"] || keys["arrowleft"]) dx--;
        if(keys["d"] || keys["arrowright"]) dx++;

        const len = Math.hypot(dx,dy);

        if(len){
            dx/=len;
            dy/=len;
        }

        this.x += dx * this.speed * delta * 0.06;
        this.y += dy * this.speed * delta * 0.06;

        this.x = Math.max(this.radius,
            Math.min(canvas.width-this.radius,this.x));

        this.y = Math.max(this.radius,
            Math.min(canvas.height-this.radius,this.y));

        if(Date.now() - this.lastShot > this.fireRate){
            this.shoot();
            this.lastShot = Date.now();
        }
    }

    shoot(){

        let nearest = null;
        let dist = Infinity;

        for(let enemy of enemies){

            const d = Math.hypot(
                enemy.x - this.x,
                enemy.y - this.y
            );

            if(d < dist){
                dist = d;
                nearest = enemy;
            }
        }

        if(!nearest) return;

        const angle = Math.atan2(
            nearest.y - this.y,
            nearest.x - this.x
        );

        bullets.push(
            new Bullet(
                this.x,
                this.y,
                angle,
                this.damage
            )
        );
    }

    draw(){

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle = "#00e5ff";
        ctx.shadowBlur = 30;
        ctx.shadowColor = "#00e5ff";
        ctx.fill();
    }
}

class Bullet{
    constructor(x,y,angle,damage){
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 12;
        this.radius = 6;
        this.damage = damage;
    }

    update(delta){
        this.x += Math.cos(this.angle)
        * this.speed * delta * 0.06;

        this.y += Math.sin(this.angle)
        * this.speed * delta * 0.06;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle = "#ffffff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffffff";
        ctx.fill();
    }
}

class Enemy{
    constructor(type="normal"){

        this.type = type;

        const side = Math.floor(Math.random()*4);

        if(side===0){
            this.x=-50;
            this.y=Math.random()*canvas.height;
        }

        if(side===1){
            this.x=canvas.width+50;
            this.y=Math.random()*canvas.height;
        }

        if(side===2){
            this.x=Math.random()*canvas.width;
            this.y=-50;
        }

        if(side===3){
            this.x=Math.random()*canvas.width;
            this.y=canvas.height+50;
        }

        this.radius = 20;
        this.speed = 2;
        this.hp = 40;
        this.color = "red";

        if(type==="fast"){
            this.speed = 5;
            this.radius = 12;
            this.hp = 20;
            this.color = "#ffe600";
        }

        if(type==="tank"){
            this.speed = 1;
            this.radius = 40;
            this.hp = 150;
            this.color = "#8b5cf6";
        }

        if(type==="boss"){
            this.speed = 1.5;
            this.radius = 80;
            this.hp = 800;
            this.color = "#ff00aa";
        }
    }

    update(delta){

        const angle = Math.atan2(
            player.y - this.y,
            player.x - this.x
        );

        this.x += Math.cos(angle)
        * this.speed * delta * 0.06;

        this.y += Math.sin(angle)
        * this.speed * delta * 0.06;
    }

    draw(){

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
    }
}

class Gem{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.radius=8;
    }

    update(){

        const dx = player.x - this.x;
        const dy = player.y - this.y;

        const dist = Math.hypot(dx,dy);

        if(dist < player.magnet){

            this.x += dx * 0.03;
            this.y += dy * 0.03;
        }

        if(dist < player.radius + this.radius){

            score += 10;

            if(score % 200 === 0){
                openUpgrade();
            }

            gems.splice(gems.indexOf(this),1);
        }
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

        ctx.fillStyle="#ffe600";
        ctx.shadowBlur=20;
        ctx.shadowColor="#ffe600";
        ctx.fill();
    }
}

class Particle{
    constructor(x,y,color){

        this.x=x;
        this.y=y;

        this.dx=(Math.random()-0.5)*8;
        this.dy=(Math.random()-0.5)*8;

        this.life=30;
        this.color=color;
    }

    update(){
        this.x+=this.dx;
        this.y+=this.dy;
        this.life--;
    }

    draw(){

        ctx.globalAlpha=this.life/30;

        ctx.fillStyle=this.color;
        ctx.fillRect(this.x,this.y,4,4);

        ctx.globalAlpha=1;
    }
}

function createExplosion(x,y,color){

    shake = 10;

    for(let i=0;i<20;i++){
        particles.push(
            new Particle(x,y,color)
        );
    }
}

const player = new Player();

function dash(){

    let dx=0;
    let dy=0;

    if(keys["w"]) dy--;
    if(keys["s"]) dy++;
    if(keys["a"]) dx--;
    if(keys["d"]) dx++;

    player.x += dx * 120;
    player.y += dy * 120;

    createExplosion(
        player.x,
        player.y,
        "#00e5ff"
    );
}

function spawnEnemy(){

    if(!running) return;

    const rand = Math.random();

    let type = "normal";

    if(rand < 0.2) type="fast";
    if(rand > 0.85) type="tank";

    enemies.push(new Enemy(type));

    if(score > 1000 && Math.random() < 0.05){
        enemies.push(new Enemy("boss"));
    }

    setTimeout(
        spawnEnemy,
        Math.max(250,1000-wave*50)
    );
}

spawnEnemy();

function openUpgrade(){

    running = false;

    upgradeMenu.style.display = "flex";

    upgradeMenu.innerHTML = "";

    const upgrades = [
        {
            name:"Attack Speed",
            effect:()=>{
                player.fireRate -= 40;
            }
        },

        {
            name:"Damage",
            effect:()=>{
                player.damage += 10;
            }
        },

        {
            name:"Speed",
            effect:()=>{
                player.speed += 1;
            }
        }
    ];

    upgrades.forEach(up=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
        <h2>${up.name}</h2>
        `;

        card.onclick = ()=>{

            up.effect();

            upgradeMenu.style.display="none";

            running = true;

            requestAnimationFrame(animate);
        };

        upgradeMenu.appendChild(card);
    });
}

let lastTime = 0;

function animate(timestamp){

    if(!running) return;

    requestAnimationFrame(animate);

    const delta = timestamp - lastTime;
    lastTime = timestamp;

    ctx.save();

    if(shake > 0){

        ctx.translate(
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );

        shake *= 0.9;
    }

    ctx.fillStyle = "rgba(7,11,20,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    player.update(delta);
    player.draw();

    bullets.forEach((bullet,bIndex)=>{

        bullet.update(delta);
        bullet.draw();

        enemies.forEach((enemy,eIndex)=>{

            const dist = Math.hypot(
                bullet.x - enemy.x,
                bullet.y - enemy.y
            );

            if(dist < bullet.radius + enemy.radius){

                enemy.hp -= bullet.damage;

                bullets.splice(bIndex,1);

                createExplosion(
                    bullet.x,
                    bullet.y,
                    enemy.color
                );

                if(enemy.hp <= 0){

                    gems.push(
                        new Gem(enemy.x,enemy.y)
                    );

                    enemies.splice(eIndex,1);

                    score += 20;
                }
            }
        });
    });

    enemies.forEach(enemy=>{

        enemy.update(delta);
        enemy.draw();

        const dist = Math.hypot(
            player.x - enemy.x,
            player.y - enemy.y
        );

        if(dist < player.radius + enemy.radius){

            player.hp -= 0.3;

            shake = 8;

            if(player.hp <= 0){
                gameOver();
            }
        }
    });

    gems.forEach(gem=>{
        gem.update();
        gem.draw();
    });

    particles.forEach((p,index)=>{

        p.update();
        p.draw();

        if(p.life <= 0){
            particles.splice(index,1);
        }
    });

    wave = 1 + Math.floor(score / 300);

    scoreText.innerText =
    "Score: " + Math.floor(score);

    waveText.innerText =
    "Wave: " + wave;

    healthText.innerText =
    "HP: " + Math.floor(player.hp);

    ctx.restore();
}

function gameOver(){

    running = false;

    gameOverScreen.style.display = "flex";
}

function restart(){

    location.reload();
}

animate(0);

window.addEventListener("resize",()=>{

    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

</script>

</body>

<style>

    margin: 0;

    user-select: none;

}

    position: absolute;

    font-size: 30px;

    font-size: 20px;

    margin-top: 5px;
}

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;

    font-size: 60px;
    margin: 0;
}

    font-size: 28px;

}

    margin-top: 20px;
    padding: 16px 32px;
    border: none;

    font-weight: bold;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="combo">x1</div>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>

    <div id="finalScore">
        Score: 0
    </div>

    <button onclick="restartGame()">
        PLAY AGAIN
    </button>
</div>

<canvas id="game"></canvas>

<script>
// =========================
// CANVAS
// =========================

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// UI
// =========================

const scoreText =
document.getElementById("score");

const comboText =
document.getElementById("combo");

const gameOverScreen =
document.getElementById("gameOver");

const finalScoreText =
document.getElementById("finalScore");

// =========================
// KEYBOARD
// =========================

const keys = {
    up: false,
    down: false,
    left: false,
    right: false
};

document.addEventListener("keydown", e => {

    if (e.key === "ArrowUp" || e.key === "w") {
        keys.up = true;
    }

    if (e.key === "ArrowDown" || e.key === "s") {
        keys.down = true;
    }

    if (e.key === "ArrowLeft" || e.key === "a") {
        keys.left = true;
    }

    if (e.key === "ArrowRight" || e.key === "d") {
        keys.right = true;
    }
});

document.addEventListener("keyup", e => {

    if (e.key === "ArrowUp" || e.key === "w") {
        keys.up = false;
    }

    if (e.key === "ArrowDown" || e.key === "s") {
        keys.down = false;
    }

    if (e.key === "ArrowLeft" || e.key === "a") {
        keys.left = false;
    }

    if (e.key === "ArrowRight" || e.key === "d") {
        keys.right = false;
    }
});

// =========================
// GAME VARIABLES
// =========================

let player;

let enemies = [];
let gems = [];
let particles = [];

let score = 0;
let combo = 1;

let running = false;

let spawnTimeout;
let lastTime = 0;

// =========================
// PLAYER
// =========================

class Player {

    constructor() {

        this.x = canvas.width / 2;
        this.y = canvas.height / 2;

        this.radius = 22;
        this.speed = 6;
    }

    update(delta) {

        const moveSpeed =
        this.speed * delta * 0.06;

        if (keys.up) {
            this.y -= moveSpeed;
        }

        if (keys.down) {
            this.y += moveSpeed;
        }

        if (keys.left) {
            this.x -= moveSpeed;
        }

        if (keys.right) {
            this.x += moveSpeed;
        }

        // SCREEN LIMITS

        if (this.x < this.radius) {
            this.x = this.radius;
        }

        if (this.x >
            canvas.width - this.radius) {

            this.x =
            canvas.width - this.radius;
        }

        if (this.y < this.radius) {
            this.y = this.radius;
        }

        if (this.y >
            canvas.height - this.radius) {

            this.y =
            canvas.height - this.radius;
        }
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#00e5ff";

        ctx.shadowBlur = 25;
        ctx.shadowColor = "#00e5ff";

        ctx.fill();
    }
}

// =========================
// ENEMY
// =========================

class Enemy {

    constructor() {

        this.radius =
        Math.random() * 20 + 16;

        const side =
        Math.floor(Math.random() * 4);

        if (side === 0) {
            this.x = -50;
            this.y =
            Math.random() * canvas.height;
        }

        if (side === 1) {
            this.x = canvas.width + 50;
            this.y =
            Math.random() * canvas.height;
        }

        if (side === 2) {
            this.x =
            Math.random() * canvas.width;
            this.y = -50;
        }

        if (side === 3) {
            this.x =
            Math.random() * canvas.width;
            this.y = canvas.height + 50;
        }

        this.speed =
        Math.random() * 2 + 1.5;

        this.color =
        `hsl(${Math.random()*360},
        100%,60%)`;
    }

    update(delta) {

        const angle =
        Math.atan2(
            player.y - this.y,
            player.x - this.x
        );

        this.x +=
        Math.cos(angle)
        * this.speed
        * delta * 0.06;

        this.y +=
        Math.sin(angle)
        * this.speed
        * delta * 0.06;
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = this.color;

        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;

        ctx.fill();
    }
}

// =========================
// GEM
// =========================

class Gem {

    constructor() {

        this.radius = 12;

        this.x =
        Math.random()
        * (canvas.width - 100) + 50;

        this.y =
        Math.random()
        * (canvas.height - 100) + 50;
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#ffe600";

        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffe600";

        ctx.fill();
    }
}

// =========================
// PARTICLES
// =========================

class Particle {

    constructor(x, y, color) {

        this.x = x;
        this.y = y;

        this.size =
        Math.random() * 5 + 2;

        this.speedX =
        (Math.random() - 0.5) * 8;

        this.speedY =
        (Math.random() - 0.5) * 8;

        this.life = 40;

        this.color = color;
    }

    update() {

        this.x += this.speedX;
        this.y += this.speedY;

        this.life--;
    }

    draw() {

        ctx.globalAlpha =
        this.life / 40;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = this.color;

        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

// =========================
// EFFECTS
// =========================

function createExplosion(x, y, color) {

    for (let i = 0; i < 15; i++) {

        particles.push(
            new Particle(x, y, color)
        );
    }
}

// =========================
// ENEMY SPAWNING
// =========================

function spawnEnemies() {

    if (!running) return;

    enemies.push(new Enemy());

    const delay =
    Math.max(250, 1200 - score * 2);

    spawnTimeout =
    setTimeout(spawnEnemies, delay);
}

// =========================
// COMBO
// =========================

function updateCombo() {

    if (score > 300) {

        combo = 10;

        comboText.innerText =
        "MEGA COMBO x10";
    }

    else if (score > 200) {

        combo = 5;

        comboText.innerText =
        "x5";
    }

    else if (score > 100) {

        combo = 2;

        comboText.innerText =
        "x2";
    }

    else {

        combo = 1;

        comboText.innerText =
        "x1";
    }
}

// =========================
// GAME LOOP
// =========================

function animate(timestamp) {

    if (!running) return;

    requestAnimationFrame(animate);

    const delta =
    timestamp - lastTime;

    lastTime = timestamp;

    ctx.fillStyle =
    "rgba(9,11,20,0.25)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    player.update(delta);
    player.draw();

    // GEMS

    gems.forEach((gem, gemIndex) => {

        gem.draw();

        const dist =
        Math.hypot(
            player.x - gem.x,
            player.y - gem.y
        );

        if (dist <
            player.radius + gem.radius) {

            score += 10 * combo;

            createExplosion(
                gem.x,
                gem.y,
                "#ffe600"
            );

            gems.splice(gemIndex, 1);

            gems.push(new Gem());

            updateCombo();
        }
    });

    // ENEMIES

    enemies.forEach(enemy => {

        enemy.update(delta);
        enemy.draw();

        const dist =
        Math.hypot(
            player.x - enemy.x,
            player.y - enemy.y
        );

        if (dist <
            player.radius +
            enemy.radius) {

            endGame();
        }
    });

    // PARTICLES

    particles.forEach((particle, index) => {

        particle.update();
        particle.draw();

        if (particle.life <= 0) {

            particles.splice(index, 1);
        }
    });

    score += delta * 0.01;

    scoreText.innerText =
    "Score: " + Math.floor(score);
}

// =========================
// START GAME
// =========================

function startGame() {

    score = 0;
    combo = 1;

    enemies = [];
    gems = [];
    particles = [];

    player = new Player();

    gems.push(new Gem());

    running = true;

    gameOverScreen.style.display =
    "none";

    spawnEnemies();

    requestAnimationFrame(animate);
}

// =========================
// END GAME
// =========================

function endGame() {

    running = false;

    clearTimeout(spawnTimeout);

    finalScoreText.innerText =
    "Score: " + Math.floor(score);

    gameOverScreen.style.display =
    "block";
}

// =========================
// RESTART
// =========================

function restartGame() {
    startGame();
}

// =========================
// RESIZE
// =========================

window.addEventListener("resize", () => {

    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

// =========================
// START
// =========================

startGame();

</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR: ZENITH EDITION</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-pink: #ff0055; --neon-green: #ccff00; --neon-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Enhancements */
        #ui { display: none; position: absolute; inset: 20px; pointer-events: none; z-index: 10; text-shadow: 0 0 10px rgba(0,229,255,0.5); }
        #scoreBox { font-size: clamp(24px, 6vw, 36px); font-weight: bold; color: var(--neon-blue); }
        .bar-container { width: clamp(160px, 35vw, 240px); height: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin: 8px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--neon-pink), #ff5e00); width: 100%; transition: width 0.2s; }
        #xp-bar { height: 100%; background: linear-gradient(90deg, var(--neon-blue), #00ffa2); width: 0%; transition: width 0.2s; }
        #skill-bar { height: 100%; background: var(--neon-purple); width: 0%; box-shadow: 0 0 15px var(--neon-purple); }
        
        #minimap { position: absolute; top: 20px; right: 20px; width: 120px; height: 120px; background: rgba(0,0,0,0.7); border: 2px solid var(--neon-blue); border-radius: 12px; z-index: 20; display: none; overflow: hidden; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
        #minimap-canvas { width: 100%; height: 100%; }

        #menu-overlay, #shop-overlay { position: absolute; inset: 0; background: radial-gradient(circle, rgba(10,20,40,0.9) 0%, rgba(2,4,10,1) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        #shop-overlay { display: none; }
        
        .upgrade-card { background: rgba(255,255,255,0.03); border: 1px solid var(--neon-blue); padding: 20px; border-radius: 15px; width: 150px; text-align: center; cursor: pointer; margin: 10px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .upgrade-card:hover { background: var(--neon-blue); color: #000; transform: scale(1.1); box-shadow: 0 0 30px var(--neon-blue); }
        
        button { padding: 18px 50px; background: var(--neon-blue); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 18px; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 0 20px var(--neon-blue); }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%,64% { transform: translate(2px,0) skew(0deg); } 4%,60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 class="glitch" style="color: var(--neon-blue); font-size: clamp(40px, 10vw, 80px); margin: 0;">NEON SURVIVOR</h1>
    <p style="color: #6688aa; letter-spacing: 4px; margin-bottom: 30px;">ZENITH PROTOCOL ACTIVE</p>
    <button id="start-btn">INITIALIZE CORE</button>
</div>

<div id="ui">
    <div id="scoreBox">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 14px; color: var(--neon-green); margin-top: 5px;">SHARDS: <span id="shardText">0</span> 💎</div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px; letter-spacing: 1px;">LVL <span id="lvlText">1</span> | <span id="weapon-status" style="color:var(--neon-purple)">PULSE LASER</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
    <div style="font-size: 11px; color: var(--neon-purple); opacity: 0.8;">NOVA (SPACE / TAP RIGHT)</div>
    <div class="bar-container"><div id="skill-bar"></div></div>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<div id="shop-overlay">
    <h1 style="color:var(--neon-pink); font-size: 40px;" class="glitch">SYSTEM FAILURE</h1>
    <h2 id="walletDisplay" style="color: var(--neon-green)">0 💎</h2>
    <div style="display:flex; flex-wrap: wrap; justify-content: center;">
        <div class="upgrade-card" onclick="buyMeta('hp')"><b>+ ARMOR</b><br><span id="cost-hp">100</span> 💎</div>
        <div class="upgrade-card" onclick="buyMeta('speed')"><b>+ ENGINE</b><br><span id="cost-speed">100</span> 💎</div>
    </div>
    <button onclick="location.reload()" style="margin-top: 30px;">REBOOT RUN</button>
</div>

<div id="joystick-zone" style="position:absolute; bottom:50px; left:50px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.03); border:2px solid rgba(0,229,255,0.2); display:none; z-index:50;">
    <div id="joystick-stick" style="position:absolute; top:35px; left:35px; width:50px; height:50px; border-radius:50%; background:radial-gradient(circle, var(--neon-blue), #008699); box-shadow: 0 0 15px var(--neon-blue); pointer-events:none;"></div>
</div>

<canvas id="game"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap-canvas'), mCtx = mCanvas.getContext('2d');

let w, h, player, enemies = [], lasers = [], gems = [], particles = [], stars = [];
let shootTimer = 0, skillTimer = 0, lastTime = 0, cam = {x:0, y:0}, shake = 0;

const SAVE_KEY = "neon_zenith_final_v2";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, hpLvl: 0, speedLvl: 0 };
const state = { running: false, score: 0, sessionShards: 0, difficulty: 1, skillCooldown: 5000 };
let keys = {};

// Mobile Setup
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let joyPos = { x: 0, y: 0, active: false };

if(isMobile) {
    const jZone = document.getElementById('joystick-zone');
    jZone.style.display = 'block';
    window.addEventListener('touchstart', e => { 
        if(e.touches[0].clientX < window.innerWidth / 2) joyPos.active = true; 
        else activateSkill();
    });
    window.addEventListener('touchmove', e => { if(joyPos.active) { e.preventDefault(); updateJoy(e.touches[0]); } }, {passive: false});
    window.addEventListener('touchend', () => { joyPos.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
}

function updateJoy(t) {
    const rect = document.getElementById('joystick-zone').getBoundingClientRect();
    const dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60), dist = Math.hypot(dx, dy), max = 45;
    joyPos.x = (dist > max ? dx * (max/dist) : dx) / max;
    joyPos.y = (dist > max ? dy * (max/dist) : dy) / max;
    document.getElementById('joystick-stick').style.transform = `translate(${joyPos.x*45}px, ${joyPos.y*45}px)`;
}

window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') activateSkill(); };
window.onkeyup = e => keys[e.code] = false;

function playSfx(f, t, d, v=0.03) {
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

function activateSkill() {
    if(Date.now() - skillTimer < state.skillCooldown) return;
    skillTimer = Date.now();
    shake = 15;
    playSfx(100, 'square', 0.6, 0.1);
    particles.push({ x: player.x, y: player.y, r: 10, isNova: true, life: 1.0 });
    enemies.forEach(en => { if(Math.hypot(en.x - player.x, en.y - player.y) < 300) en.hp -= 20; });
}

class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 16;
        this.maxHp = 100 + (meta.hpLvl * 25); this.hp = this.maxHp;
        this.xp = 0; this.maxXp = 50; this.lvl = 1;
        this.speed = 4.5 + (meta.speedLvl * 0.4);
        this.orbAngle = 0;
    }
    update(dt) {
        let mx = joyPos.active ? joyPos.x : (keys['KeyD']-keys['KeyA'] || keys['ArrowRight']-keys['ArrowLeft'] || 0);
        let my = joyPos.active ? joyPos.y : (keys['KeyS']-keys['KeyW'] || keys['ArrowDown']-keys['ArrowUp'] || 0);
        if(mx || my) { 
            let m = Math.hypot(mx,my); 
            this.x += (mx/m)*this.speed * (dt/16); 
            this.y += (my/m)*this.speed * (dt/16); 
        }
        this.orbAngle += 0.05;
    }
    draw() {
        ctx.shadowBlur = 20; ctx.shadowColor = '#0ff'; ctx.fillStyle = '#0ff';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        for(let i=0; i<3; i++) {
            let ang = this.orbAngle + (i * Math.PI * 2 / 3);
            let ox = this.x + Math.cos(ang) * 65, oy = this.y + Math.sin(ang) * 65;
            ctx.fillStyle = '#bd00ff'; ctx.beginPath(); ctx.arc(ox, oy, 6, 0, Math.PI*2); ctx.fill();
            enemies.forEach(en => { if(Math.hypot(en.x-ox, en.y-oy) < en.r + 8) en.hp -= 0.1; });
        }
    }
}

function update(time) {
    if(!state.running) return;
    const dt = time - lastTime; lastTime = time;
    state.difficulty = 1 + (state.score / 8000);
    
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, w, h);

    // Parallax Stars
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    stars.forEach(s => {
        let sx = (s.x - cam.x * s.z) % w; if(sx < 0) sx += w;
        let sy = (s.y - cam.y * s.z) % h; if(sy < 0) sy += h;
        ctx.fillRect(sx, sy, s.s, s.s);
    });

    cam.x += (player.x - cam.x) * 0.1;
    cam.y += (player.y - cam.y) * 0.1;
    
    ctx.save();
    if (shake > 0) { ctx.translate(Math.random()*shake, Math.random()*shake); shake *= 0.9; }
    ctx.translate(w/2 - cam.x, h/2 - cam.y);
    
    player.update(dt);
    player.draw();

    // Combat Logic
    if (time - shootTimer > (player.lvl >= 10 ? 70 : 380)) {
        let target = enemies.find(en => Math.hypot(en.x - player.x, en.y - player.y) < 600);
        if(target) {
            playSfx(player.lvl >= 10 ? 400 : 220, 'square', 0.1, 0.02);
            lasers.push({ x: player.x, y: player.y, tx: target.x, ty: target.y, life: 6 });
            target.hp -= 1; shootTimer = time;
        }
    }

    // Process Entities
    particles.forEach((p, i) => {
        if(p.isNova) {
            p.r += 12; p.life -= 0.03;
            ctx.strokeStyle = `rgba(189, 0, 255, ${p.life})`; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        }
        if(p.life <= 0) particles.splice(i, 1);
    });

    enemies.forEach((en, i) => {
        let a = Math.atan2(player.y-en.y, player.x-en.x);
        en.x += Math.cos(a)*(en.speed * state.difficulty) * (dt/16);
        en.y += Math.sin(a)*(en.speed * state.difficulty) * (dt/16);
        ctx.fillStyle = en.color; ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
        if(en.hp <= 0) { 
            state.score += 10; state.sessionShards += 1;
            gems.push({x:en.x, y:en.y}); enemies.splice(i, 1); 
        }
        if(Math.hypot(player.x-en.x, player.y-en.y) < player.r+en.r) {
            player.hp -= 0.4; shake = 5;
        }
    });

    lasers.forEach((l, i) => {
        ctx.strokeStyle = player.lvl >= 10 ? '#ccff00' : '#0ff';
        ctx.lineWidth = player.lvl >= 10 ? 4 : 2;
        ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.tx, l.ty); ctx.stroke();
        if(--l.life <= 0) lasers.splice(i, 1);
    });

    gems.forEach((g, i) => {
        let d = Math.hypot(player.x-g.x, player.y-g.y);
        if(d < 160) { g.x += (player.x-g.x)*0.15; g.y += (player.y-g.y)*0.15; } // Magnet effect
        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
        ctx.fillRect(g.x-3, g.y-3, 6, 6);
        if(d < 20) { gems.splice(i, 1); player.xp += 12; }
    });

    ctx.restore();

    // UI Updates
    document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
    document.getElementById('xp-bar').style.width = (player.xp/player.maxXp*100)+'%';
    document.getElementById('skill-bar').style.width = Math.min(100, (Date.now()-skillTimer)/50)+'%';
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('shardText').innerText = meta.shards + state.sessionShards;
    if(player.lvl >= 10) document.getElementById('weapon-status').innerText = "VORTEX BEAM";

    if(player.xp >= player.maxXp) {
        player.lvl++; player.xp = 0; player.maxXp *= 1.3;
        player.hp = Math.min(player.maxHp, player.hp + 20);
        document.getElementById('lvlText').innerText = player.lvl;
        playSfx(600, 'sine', 0.5, 0.05);
    }

    if(player.hp <= 0) {
        state.running = false; meta.shards += state.sessionShards;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        document.getElementById('shop-overlay').style.display = 'flex';
        document.getElementById('walletDisplay').innerText = meta.shards + " 💎";
    }

    // Map Updates
    mCtx.fillStyle = '#000'; mCtx.fillRect(0,0,120,120);
    enemies.forEach(en => { mCtx.fillStyle = en.color; mCtx.fillRect(60+(en.x-player.x)*0.05, 60+(en.y-player.y)*0.05, 3, 3); });
    mCtx.fillStyle = '#0ff'; mCtx.fillRect(58, 58, 4, 4);

    if(Math.random() < 0.04) {
        let t = Math.random();
        enemies.push({
            x: player.x + (Math.random()-0.5)*w*2.2, 
            y: player.y + (Math.random()-0.5)*h*2.2, 
            r: t > 0.9 ? 24 : 12, 
            hp: t > 0.9 ? 6 : 1, 
            speed: t < 0.2 ? 4 : 2, 
            color: t > 0.9 ? '#bd00ff' : (t < 0.2 ? '#ccff00' : '#f05')
        });
    }
    
    requestAnimationFrame(update);
}

function buyMeta(type) {
    let cost = (type === 'hp' ? meta.hpLvl : meta.speedLvl) * 150 + 100;
    if(meta.shards >= cost) {
        meta.shards -= cost; if(type === 'hp') meta.hpLvl++; else meta.speedLvl++;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        document.getElementById('walletDisplay').innerText = meta.shards + " 💎";
        document.getElementById('cost-hp').innerText = (meta.hpLvl * 150 + 100);
        document.getElementById('cost-speed').innerText = (meta.speedLvl * 150 + 100);
    }
}

const resize = () => { 
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; 
    mCanvas.width = 120; mCanvas.height = 120;
    stars = Array.from({length: 150}, () => ({x:Math.random()*w, y:Math.random()*h, s:Math.random()*2, z:Math.random()}));
};
window.onresize = resize; resize();

document.getElementById('start-btn').onclick = () => {
    player = new Player(); 
    state.running = true; 
    document.getElementById('menu-overlay').style.display='none'; 
    document.getElementById('ui').style.display='block'; 
    document.getElementById('minimap').style.display='block';
    document.getElementById('cost-hp').innerText = (meta.hpLvl * 150 + 100);
    document.getElementById('cost-speed').innerText = (meta.speedLvl * 150 + 100);
    requestAnimationFrame(update);
};
</script>
</body>
</html>

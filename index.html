<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR: ZENITH ULTIMATUM</title>
    <style>
        :root { --blue: #00e5ff; --pink: #ff0055; --green: #ccff00; --purple: #bd00ff; --red: #ff3333; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010206; color: #fff; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        /* CRT & Scanline FX */
        body::after { content: " "; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 200; background-size: 100% 3px, 3px 100%; pointer-events: none; }

        #ui { position: absolute; inset: 20px; pointer-events: none; z-index: 10; display: none; }
        .bar { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        #hp-fill { height: 100%; background: var(--pink); width: 100%; transition: 0.2s; }
        #xp-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.2s; }

        .overlay { position: absolute; inset: 0; background: rgba(1, 2, 6, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; text-align: center; backdrop-filter: blur(10px); }
        .btn { padding: 15px 30px; background: none; border: 1px solid var(--blue); color: var(--blue); cursor: pointer; font-family: inherit; margin: 8px; transition: 0.3s; pointer-events: auto; font-weight: bold; letter-spacing: 2px; }
        .btn:hover { background: var(--blue); color: #000; box-shadow: 0 0 25px var(--blue); transform: scale(1.05); }
        .hardcore-btn { border-color: var(--red); color: var(--red); }
        .hardcore-btn:hover { background: var(--red); color: #000; box-shadow: 0 0 25px var(--red); }

        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--purple); padding: 15px; width: 180px; margin: 8px; cursor: pointer; pointer-events: auto; }
        .card:hover { border-color: var(--green); background: rgba(255,255,255,0.1); }

        #vo-log { position: absolute; bottom: 30px; width: 100%; text-align: center; color: var(--green); font-size: 14px; letter-spacing: 3px; z-index: 50; pointer-events: none; }
        #leaderboard { margin-top: 20px; font-size: 11px; color: #557; border-top: 1px solid #223; padding-top: 10px; width: 300px; }
    </style>
</head>
<body>

<div id="vo-log">>> SYSTEM_READY</div>

<!-- MAIN MENU -->
<div id="menu-overlay" class="overlay">
    <h1 style="color: var(--blue); font-size: 40px; margin: 0; letter-spacing: 10px;">ZENITH ULTIMATUM</h1>
    <p id="best-score" style="color: var(--purple);">BEST_RECORD: 0</p>
    <button class="btn" onclick="initGame(false)">NORMAL_BOOT</button>
    <button class="btn hardcore-btn" onclick="initGame(true)">HARDCORE_DIRECTIVE [3X XP]</button>
    <div id="leaderboard">
        <b>TOP_NODES</b><br>
        <div id="lb-list">LOADING...</div>
    </div>
</div>

<!-- LEVEL UP / PERKS -->
<div id="level-overlay" class="overlay" style="display:none">
    <h2 style="color: var(--green)">EVOLUTION_SELECTED</h2>
    <div id="perk-list" style="display:flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<!-- QUESTS -->
<div id="quest-overlay" class="overlay" style="display:none">
    <h2 id="quest-title" style="color: var(--purple)">TRANSMISSION_INBOUND</h2>
    <p id="quest-text" style="max-width: 450px; line-height: 1.5;"></p>
    <div id="choice-list" style="display:flex"></div>
</div>

<!-- SHOP / GAME OVER -->
<div id="death-overlay" class="overlay" style="display:none">
    <h1 style="color: var(--pink)">CORE_CRITICAL</h1>
    <h2 id="shard-count" style="color: var(--green)">0 💎</h2>
    <div style="display:flex">
        <div class="card" onclick="buyMeta('hp')"><b>+ ARMOR</b><br><span id="cost-hp">100</span> 💎</div>
        <div class="card" onclick="buyMeta('speed')"><b>+ ENGINE</b><br><span id="cost-speed">100</span> 💎</div>
    </div>
    <button class="btn" onclick="location.reload()">REBOOT_SYSTEM</button>
</div>

<!-- HUD -->
<div id="ui">
    <div style="color: var(--blue); font-size: 20px;">DATA_SYNC: <span id="scoreText">0</span></div>
    <div id="weapon-tag" style="color: var(--green); font-size: 11px;">MODE: PULSE_LASER</div>
    <div class="bar"><div id="hp-fill"></div></div>
    <div class="bar"><div id="xp-fill"></div></div>
    <div style="font-size: 11px;">LVL <span id="lvlText">1</span> | DIST <span id="distText">0</span>m</div>
</div>

<canvas id="game"></canvas>

<script>
const audio = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, player, enemies = [], lasers = [], enemyLasers = [], drones = [], particles = [], stars = [];
let worldDist = 0, lastFire = 0, shake = 0, dashTimer = 0;
let keys = {};

const SAVE_KEY = "zenith_ultimatum_final";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, hpLvl: 0, speedLvl: 0, bestScore: 0 };
let state = { running: false, score: 0, shards: 0, lvl: 1, xp: 0, xpNext: 100, hc: false, mod: 'none', weapon: 'pulse', lastQ: 0 };

const WEAPONS = {
    pulse: { n: "PULSE", rate: 350, dmg: 10, count: 1, color: '#bd00ff' },
    spread: { n: "SPREAD", rate: 550, dmg: 8, count: 3, color: '#ccff00' },
    rail: { n: "RAIL", rate: 1100, dmg: 60, count: 1, color: '#00e5ff' }
};

const QUESTS = [{ d: 1500, t: "AI TERMINAL", m: "Save files or scavenge components?", c: [{t: "SAVE (HP)", e: () => player.hp = player.maxHp}, {t: "SCAVENGE (DMG)", e: () => player.dmgMult = 2}] }];

function speak(t) { document.getElementById('vo-log').innerText = `>> ${t}`; }
function sfx(f, t, d, v=0.02) {
    try {
        let o = audio.createOscillator(), g = audio.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audio.currentTime);
        g.gain.setValueAtTime(v, audio.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
        o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
    } catch(e){}
}

function initGame(hc) {
    state.hc = hc;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    player = { x: 100, y: h/2, hp: hc ? 1 : (100 + meta.hpLvl*20), maxHp: hc ? 1 : (100 + meta.hpLvl*20), speed: 4 + meta.speedLvl*0.5, dmgMult: 1, dash: 0 };
    for(let i=0; i<60; i++) stars.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*2});
    state.running = true;
    speak(hc ? "HARDCORE_DIRECTIVE_ENGAGED" : "NEURAL_LINK_STABLE");
    if(hc) document.body.style.filter = "contrast(1.2) saturate(1.5) hue-rotate(-20deg)";
    setInterval(spawn, 1000);
    loop();
}

function spawn() {
    if(!state.running) return;
    const isBoss = worldDist > 5000 && !enemies.some(e=>e.boss);
    if(isBoss) {
        enemies.push({ x: w+100, y: h/2, hp: 1000, r: 70, s: 0.5, boss: true, color: '#ff0055', lastS: 0 });
        speak("ZENITH_GUARDIAN_DETECTED");
    } else {
        const type = Math.random();
        enemies.push({ x: w+50, y: Math.random()*h, hp: 20, r: 12, s: 2.5+(worldDist/5000), color: type>0.8?'#bd00ff':'#00e5ff', type: type>0.8?'shooter':'chaser', lastS: 0 });
    }
}

function loop() {
    if(!state.running) return;
    worldDist += 2;

    // Movement & Dash
    let vy = 0; if(keys['KeyW']) vy = -1; if(keys['KeyS']) vy = 1;
    if(player.dash > 0) { vy *= 4; player.dash--; }
    player.y = Math.max(20, Math.min(h-20, player.y + vy * player.speed));

    // Combat
    const wp = WEAPONS[state.weapon];
    if(Date.now() - lastFire > wp.rate) {
        for(let i=0; i<wp.count; i++) lasers.push({ x: player.x, y: player.y, vx: 12, vy: (i-(wp.count-1)/2)*3, dmg: wp.dmg*player.dmgMult, c: wp.color });
        lastFire = Date.now();
        sfx(300, 'square', 0.05);
    }

    // Quest Check
    const q = QUESTS.find(x => worldDist >= x.d && state.lastQ < x.d);
    if(q) { triggerQuest(q); return; }

    // Entities Logic
    enemies.forEach((en, ei) => {
        const ang = Math.atan2(player.y - en.y, player.x - en.x);
        if(en.boss) {
            en.x -= en.s; if(Date.now()-en.lastS > 1500) { 
                for(let i=0; i<8; i++) enemyLasers.push({x:en.x, y:en.y, vx:Math.cos(i)*4, vy:Math.sin(i)*4});
                en.lastS = Date.now();
            }
        } else if(en.type === 'shooter' && Math.hypot(player.x-en.x, player.y-en.y) < 300) {
            if(Date.now()-en.lastS > 2000) { enemyLasers.push({x:en.x, y:en.y, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5}); en.lastS = Date.now(); }
        } else {
            en.x += Math.cos(ang)*en.s; en.y += Math.sin(ang)*en.s;
        }

        if(Math.hypot(player.x-en.x, player.y-en.y) < en.r+10 && player.dash === 0) { player.hp -= 0.5; shake = 10; }

        lasers.forEach((l, li) => {
            if(Math.hypot(l.x-en.x, l.y-en.y) < en.r) {
                en.hp -= l.dmg; lasers.splice(li,1);
                if(en.hp <= 0) {
                    enemies.splice(ei,1); state.score += state.hc ? 50 : 10; state.xp += state.hc ? 100 : 30;
                    if(en.boss) win();
                    if(state.xp >= state.xpNext) levelUp();
                }
            }
        });
    });

    enemyLasers.forEach((el, eli) => {
        el.x += el.vx; el.y += el.vy;
        if(Math.hypot(player.x-el.x, player.y-el.y) < 15 && player.dash === 0) { player.hp -= state.hc ? 100 : 10; enemyLasers.splice(eli,1); }
    });

    lasers.forEach((l, i) => { l.x += l.vx; l.y += l.vy; if(l.x > w) lasers.splice(i,1); });
    if(player.hp <= 0) gameOver();

    render();
    requestAnimationFrame(loop);
}

function render() {
    ctx.fillStyle = '#010206'; ctx.fillRect(0,0,w,h);
    ctx.save(); if(shake > 0) { ctx.translate(Math.random()*shake, Math.random()*shake); shake *= 0.9; }
    
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
    ctx.fillStyle = state.hc ? var(--red) : '#ccff00'; ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, 7); ctx.fill();
    enemies.forEach(en => { ctx.fillStyle = en.color; ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, 7); ctx.fill(); });
    lasers.forEach(l => { ctx.fillStyle = l.c; ctx.fillRect(l.x, l.y-2, 20, 4); });
    ctx.fillStyle = var(--pink); enemyLasers.forEach(el => { ctx.beginPath(); ctx.arc(el.x, el.y, 5, 0, 7); ctx.fill(); });
    ctx.restore();

    document.getElementById('hp-fill').style.width = (player.hp/player.maxHp*100) + "%";
    document.getElementById('xp-fill').style.width = (state.xp/state.xpNext*100) + "%";
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('distText').innerText = worldDist;
}

function levelUp() {
    state.lvl++; state.xp = 0; state.running = false;
    const ui = document.getElementById('level-overlay'), list = document.getElementById('perk-list');
    list.innerHTML = ''; ui.style.display = 'flex';
    [{n:"SPREAD_SHOT", a:()=>state.weapon='spread'}, {n:"RAILGUN", a:()=>state.weapon='rail'}, {n:"REPAIR", a:()=>player.hp=player.maxHp}].forEach(p => {
        const d = document.createElement('div'); d.className='card'; d.innerHTML=`<b>${p.n}</b>`;
        d.onclick = () => { p.a(); ui.style.display='none'; state.running=true; loop(); };
        list.appendChild(d);
    });
}

function triggerQuest(q) {
    state.running = false;
    const ui = document.getElementById('quest-overlay'), list = document.getElementById('choice-list');
    document.getElementById('quest-text').innerText = q.m; list.innerHTML = '';
    q.c.forEach(c => {
        const d = document.createElement('div'); d.className='card'; d.innerText=c.t;
        d.onclick = () => { c.e(); state.lastQ=q.d; ui.style.display='none'; state.running=true; loop(); };
        list.appendChild(d);
    });
    ui.style.display = 'flex';
}

function gameOver() {
    state.running = false;
    meta.shards += Math.floor(state.score/10);
    if(state.score > meta.bestScore) meta.bestScore = state.score;
    localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
    document.getElementById('death-overlay').style.display = 'flex';
    document.getElementById('shard-count').innerText = meta.shards + " 💎";
    speak("CORE_CRITICAL_FAILURE");
}

function buyMeta(t) {
    let c = 100 + (meta[t+'Lvl']*150);
    if(meta.shards >= c) { meta.shards -= c; meta[t+'Lvl']++; localStorage.setItem(SAVE_KEY, JSON.stringify(meta)); location.reload(); }
}

window.onkeydown = e => { keys[e.code] = true; if(e.code === 'ShiftLeft') player.dash = 15; };
window.onkeyup = e => keys[e.code] = false;
document.getElementById('best-score').innerText = "BEST_RECORD: " + meta.bestScore;
const b = JSON.parse(localStorage.getItem('zenith_board') || '[]');
document.getElementById('lb-list').innerHTML = b.map((s,i)=>`#${i+1} UNIT --- ${s.s}`).join('<br>') || "NO_DATA";
</script>
</body>
</html>

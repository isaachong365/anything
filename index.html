<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-pink: #ff0055; --neon-green: #ccff00; --neon-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        #ui { display: none; position: absolute; inset: 20px; pointer-events: none; z-index: 10; font-size: clamp(12px, 2.5vw, 16px); }
        #scoreBox { font-size: clamp(22px, 5vw, 32px); font-weight: bold; color: var(--neon-blue); }
        .bar-container { width: clamp(150px, 40vw, 220px); height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0 12px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-pink); }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #00ffaa); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-blue); }
        
        #boss-ui { position: absolute; bottom: clamp(20px, 5vh, 40px); left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; z-index: 10; }
        .boss-bar-bg { width: 70vw; height: 12px; background: rgba(255,0,85,0.2); border: 1px solid #ff0055; border-radius: 6px; overflow: hidden; }
        #boss-hp-fill { height: 100%; background: #ff0055; box-shadow: 0 0 15px #ff0055; width: 100%; transition: width 0.1s; }
        
        #menu-overlay, #overlay, #shop-overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box; }
        #overlay, #shop-overlay { display: none; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 90%; max-height: 50vh; overflow-y: auto; }
        .card, .shop-item { background: #0a0f1e; border: 2px solid var(--neon-blue); padding: clamp(10px, 3vw, 20px); width: clamp(120px, 35vw, 180px); cursor: pointer; text-align: center; border-radius: 15px; transition: 0.3s; box-sizing: border-box; font-size: clamp(12px, 2.5vw, 15px); }
        .card:hover:not(.disabled), .shop-item:hover:not(.disabled) { background: var(--neon-blue); color: #000; transform: translateY(-3px); box-shadow: 0 0 20px var(--neon-blue); }
        
        button { padding: clamp(10px, 3vw, 15px) clamp(20px, 6vw, 40px); background: var(--neon-blue); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: clamp(14px, 3.5vw, 18px); margin-top: 20px; color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        button:hover { filter: brightness(1.2); }
        .glitch { animation: glitch-anim 0.2s infinite; text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
        @keyframes glitch-anim { 0% { transform: translate(0); } 20% { transform: translate(-3px, 2px); } 100% { transform: translate(0); } }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 229, 255, 0.3); border-radius: 50%; display: none; touch-action: none; z-index: 50; pointer-events: all; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: radial-gradient(circle, var(--neon-blue), #008699); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); touch-action: none; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 class="glitch" style="color: var(--neon-blue); font-size: clamp(32px, 8vw, 64px); margin-bottom: 5px;">NEON SURVIVOR</h1>
    <p style="color: #6688aa; letter-spacing: 2px; font-size: 14px; margin-bottom: 30px;">CYBERNETIC ENGINE INITIALISED</p>
    <button id="start-btn">ENGAGE RUN</button>
</div>

<div id="ui">
    <div id="scoreBox">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: clamp(12px, 3vw, 14px); color: var(--neon-green);">WALLET: <span id="shardText">0</span> 💎</div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px; letter-spacing: 2px;">LVL <span id="lvlText">1</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
</div>

<div id="boss-ui">
    <div style="color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 4px; font-size: 14px;">NEON WARDEN</div>
    <div class="boss-bar-bg"><div id="boss-hp-fill"></div></div>
</div>

<div id="overlay"><h1>AUGMENT ACQUIRED</h1><div id="choices" class="card-container"></div></div>

<div id="shop-overlay">
    <h1 style="color:var(--neon-pink)" class="glitch">SYSTEM TERMINATED</h1>
    <h2 style="color:#fff; font-size: 18px;">TOTAL SHARDS: <span id="walletShards">0</span> 💎</h2>
    <div id="shop-items" class="card-container"></div>
    <button onclick="location.reload()">RE-INITIALIZE RUN</button>
</div>

<div id="joystick-zone"><div id="joystick-stick"></div></div>

<canvas id="game"></canvas>

<script>
// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq, type, dur, vol=0.05) {
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}

// --- SETUP ---
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, player, enemies = [], bullets = [], particles = [], boss = null, camera = {x: 0, y: 0};
const SAVE_KEY = "neon_survivor_v6_final";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, upgrades: { hp: 0, dmg: 0, speed: 0, shotgun: 0, railgun: 0, plasma: 0 } };

const state = { inMenu: true, running: false, score: 0, sessionShards: 0, time: 0, shake: 0, diffMult: 1, bossSpawned: false };
const keys = {};

let isMobile = false;
let touchInput = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, moveX: 0, moveY: 0 };
let pointerAngle = 0; 

function initAudio() { if(audioCtx.state === 'suspended') audioCtx.resume(); }
window.onkeydown = e => { keys[e.code] = true; initAudio(); };
window.onkeyup = e => keys[e.code] = false;

const resize = () => { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
};
window.onresize = resize; window.addEventListener('orientationchange', () => setTimeout(resize, 200)); resize();

// --- VIRTUAL JOYSTICK CONTROLLER ---
const joyZone = document.getElementById('joystick-zone');
const joyStick = document.getElementById('joystick-stick');
const joyMaxRadius = 45;

function setupMobileControls() {
    window.addEventListener('touchstart', () => {
        if(!isMobile && !state.inMenu) { isMobile = true; joyZone.style.display = "block"; }
        initAudio();
    }, {passive: true});

    joyZone.addEventListener('touchstart', (e) => {
        const b = joyZone.getBoundingClientRect();
        touchInput.startX = b.left + b.width / 2;
        touchInput.startY = b.top + b.height / 2;
        touchInput.active = true;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        if (!touchInput.active) return;
        const t = e.touches[0];
        let dx = t.clientX - touchInput.startX;
        let dy = t.clientY - touchInput.startY;
        const dist = Math.hypot(dx, dy);

        if (dist > joyMaxRadius) {
            dx = (dx / dist) * joyMaxRadius;
            dy = (dy / dist) * joyMaxRadius;
        }

        joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
        touchInput.moveX = dx / joyMaxRadius;
        touchInput.moveY = dy / joyMaxRadius;
    }, {passive: false});

    window.addEventListener('touchend', () => {
        touchInput.active = false;
        touchInput.moveX = 0; touchInput.moveY = 0;
        joyStick.style.transform = `translate(0px, 0px)`;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0 && !touchInput.active) {
            const t = e.touches[0];
            pointerAngle = Math.atan2(t.clientY - h/2, t.clientX - w/2);
        }
    }, {passive: true});
}

window.addEventListener('mousemove', (e) => {
    if(!isMobile) pointerAngle = Math.atan2(e.clientY - h/2, e.clientX - w/2);
});
window.addEventListener('mousedown', () => initAudio());

// --- ENTITIES & VEIL PATHS ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
    draw() {
        ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.fillRect(this.x - camera.x, this.y - camera.y, 3, 3);
        ctx.globalAlpha = 1;
    }
}

class Bullet {
    constructor(x, y, angle, dmg, speed = 14, size = 6, color = '#ccff00') {
        this.x = x; this.y = y; this.angle = angle; this.dmg = dmg; this.speed = speed;
        this.size = size; this.color = color;
    }
    update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }
    draw() {
        ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.fillRect(this.x - camera.x - this.size/2, this.y - camera.y - this.size/2, this.size, this.size);
    }
}

class Enemy {
    constructor(x, y, type = 'scout') {
        this.x = x; this.y = y; this.type = type;
        if(type === 'tank') {
            this.hp = 150; this.r = 22; this.speed = 1.5; this.color = '#ff0055';
        } else {
            this.hp = 40; this.r = 14; this.speed = 2.8; this.color = '#ffaa00';
        }
    }
    update() {
        let angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
    }
    draw() {
        ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.shadowBlur = 12; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
        ctx.beginPath();
        if(this.type === 'tank') {
            for (let i = 0; i < 6; i++) {
                let a = (Math.PI / 3) * i;
                ctx.lineTo(Math.cos(a) * this.r, Math.sin(a) * this.r);
            }
        } else {
            for (let i = 0; i < 4; i++) {
                let a = (Math.PI / 2) * i;
                ctx.lineTo(Math.cos(a) * this.r, Math.sin(a) * this.r);
                ctx.lineTo(Math.cos(a + 0.4) * (this.r/2), Math.sin(a + 0.4) * (this.r/2));
            }
        }
        ctx.closePath(); ctx.stroke(); ctx.restore();
    }
}

class BossWarden {
    constructor(x, y) {
        this.x = x; this.y = y; this.r = 45; this.maxHp = 2000; this.hp = this.maxHp;
        this.speed = 1.2; this.color = '#ff0055'; this.lastAttack = 0;
    }
    update() {
        let angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
        
        if(Date.now() - this.lastAttack > 2000) {
            this.lastAttack = Date.now();
            playSfx(200, 'sawtooth', 0.4);
            for(let i=0; i<8; i++) {
                let a = (Math.PI / 4) * i;
                enemies.push(new Enemy(this.x + Math.cos(a)*60, this.y + Math.sin(a)*60, 'scout'));
            }
        }
    }
    draw() {
        ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.shadowBlur = 25; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 4;
        ctx.beginPath();
        for(let i=0; i<16; i++) {
            let rad = i % 2 === 0 ? this.r : this.r / 1.5;
            let a = (Math.PI / 8) * i;
            ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        ctx.closePath(); ctx.stroke(); ctx.restore();
    }
}

class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 18; this.angle = 0;
        this.speed = 4.5 + (meta.upgrades.speed * 0.7);
        this.maxHp = 100 + (meta.upgrades.hp * 25);
        this.hp = this.maxHp;
        this.bulletDmg = 40 + (meta.upgrades.dmg * 15);
        this.xp = 0; this.nextXP = 100; this.lvl = 1;
        this.fireRate = 450; this.lastShot = 0;
    }
    update() {
        let mx = 0, my = 0;
        if(keys['KeyW'] || keys['ArrowUp']) my--; if(keys['KeyS'] || keys['ArrowDown']) my++;
        if(keys['KeyA'] || keys['ArrowLeft']) mx--; if(keys['KeyD'] || keys['ArrowRight']) mx++;
        if (mx !== 0 || my !== 0) {
            const mag = Math.hypot(mx, my);
            this.x += (mx / mag) * this.speed;
            this.y += (my / mag) * this.speed;
            this.angle = Math.atan2(my, mx);
        } else if (touchInput.active) {
            this.x += touchInput.moveX * this.speed;
            this.y += touchInput.moveY * this.speed;
            this.angle = Math.atan2(touchInput.moveY, touchInput.moveX);
        } else {
            this.angle = pointerAngle;
        }
        if(Date.now() - this.lastShot > this.fireRate) this.shoot();
        camera.x += (this.x - w/2 - camera.x) * 0.1;
        camera.y += (this.y - h/2 - camera.y) * 0.1;
    }
    draw() {
        ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y); ctx.rotate(this.angle);
        ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff'; ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(this.r, 0); ctx.lineTo(-this.r, -this.r); ctx.lineTo(-this.r, this.r); ctx.closePath();
        ctx.stroke(); ctx.restore();
    }
    shoot() {
        let targetList = boss ? [boss, ...enemies] : enemies;
        let target = targetList.reduce((p, c) => {
            let d = Math.hypot(c.x-this.x, c.y-this.y);
            return d < p.dist ? {o: c, dist: d} : p;
        }, {o: null, dist: 900}).o;
        
        this.lastShot = Date.now();
        playSfx(600, 'sine', 0.1);
        let a = target ? Math.atan2(target.y-this.y, target.x-this.x) : this.angle;
        
        bullets.push(new Bullet(this.x, this.y, a, this.bulletDmg));
        if(meta.upgrades.shotgun > 0) {
            bullets.push(new Bullet(this.x, this.y, a-0.2, this.bulletDmg*0.5));
            bullets.push(new Bullet(this.x, this.y, a+0.2, this.bulletDmg*0.5));
        }
        if(meta.upgrades.railgun > 0) {
            bullets.push(new Bullet(this.x, this.y, a, this.bulletDmg*2, 22, 8, '#ccff00'));
        }
        if(meta.upgrades.plasma > 0) {
            // Purple Heavy Plasma Blast
            bullets.push(new Bullet(this.x, this.y, a + (Math.random() - 0.5) * 0.1, this.bulletDmg * 2.5, 9, 14, '#bd00ff'));
        }
    }
}

// --- OVERLAYS & EVENTS ---
function triggerLevelUp() {
    state.running = false;
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    const augments = [
        { name: 'Overclock Module', d: 'Fire Rate +25%', run: () => player.fireRate *= 0.75 },
        { name: 'Kinetic Core', d: 'Damage +30%', run: () => player.bulletDmg *= 1.3 },
        { name: 'Siphon Cell', d: 'Heal 35 Matrix HP', run: () => player.hp = Math.min(player.maxHp, player.hp + 35) }
    ];
    augments.forEach(aug => {
        let el = document.createElement('div'); el.className = 'card';
        el.innerHTML = `<h3>${aug.name}</h3><p>${aug.d}</p>`;
        el.onclick = () => {
            aug.run();
            document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('overlay').style.display = 'none';
            state.running = true;
        };
        choicesDiv.appendChild(el);
    });
    document.getElementById('overlay').style.display = 'flex';
}

function updateShopItem(id, name, cost) {
    if(meta.shards >= cost) {
        meta.shards -= cost;
        meta.upgrades[id]++;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        playSfx(400, 'sine', 0.15);
        showShop();
    }
}

function showShop() {
    document.getElementById('walletShards').innerText = meta.shards;
    const shopDiv = document.getElementById('shop-items');
    shopDiv.innerHTML = '';
    const catalog = [
        {id:'hp', n:'Hull Matrix', c:5}, {id:'dmg', n:'Laser Optic', c:5},
        {id:'speed', n:'Thrusters', c:4}, {id:'shotgun', n:'Unlock Shotgun', c:15},
        {id:'railgun', n:'Unlock Railgun', c:20}, {id:'plasma', n:'Unlock Plasma Cannon', c:30}
    ];
    catalog.forEach(item => {
        let el = document.createElement('div'); el.className = 'shop-item';
        el.innerHTML = `<h4>${item.n}</h4><p>Cost: ${item.c} 💎</p><small>Lvl: ${meta.upgrades[item.id]}</small>`;
        el.onclick = () => updateShopItem(item.id, item.n, item.c);
        shopDiv.appendChild(el);
    });
}

// --- ENGINE INITIALIZATION & START EVENTS ---
player = new Player();
setupMobileControls();
document.getElementById('shardText').innerText = meta.shards;

document.getElementById('start-btn').onclick = () => {
    state.inMenu = false;
    state.running = true;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    if(isMobile) joyZone.style.display = 'block';
    playSfx(440, 'sine', 0.2);
};

function gameLoop() {
    ctx.fillStyle = 'rgba(2, 4, 10, 0.3)';
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    if(state.shake > 0) {
        ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
        state.shake *= 0.9;
    }

    // Environmental Grid Map Matrix Line Renderers
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.03)'; ctx.lineWidth = 1;
    let step = 60, sX = Math.floor(camera.x/step)*step, sY = Math.floor(camera.y/step)*step;
    for (let x = sX; x < sX + w + step; x += step) { ctx.beginPath(); ctx.moveTo(x - camera.x, 0); ctx.lineTo(x - camera.x, h); ctx.stroke(); }
    for (let y = sY; y < sY + h + step; y += step) { ctx.beginPath(); ctx.moveTo(0, y - camera.y); ctx.lineTo(w, y - camera.y); ctx.stroke(); }

    if (state.running && !state.inMenu) {
        player.update();
        if (Math.random() < 0.02 + (state.score*0.000005) && enemies.length < 25) {
            let side = Math.random() * Math.PI * 2;
            let sx = player.x + Math.cos(side) * (w / 1.1);
            let sy = player.y + Math.sin(side) * (h / 1.1);
            enemies.push(new Enemy(sx, sy, Math.random() > 0.8 ? 'tank' : 'scout'));
        }
        if(state.score >= 2500 && !state.bossSpawned) {
            state.bossSpawned = true;
            boss = new BossWarden(player.x, player.y - h/2);
            document.getElementById('boss-ui').style.display = 'flex';
            playSfx(300, 'sawtooth', 0.6);
        }
        if(boss) boss.update();
    }

    // Process Active Projectiles
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        if(state.running) b.update();
        b.draw();
        
        let hit = false;
        if(boss && Math.hypot(b.x - boss.x, b.y - boss.y) < boss.r) {
            boss.hp -= b.dmg; hit = true; bullets.splice(i, 1);
            state.shake = 8;
            document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';
            if(boss.hp <= 0) {
                state.score += 5000; state.sessionShards += 25; boss = null;
                document.getElementById('boss-ui').style.display = 'none';
                playSfx(900, 'sawtooth', 0.8);
            }
        }
        if(hit) continue;

        for (let j = enemies.length - 1; j >= 0; j--) {
            let e = enemies[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                e.hp -= b.dmg;
                bullets.splice(i, 1);
                state.shake = 4;
                for(let p=0; p<5; p++) particles.push(new Particle(e.x, e.y, e.color));
                
                if (e.hp <= 0) {
                    enemies.splice(j, 1);
                    state.score += 100; state.sessionShards += 1;
                    document.getElementById('scoreText').innerText = state.score;
                    document.getElementById('shardText').innerText = state.sessionShards + meta.shards;
                    
                    player.xp += e.type === 'tank' ? 40 : 20;
                    if (player.xp >= player.nextXP) {
                        player.xp = 0; player.lvl++;
                        document.getElementById('lvlText').innerText = player.lvl;
                        triggerLevelUp();
                    }
                    document.getElementById('xp-bar').style.width = (player.xp / player.nextXP * 100) + '%';
                }
                break;
            }
        }
    }

    // Process Enemy Entities
    enemies.forEach(e => {
        if(state.running && !state.inMenu) e.update();
        e.draw();
        if (state.running && Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.r) {
            player.hp -= e.type === 'tank' ? 0.6 : 0.3;
            document.getElementById('hp-bar').style.width = Math.max(0, (player.hp / player.maxHp * 100)) + '%';
            if (player.hp <= 0) {
                state.running = false;
                meta.shards += state.sessionShards;
                localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
                showShop();
                document.getElementById('shop-overlay').style.display = 'flex';
            }
        }
    });

    if(boss) boss.draw();

    for(let i = particles.length-1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if(particles[i].life <= 0) particles.splice(i, 1);
    }

    if(!state.inMenu) player.draw();
    ctx.restore();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>

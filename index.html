<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-pink: #ff0055; --neon-green: #ccff00; --neon-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        #ui { display: none; position: absolute; inset: 20px; pointer-events: none; z-index: 10; font-size: clamp(12px, 2.5vw, 16px); }
        #scoreBox { font-size: clamp(22px, 5vw, 32px); font-weight: bold; color: var(--neon-blue); }
        .bar-container { width: clamp(150px, 40vw, 220px); height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0 12px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-pink); }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #00ffaa); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-blue); }
        
        #boss-ui { position: absolute; bottom: clamp(20px, 5vh, 40px); left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; z-index: 10; }
        .boss-bar-bg { width: 70vw; height: 12px; background: rgba(255,0,85,0.2); border: 1px solid #ff0055; border-radius: 6px; overflow: hidden; }
        #boss-hp-fill { height: 100%; background: #ff0055; box-shadow: 0 0 15px #ff0055; width: 100%; transition: width 0.1s; }
        
        #menu-overlay, #overlay, #shop-overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box; }
        #overlay, #shop-overlay { display: none; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 90%; max-height: 50vh; overflow-y: auto; }
        .card, .shop-item { background: #0a0f1e; border: 2px solid var(--neon-blue); padding: clamp(10px, 3vw, 20px); width: clamp(120px, 35vw, 180px); cursor: pointer; text-align: center; border-radius: 15px; transition: 0.3s; box-sizing: border-box; font-size: clamp(12px, 2.5vw, 15px); }
        .card:hover:not(.disabled), .shop-item:hover:not(.disabled) { background: var(--neon-blue); color: #000; transform: translateY(-3px); box-shadow: 0 0 20px var(--neon-blue); }
        .shop-item.disabled { border-color: #333; color: #555; cursor: not-allowed; pointer-events: none; opacity: 0.4; }
        
        button { padding: clamp(10px, 3vw, 15px) clamp(20px, 6vw, 40px); background: var(--neon-blue); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: clamp(14px, 3.5vw, 18px); margin-top: 20px; color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        button:hover { filter: brightness(1.2); }
        .glitch { animation: glitch-anim 0.2s infinite; text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
        @keyframes glitch-anim { 0% { transform: translate(0); } 20% { transform: translate(-3px, 2px); } 100% { transform: translate(0); } }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 229, 255, 0.3); border-radius: 50%; display: none; touch-action: none; z-index: 50; pointer-events: all; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: radial-gradient(circle, var(--neon-blue), #008699); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); touch-action: none; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 class="glitch" style="color: var(--neon-blue); font-size: clamp(32px, 8vw, 64px); margin-bottom: 5px;">NEON SURVIVOR</h1>
    <p style="color: #6688aa; letter-spacing: 2px; font-size: 14px; margin-bottom: 30px;">CYBERNETIC ENGINE INITIALISED</p>
    <button id="start-btn">ENGAGE RUN</button>
</div>

<div id="ui">
    <div id="scoreBox">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: clamp(12px, 3vw, 14px); color: var(--neon-green);">WALLET: <span id="shardText">0</span> 💎</div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px; letter-spacing: 2px;">LVL <span id="lvlText">1</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
    <div style="font-size: 11px; color: #8af; margin-top: 4px; letter-spacing: 1px;">EQUIPPED: <span id="weaponText">Laser Pistol</span></div>
</div>

<div id="boss-ui">
    <div style="color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 4px; font-size: 14px;">NEON WARDEN</div>
    <div class="boss-bar-bg"><div id="boss-hp-fill"></div></div>
</div>

<div id="overlay">
    <h1 style="color: var(--neon-green); font-size: clamp(24px, 5vw, 36px);">AUGMENT CHOSEN</h1>
    <div id="choices" class="card-container"></div>
</div>

<div id="shop-overlay">
    <h1 style="color:var(--neon-pink)" class="glitch">SYSTEM TERMINATED</h1>
    <h2 style="color:#fff; font-size: 18px;">TOTAL SHARDS: <span id="walletShards">0</span> 💎</h2>
    <div id="shop-items" class="card-container"></div>
    <button onclick="location.reload()">RE-INITIALIZE RUN</button>
</div>

<div id="joystick-zone"><div id="joystick-stick"></div></div>

<canvas id="game"></canvas>

<script>
// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq, type, dur, vol=0.05) {
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}

// --- SETUP ---
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, player, enemies = [], bullets = [], particles = [], numbers = [], boss = null, camera = {x: 0, y: 0};
const SAVE_KEY = "neon_survivor_v6_final";

// Persistent Data Model Setup
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { 
    shards: 0, 
    upgrades: { hp: 0, dmg: 0, speed: 0, shotgun: 0, railgun: 0, plasma: 0 } 
};

function saveMetaData() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
}

const state = { 
    inMenu: true, running: false, score: 0, sessionShards: 0, 
    time: 0, shake: 0, diffMult: 1, bossSpawned: false, choiceActive: false 
};
let keys = {};

let isMobile = false;
let touchInput = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, moveX: 0, moveY: 0 };
let mousePos = { x: 0, y: 0 };
let lastTime = 0;
let spawnTimer = 0;
let shootTimer = 0;

function initAudio() { if(audioCtx.state === 'suspended') audioCtx.resume(); }
window.onkeydown = e => { if (!state.choiceActive) keys[e.code] = true; initAudio(); };
window.onkeyup = e => keys[e.code] = false;
window.onmousemove = e => { mousePos.x = e.clientX; mousePos.y = e.clientY; };

const resize = () => { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
};
window.onresize = resize; window.addEventListener('orientationchange', () => setTimeout(resize, 200)); resize();

// --- VIRTUAL JOYSTICK CONTROLLER ---
const joyZone = document.getElementById('joystick-zone');
const joyStick = document.getElementById('joystick-stick');
const joyMaxRadius = 45;

function setupMobileControls() {
    window.addEventListener('touchstart', () => {
        if(!isMobile && !state.inMenu) { isMobile = true; joyZone.style.display = "block"; }
        initAudio();
    }, {passive: true});

    joyZone.addEventListener('touchstart', (e) => {
        const b = joyZone.getBoundingClientRect();
        touchInput.startX = b.left + b.width / 2;
        touchInput.startY = b.top + b.height / 2;
        touchInput.active = true;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        if (!touchInput.active) return;
        const t = e.touches[0];
        let dx = t.clientX - touchInput.startX;
        let dy = t.clientY - touchInput.startY;
        let dist = Math.hypot(dx, dy);
        
        if (dist > joyMaxRadius) {
            dx = (dx / dist) * joyMaxRadius;
            dy = (dy / dist) * joyMaxRadius;
        }
        
        joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
        touchInput.moveX = dx / joyMaxRadius;
        touchInput.moveY = dy / joyMaxRadius;
    }, {passive: false});

    window.addEventListener('touchend', () => {
        touchInput.active = false;
        touchInput.moveX = 0;
        touchInput.moveY = 0;
        joyStick.style.transform = "translate(0px, 0px)";
    });
}
setupMobileControls();

// --- WEAPON SCHEMATICS ---
const WEAPON_TYPES = {
    pistol: { name: "Laser Pistol", cd: 22, speed: 9, spread: 0, count: 1, color: '#ccff00', size: 4, pierce: false },
    shotgun: { name: "Spread Shotgun", cd: 48, speed: 7.5, spread: 0.24, count: 4, color: '#ffaa00', size: 4.5, pierce: false },
    railgun: { name: "Hyper Railgun", cd: 65, speed: 18, spread: 0, count: 1, color: '#00e5ff', size: 7, pierce: true }
};

// --- VISUAL DAMAGE NUMBERS CLASS ---
class DamageNumber {
    constructor(x, y, text, color = '#ff0055') {
        this.x = x + (Math.random() - 0.5) * 15;
        this.y = y - 10;
        this.text = text;
        this.color = color;
        this.alpha = 1;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = -2 - Math.random() * 1.5;
        this.life = 35;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 0.08 * dt; // gravity drop drift
        this.life -= dt;
        this.alpha = Math.max(0, this.life / 35);
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.font = `bold ${this.text.toString().includes('CRIT') ? '16px' : '12px'} 'Segoe UI', sans-serif`;
        ctx.shadowBlur = 4;
        ctx.shadowColor = this.color;
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}

// --- GAME ENTITIES ---
class Player {
    constructor() {
        this.x = 0; this.y = 0; this.radius = 16;
        this.maxHp = 100 + (meta.upgrades.hp * 20); this.hp = this.maxHp;
        this.speed = 3 + (meta.upgrades.speed * 0.4);
        this.level = 1; this.xp = 0; this.xpNeeded = 50;
        this.baseDmg = 10 + (meta.upgrades.dmg * 3);
        this.currentWeapon = 'pistol';
    }
    update(dt) {
        let mx = 0, my = 0;
        if (isMobile) {
            mx = touchInput.moveX; my = touchInput.moveY;
        } else {
            if (keys['KeyW'] || keys['ArrowUp']) my = -1;
            if (keys['KeyS'] || keys['ArrowDown']) my = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) mx = -1;
            if (keys['KeyD'] || keys['ArrowRight']) mx = 1;
            if (mx !== 0 && my !== 0) { mx *= 0.7071; my *= 0.7071; }
        }
        this.x += mx * this.speed * dt;
        this.y += my * this.speed * dt;
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
        ctx.fillStyle = '#00e5ff'; ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, variant = 'grunt') {
        this.x = x; this.y = y; this.variant = variant;
        this.frame = 0;
        
        switch(variant) {
            case 'swiper': 
                this.radius = 10; this.speed = 2.6; this.hp = 8 * state.diffMult;
                this.color = '#ff0055'; break;
            case 'tank': 
                this.radius = 22; this.speed = 1.0; this.hp = 65 * state.diffMult;
                this.color = '#bd00ff'; break;
            case 'boss': 
                this.radius = 42; this.speed = 1.2; this.hp = 1200 * state.diffMult;
                this.color = '#ff0055'; break;
            case 'grunt':
            default: 
                this.radius = 13; this.speed = 1.7; this.hp = 18 * state.diffMult;
                this.color = '#00ffaa'; break;
        }
        this.maxHp = this.hp;
    }
    update(dt) {
        this.frame += dt;
        let angle = Math.atan2(player.y - this.y, player.x - this.x);
        
        if (this.variant === 'swiper') {
            angle += Math.sin(this.frame * 0.12) * 0.2;
        }
        
        this.x += Math.cos(angle) * this.speed * dt;
        this.y += Math.sin(angle) * this.speed * dt;
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = 12; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color; ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        
        if (this.variant === 'tank' && this.hp < this.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(this.x - 20, this.y - 28, 40, 4);
            ctx.fillStyle = '#bd00ff'; ctx.fillRect(this.x - 20, this.y - 28, (this.hp / this.maxHp) * 40, 4);
        }
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, angle, wpn, dmg) {
        this.x = x; this.y = y; this.angle = angle;
        this.speed = wpn.speed; this.color = wpn.color; this.size = wpn.size;
        this.pierce = wpn.pierce;
        this.dmg = dmg; this.life = 90;
    }
    update(dt) {
        this.x += Math.cos(this.angle) * this.speed * dt;
        this.y += Math.sin(this.angle) * this.speed * dt;
        this.life -= dt;
    }
    draw() {
        ctx.fillStyle = this.color; ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    }
}

// --- PROCEDURAL GRID SYSTEM ---
function drawProceduralGrid() {
    const gridSize = 100;
    // Calculate boundaries matching localized viewport viewport coordinates
    let startX = Math.floor((camera.x - w / 2) / gridSize) * gridSize;
    let endX = Math.ceil((camera.x + w / 2) / gridSize) * gridSize;
    let startY = Math.floor((camera.y - h / 2) / gridSize) * gridSize;
    let endY = Math.ceil((camera.y + h / 2) / gridSize) * gridSize;

    ctx.save();
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
    ctx.lineWidth = 1;

    for (let x = startX; x <= endX; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, startY);
        ctx.lineTo(x, endY);
        ctx.stroke();
    }
    for (let y = startY; y <= endY; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(startX, y);
        ctx.lineTo(endX, y);
        ctx.stroke();
    }
    ctx.restore();
}

// --- ENGINE LOGIC ---
function spawnEnemy() {
    if (!state.running || state.choiceActive) return;
    
    let angle = Math.random() * Math.PI * 2;
    let dist = Math.max(w, h) / 2 + 60;
    let ex = player.x + Math.cos(angle) * dist;
    let ey = player.y + Math.sin(angle) * dist;
    
    let type = 'grunt';
    let roll = Math.random();
    
    if (state.score > 1500) {
        type = roll < 0.35 ? 'swiper' : (roll < 0.7 ? 'tank' : 'grunt');
    } else if (state.score > 500) {
        type = roll < 0.3 ? 'swiper' : 'grunt';
    }
    
    if (state.score >= 3000 && !state.bossSpawned) {
        type = 'boss'; state.bossSpawned = true; boss = new Enemy(ex, ey, 'boss');
        enemies.push(boss);
        document.getElementById('boss-ui').style.display = 'flex';
        playSfx(100, 'sawtooth', 0.8, 0.1);
        return;
    }
    
    if (type !== 'boss') enemies.push(new Enemy(ex, ey, type));
}

function handleFire(dt) {
    shootTimer += dt;
    const wpn = WEAPON_TYPES[player.currentWeapon];
    
    if (shootTimer >= wpn.cd) {
        shootTimer = 0;
        let baseAngle = 0;
        
        if (isMobile) {
            if (touchInput.moveX === 0 && touchInput.moveY === 0) return;
            baseAngle = Math.atan2(touchInput.moveY, touchInput.moveX);
        } else {
            let worldMouseX = mousePos.x + camera.x - w/2;
            let worldMouseY = mousePos.y + camera.y - h/2;
            baseAngle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);
        }
        
        let halfSpread = ((wpn.count - 1) * wpn.spread) / 2;
        for (let i = 0; i < wpn.count; i++) {
            let offset = wpn.count > 1 ? (-halfSpread + (i * wpn.spread)) : 0;
            bullets.push(new Bullet(player.x, player.y, baseAngle + offset, wpn, player.baseDmg));
        }
        playSfx(player.currentWeapon === 'railgun' ? 550 : 400, 'triangle', 0.09, 0.04);
    }
}

function checkCollisions() {
    bullets.forEach(b => {
        enemies.forEach(e => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.size) {
                // Calculation algorithms for random localized critical strike strikes
                let isCrit = Math.random() < 0.15;
                let finalDmg = Math.floor(b.dmg * (isCrit ? 1.8 : 1));
                
                e.hp -= finalDmg; 
                if(!b.pierce) b.life = 0;
                
                // Add new floating combat string text instances
                numbers.push(new DamageNumber(e.x, e.y, isCrit ? `${finalDmg}! CRIT` : finalDmg, isCrit ? '#ccff00' : '#ffffff'));
                playSfx(isCrit ? 300 : 200, 'sine', 0.05, 0.03);
                
                if (e.hp <= 0) {
                    if (e.variant === 'boss') {
                        state.score += 2000; state.sessionShards += 35;
                        document.getElementById('boss-ui').style.display = 'none';
                        boss = null;
                    } else {
                        state.score += e.variant === 'tank' ? 35 : 10;
                        player.xp += e.variant === 'tank' ? 25 : 12;
                        if (Math.random() < 0.15) state.sessionShards++;
                    }
                }
            }
        });
    });

    enemies.forEach(e => {
        if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
            let dmg = e.variant === 'boss' ? 1.5 : (e.variant === 'tank' ? 0.7 : 0.4);
            player.hp -= dmg;
            state.shake = 10;
            if (player.hp <= 0) triggerGameOver();
        }
    });

    bullets = bullets.filter(b => b.life > 0);
    enemies = enemies.filter(e => e.hp > 0);
    
    if (player.xp >= player.xpNeeded) triggerAugmentMenu();
}

// --- WEAPON SELECTION & LEVEL IN-GAME MENU ---
function triggerAugmentMenu() {
    state.choiceActive = true;
    keys = {};
    player.xp -= player.xpNeeded; player.level++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.45);
    
    const container = document.getElementById('choices');
    container.innerHTML = '';
    
    let pool = [
        { type: 'wpn', id: 'shotgun', name: "Spread Shotgun", desc: "Unlocks wide spread close combat burst weapon" },
        { type: 'wpn', id: 'railgun', name: "Hyper Railgun", desc: "Unlocks heavy piercing infinite linear shot weapon" },
        { type: 'stat', id: 'heal', name: "Repair Pulse", desc: "Instantly recharges total structural integrity metrics" },
        { type: 'stat', id: 'dmg', name: "Overclock Drive", desc: "Adds permanent +4 Damage upgrade value" }
    ];
    
    let choices = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
    
    choices.forEach(opt => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${opt.name}</h3><p>${opt.desc}</p>`;
        card.onclick = () => {
            if(opt.type === 'wpn') player.currentWeapon = opt.id;
            if(opt.id === 'heal') player.hp = player.maxHp;
            if(opt.id === 'dmg') player.baseDmg += 4;
            
            document.getElementById('overlay').style.display = 'none';
            state.choiceActive = false;
        };
        container.appendChild(card);
    });
    
    document.getElementById('overlay').style.display = 'flex';
    playSfx(600, 'sine', 0.25, 0.05);
}

// --- SHOP RUN SYSTEM ---
function renderMetaShop() {
    const shop = document.getElementById('shop-items');
    shop.innerHTML = '';
    
    let items = [
        { id: 'hp', name: "Structural Hull", cost: 10, current: meta.upgrades.hp, desc: "+20 Max Permanent Health Pools" },
        { id: 'dmg', name: "Matrix Amps", cost: 15, current: meta.upgrades.dmg, desc: "+3 Permanent Base Core Damage Factor" },
        { id: 'speed', name: "Engine Thrusters", cost: 12, current: meta.upgrades.speed, desc: "+0.4 Fast Movement Velocity Speed" }
    ];
    
    items.forEach(item => {
        let block = document.createElement('div');
        let broke = meta.shards < item.cost;
        block.className = `shop-item ${broke ? 'disabled' : ''}`;
        block.innerHTML = `<h3>${item.name}</h3><p>${item.desc}</p><b>Cost: ${item.cost} 💎 (Rank ${item.current})</b>`;
        
        block.onclick = () => {
            if(meta.shards >= item.cost) {
                meta.shards -= item.cost;
                meta.upgrades[item.id]++;
                saveMetaData();
                renderMetaShop();
                document.getElementById('walletShards').innerText = meta.shards;
            }
        };
        shop.appendChild(block);
    });
}

function updateUI() {
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('shardText').innerText = state.sessionShards;
    document.getElementById('lvlText').innerText = player.level;
    document.getElementById('weaponText').innerText = WEAPON_TYPES[player.currentWeapon].name;
    document.getElementById('hp-bar').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
    document.getElementById('xp-bar').style.width = `${Math.min(100, (player.xp / player.xpNeeded) * 100)}%`;
    
    if(boss && state.bossSpawned) {
        document.getElementById('boss-hp-fill').style.width = `${Math.max(0, (boss.hp / boss.maxHp) * 100)}%`;
    }
}

function triggerGameOver() {
    state.running = false;
    meta.shards += state.sessionShards;
    saveMetaData();
    
    document.getElementById('ui').style.display = 'none';
    document.getElementById('boss-ui').style.display = 'none';
    document.getElementById('walletShards').innerText = meta.shards;
    
    renderMetaShop();
    document.getElementById('shop-overlay').style.display = 'flex';
}

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 16.666;
    lastTime = timestamp;

    if (state.running && !state.choiceActive) {
        ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, w, h);
        state.time += dt;
        state.diffMult = 1 + (state.time * 0.0005);

        spawnTimer += dt;
        if (spawnTimer >= Math.max(12, 36 - (state.time * 0.004))) { spawnEnemy(); spawnTimer = 0; }

        player.update(dt);
        handleFire(dt);
        enemies.forEach(e => e.update(dt));

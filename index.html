<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR: ZENITH EDITION</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-pink: #ff0055; --neon-green: #ccff00; --neon-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        #ui { display: none; position: absolute; inset: 20px; pointer-events: none; z-index: 10; text-shadow: 0 0 10px rgba(0,229,255,0.5); }
        .bar-container { width: clamp(160px, 35vw, 240px); height: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin: 8px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--neon-pink), #ff5e00); width: 100%; transition: width 0.2s; }
        #xp-bar { height: 100%; background: linear-gradient(90deg, var(--neon-blue), #00ffa2); width: 0%; transition: width 0.2s; }
        #skill-bar { height: 100%; background: var(--neon-purple); width: 0%; box-shadow: 0 0 15px var(--neon-purple); }
        
        #menu-overlay, #shop-overlay, #level-up-ui { position: absolute; inset: 0; background: radial-gradient(circle, rgba(10,20,40,0.9) 0%, rgba(2,4,10,1) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        #shop-overlay, #level-up-ui { display: none; }
        
        .upgrade-card, .perk-card { background: rgba(255,255,255,0.03); border: 1px solid var(--neon-blue); padding: 20px; border-radius: 15px; width: 150px; text-align: center; cursor: pointer; margin: 10px; transition: 0.3s; pointer-events: auto; }
        .upgrade-card:hover, .perk-card:hover { background: var(--neon-blue); color: #000; transform: scale(1.1); box-shadow: 0 0 30px var(--neon-blue); }
        
        button { padding: 18px 50px; background: var(--neon-blue); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 18px; transition: 0.3s; pointer-events: auto; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%,64% { transform: translate(2px,0); } 4%,60% { transform: translate(-2px,0); } }
        #notif { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 30px; color: var(--neon-pink); opacity: 0; transition: 0.5s; pointer-events: none; z-index: 200; font-weight: bold; }
    </style>
</head>
<body>

<div id="notif">BOSS INBOUND</div>

<div id="menu-overlay">
    <h1 class="glitch" style="color: var(--neon-blue); font-size: clamp(40px, 10vw, 80px); margin: 0;">NEON SURVIVOR</h1>
    <p id="total-stats" style="color: #6688aa; margin-bottom: 20px;">ZENITH PROTOCOL</p>
    <button id="start-btn">INITIALIZE CORE</button>
</div>

<div id="ui">
    <div id="scoreBox">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 14px; color: var(--neon-green);">SHARDS: <span id="shardText">0</span> 💎</div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
    <div style="font-size: 12px;">LVL <span id="lvlText">1</span> | DASH (SHIFT/DBL TAP)</div>
    <div class="bar-container"><div id="skill-bar"></div></div>
</div>

<div id="level-up-ui">
    <h1 style="color:var(--neon-green)" class="glitch">EVOLUTION READY</h1>
    <div id="perk-list" style="display:flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<div id="shop-overlay">
    <h1 style="color:var(--neon-pink); font-size: 40px;" class="glitch">CORE DEPLETED</h1>
    <h2 id="walletDisplay" style="color: var(--neon-green)">0 💎</h2>
    <div style="display:flex; flex-wrap: wrap; justify-content: center;">
        <div class="upgrade-card" onclick="buyMeta('hp')"><b>+ ARMOR</b><br><span id="cost-hp">100</span> 💎</div>
        <div class="upgrade-card" onclick="buyMeta('speed')"><b>+ ENGINE</b><br><span id="cost-speed">100</span> 💎</div>
    </div>
    <button onclick="location.reload()" style="margin-top: 30px;">REBOOT RUN</button>
</div>

<div id="joystick-zone" style="position:absolute; bottom:50px; left:50px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.03); border:2px solid rgba(0,229,255,0.2); display:none; z-index:50;">
    <div id="joystick-stick" style="position:absolute; top:35px; left:35px; width:50px; height:50px; border-radius:50%; background:var(--neon-blue); pointer-events:none;"></div>
</div>

<canvas id="game"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');

let w, h, player, enemies = [], lasers = [], enemyLasers = [], stars = [];
let skillTimer = 0, lastFire = 0, shake = 0, dashTimer = 0, lastTapTime = 0;
let joyPos = { x: 0, y: 0, active: false };

const SAVE_KEY = "neon_zenith_v5";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, hpLvl: 0, speedLvl: 0, bestScore: 0 };
const state = { running: false, score: 0, shards: 0, lvl: 1, xp: 0, xpToNext: 100, skillCooldown: 5000, dashCooldown: 1500 };
let keys = {};

const PERKS = [
    { name: "MULTI-SHOT", action: () => player.bullets++ },
    { name: "RAPID FIRE", action: () => player.fireRate *= 0.7 },
    { name: "REGEN", action: () => player.hp = Math.min(player.hp + 50, player.maxHp) },
    { name: "VOID DASH", action: () => state.dashCooldown *= 0.7 }
];

if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    document.getElementById('joystick-zone').style.display = 'block';
    window.addEventListener('touchstart', e => { 
        if(e.touches[0].clientX < window.innerWidth / 2) {
            let now = Date.now();
            if(now - lastTapTime < 300) activateDash();
            lastTapTime = now;
            joyPos.active = true;
        } else activateSkill();
    });
    window.addEventListener('touchmove', e => { if(joyPos.active) updateJoy(e.touches[0]); }, {passive: false});
    window.addEventListener('touchend', () => { joyPos.active = false; });
}

function updateJoy(t) {
    const rect = document.getElementById('joystick-zone').getBoundingClientRect();
    const dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60), dist = Math.hypot(dx, dy);
    joyPos.x = dx / (dist || 1); joyPos.y = dy / (dist || 1);
    document.getElementById('joystick-stick').style.transform = `translate(${joyPos.x*30}px, ${joyPos.y*30}px)`;
}

function playSfx(f, t, d, v=0.03) {
    try {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

function activateDash() {
    if(Date.now() - dashTimer < state.dashCooldown) return;
    dashTimer = Date.now(); player.isDashing = 20; playSfx(800, 'sine', 0.2);
}

function activateSkill() {
    if(Date.now() - skillTimer < state.skillCooldown) return;
    skillTimer = Date.now(); shake = 25; playSfx(100, 'square', 0.5);
    enemies.forEach(en => { if(Math.hypot(en.x - player.x, en.y - player.y) < 200) en.hp -= 100; });
}

function spawnEnemy() {
    if(!state.running) return;
    if(state.lvl % 5 === 0 && !enemies.some(e => e.type === 'boss')) {
        const n = document.getElementById('notif');
        n.style.opacity = 1; setTimeout(() => n.style.opacity = 0, 3000);
        enemies.push({ x: w/2, y: -100, hp: 500, maxHp: 500, speed: 0.5, r: 50, color: '#ff0055', type: 'boss', lastShot: 0 });
        return;
    }
    const type = Math.random();
    let en = { x: Math.random() > 0.5 ? -30 : w+30, y: Math.random()*h, hp: 10, speed: 2.2, r: 10, color: '#00e5ff', type: 'chaser' };
    if(type > 0.8) { en.type = 'shooter'; en.color = '#bd00ff'; en.hp = 20; en.lastShot = 0; }
    enemies.push(en);
}

function buyMeta(type) {
    let cost = 100 + (meta[type+'Lvl'] * 150);
    if(meta.shards >= cost) {
        meta.shards -= cost; meta[type+'Lvl']++;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        document.getElementById('walletDisplay').innerText = meta.shards + " 💎";
        document.getElementById('cost-hp').innerText = 100 + (meta.hpLvl * 150);
        document.getElementById('cost-speed').innerText = 100 + (meta.speedLvl * 150);
    }
}

function levelUp() {
    state.lvl++; state.xp = 0; state.xpToNext *= 1.3; state.running = false;
    const ui = document.getElementById('level-up-ui'), list = document.getElementById('perk-list');
    list.innerHTML = ''; ui.style.display = 'flex';
    [...PERKS].sort(() => 0.5 - Math.random()).slice(0, 3).forEach(perk => {
        const div = document.createElement('div');
        div.className = 'perk-card'; div.innerHTML = `<b>${perk.name}</b>`;
        div.onclick = () => { perk.action(); ui.style.display = 'none'; state.running = true; loop(); };
        list.appendChild(div);
    });
}

function loop() {
    if(!state.running) return;

    let vx = 0, vy = 0;
    if(keys['KeyW']) vy = -1; if(keys['KeyS']) vy = 1;
    if(keys['KeyA']) vx = -1; if(keys['KeyD']) vx = 1;
    if(joyPos.active) { vx = joyPos.x; vy = joyPos.y; }
    
    let speedMult = player.isDashing ? 4 : 1;
    if(player.isDashing) player.isDashing--;
    player.x = Math.max(0, Math.min(w, player.x + vx * player.speed * speedMult));
    player.y = Math.max(0, Math.min(h, player.y + vy * player.speed * speedMult));

    if(Date.now() - lastFire > player.fireRate) {
        for(let i=0; i<player.bullets; i++) lasers.push({ x: player.x, y: player.y, vx: 12, vy: (i - (player.bullets-1)/2)*2 });
        lastFire = Date.now();
    }

    enemies.forEach((en, ei) => {
        const dist = Math.hypot(player.x - en.x, player.y - en.y);
        const ang = Math.atan2(player.y - en.y, player.x - en.x);

        if(en.type === 'boss') {
            en.y += Math.sin(Date.now()/1000) * 2;
            en.x += (player.x > en.x ? 1 : -1) * en.speed;
            if(Date.now() - en.lastShot > 1000) {
                for(let i=0; i<8; i++) {
                    let a = (Math.PI*2/8)*i;
                    enemyLasers.push({x: en.x, y: en.y, vx: Math.cos(a)*3, vy: Math.sin(a)*3});
                }
                en.lastShot = Date.now();
            }
        } else if(en.type === 'shooter' && dist < 300) {
            if(Date.now() - en.lastShot > 2000) {
                enemyLasers.push({x: en.x, y: en.y, vx: Math.cos(ang)*5, vy: Math.sin(ang)*5});
                en.lastShot = Date.now();
            }
        } else {
            en.x += Math.cos(ang) * en.speed; en.y += Math.sin(ang) * en.speed;
        }

        if(dist < en.r + 10 && !player.isDashing) { player.hp -= 0.5; shake = 10; }

        lasers.forEach((l, li) => {
            if(Math.hypot(l.x - en.x, l.y - en.y) < en.r) {
                en.hp -= 10; lasers.splice(li, 1);
                if(en.hp <= 0) {
                    enemies.splice(ei, 1);
                    state.score += en.type === 'boss' ? 500 : 10;
                    state.xp += en.type === 'boss' ? 200 : 30;
                    if(Math.random() > 0.8) state.shards++;
                    if(state.xp >= state.xpToNext) levelUp();
                }
            }
        });
    });

    enemyLasers.forEach((el, eli) => {
        el.x += el.vx; el.y += el.vy;
        if(Math.hypot(player.x - el.x, player.y - el.y) < 15 && !player.isDashing) {
            player.hp -= 10; shake = 15; enemyLasers.splice(eli, 1);
        }
        if(el.x < 0 || el.x > w || el.y < 0 || el.y > h) enemyLasers.splice(eli, 1);
    });

    if(player.hp <= 0) {
        state.running = false; meta.shards += state.shards;
        if(state.score > meta.bestScore) meta.bestScore = state.score;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        document.getElementById('shop-overlay').style.display = 'flex';
        document.getElementById('walletDisplay').innerText = meta.shards + " 💎";
    }

    lasers.forEach((l, i) => { l.x += l.vx; l.y += l.vy; if(l.x > w) lasers.splice(i, 1); });

    ctx.fillStyle = '#02040a'; ctx.fillRect(0,0,w,h);
    ctx.save();
    if(shake > 0) { ctx.translate(Math.random()*shake, Math.random()*shake); shake *= 0.9; }
    
    ctx.fillStyle = '#ccff00'; ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, 7); ctx.fill();
    enemies.forEach(en => {
        ctx.fillStyle = en.color; ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, 7); ctx.fill();
        if(en.type === 'boss') {
            ctx.fillStyle = '#333'; ctx.fillRect(en.x - 50, en.y - 70, 100, 10);
            ctx.fillStyle = '#ff0055'; ctx.fillRect(en.x - 50, en.y - 70, (en.hp/en.maxHp)*100, 10);
        }
    });

    ctx.strokeStyle = '#bd00ff'; ctx.lineWidth = 3;
    lasers.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x-10, l.y); ctx.stroke(); });
    ctx.strokeStyle = '#ff0055'; 
    enemyLasers.forEach(el => { ctx.beginPath(); ctx.arc(el.x, el.y, 5, 0, 7); ctx.stroke(); });
    ctx.restore();

    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('xp-bar').style.width = (state.xp / state.xpToNext * 100) + "%";
    document.getElementById('skill-bar').style.width = Math.min(100, ((Date.now() - skillTimer) / state.skillCooldown) * 100) + "%";
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('shardText').innerText = state.shards;
    document.getElementById('lvlText').innerText = state.lvl;

    requestAnimationFrame(loop);
}

window.onkeydown = e => { 
    keys[e.code] = true; 
    if(e.code === 'Space') activateSkill();
    if(e.code === 'ShiftLeft') activateDash();
};
window.onkeyup = e => keys[e.code] = false;
document.getElementById('start-btn').onclick = () => {
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    state.running = true;
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    player = { x: w/2, y: h/2, hp: 100 + meta.hpLvl*20, maxHp: 100 + meta.hpLvl*20, speed: 4 + meta.speedLvl*0.5, bullets: 1, fireRate: 400 };
    setInterval(spawnEnemy, 1000);
    loop();
};
document.getElementById('total-stats').innerText = "BEST RECORD: " + meta.bestScore;
</script>
</body>
</html>

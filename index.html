<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>Glow Survival Complete</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Touch Move Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f0f2f5;
            overflow: hidden;
            position: relative;
        }

        #box {
            width: 80px;
            height: 80px;
            background-color: #007bff;
            border-radius: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            touch-action: none; 
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="box"></div>

    <script>
        const box = document.getElementById('box');
        let isDragging = false;
        let startX, startY;
        let initialX, initialY;

        // Start tracking the touch position
        box.addEventListener('touchstart', (e) => {
            isDragging = true;
            
            // Get the current position of the box
            const style = window.getComputedStyle(box);
            initialX = parseInt(style.left, 10);
            initialY = parseInt(style.top, 10);

            // Get the touch input coordinates
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        // Move the element as the finger slides
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;

            // Calculate change in position
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;

            // Apply new coordinates to the element
            box.style.left = `${initialX + deltaX}px`;
            box.style.top = `${initialY + deltaY}px`;
        }, { passive: true });

        // Stop tracking when finger is lifted
        window.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #090b14;
    touch-action: none;
    user-select: none;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    z-index: 10;
}

#score {
    font-size: 30px;
    font-weight: bold;
}

#combo {
    font-size: 20px;
    color: #ffe600;
    margin-top: 5px;
}

#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    display: none;
    z-index: 20;
}

#gameOver h1 {
    font-size: 60px;
    margin: 0;
}

#finalScore {
    font-size: 28px;
    margin-top: 10px;
}

button {
    margin-top: 20px;
    padding: 16px 32px;
    border: none;
    border-radius: 16px;
    background: #00e5ff;
    color: black;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="combo">x1</div>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>

    <div id="finalScore">
        Score: 0
    </div>

    <button onclick="restartGame()">
        PLAY AGAIN
    </button>
</div>

<canvas id="game"></canvas>

<script>
// =========================
// CANVAS
// =========================

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// UI
// =========================

const scoreText =
document.getElementById("score");

const comboText =
document.getElementById("combo");

const gameOverScreen =
document.getElementById("gameOver");

const finalScoreText =
document.getElementById("finalScore");

// =========================
// KEYBOARD
// =========================

const keys = {
    up: false,
    down: false,
    left: false,
    right: false
};

document.addEventListener("keydown", e => {

    if (e.key === "ArrowUp" || e.key === "w") {
        keys.up = true;
    }

    if (e.key === "ArrowDown" || e.key === "s") {
        keys.down = true;
    }

    if (e.key === "ArrowLeft" || e.key === "a") {
        keys.left = true;
    }

    if (e.key === "ArrowRight" || e.key === "d") {
        keys.right = true;
    }
});

document.addEventListener("keyup", e => {

    if (e.key === "ArrowUp" || e.key === "w") {
        keys.up = false;
    }

    if (e.key === "ArrowDown" || e.key === "s") {
        keys.down = false;
    }

    if (e.key === "ArrowLeft" || e.key === "a") {
        keys.left = false;
    }

    if (e.key === "ArrowRight" || e.key === "d") {
        keys.right = false;
    }
});

// =========================
// GAME VARIABLES
// =========================

let player;

let enemies = [];
let gems = [];
let particles = [];

let score = 0;
let combo = 1;

let running = false;

let spawnTimeout;
let lastTime = 0;

// =========================
// PLAYER
// =========================

class Player {

    constructor() {

        this.x = canvas.width / 2;
        this.y = canvas.height / 2;

        this.radius = 22;
        this.speed = 6;
    }

    update(delta) {

        const moveSpeed =
        this.speed * delta * 0.06;

        if (keys.up) {
            this.y -= moveSpeed;
        }

        if (keys.down) {
            this.y += moveSpeed;
        }

        if (keys.left) {
            this.x -= moveSpeed;
        }

        if (keys.right) {
            this.x += moveSpeed;
        }

        // SCREEN LIMITS

        if (this.x < this.radius) {
            this.x = this.radius;
        }

        if (this.x >
            canvas.width - this.radius) {

            this.x =
            canvas.width - this.radius;
        }

        if (this.y < this.radius) {
            this.y = this.radius;
        }

        if (this.y >
            canvas.height - this.radius) {

            this.y =
            canvas.height - this.radius;
        }
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#00e5ff";

        ctx.shadowBlur = 25;
        ctx.shadowColor = "#00e5ff";

        ctx.fill();
    }
}

// =========================
// ENEMY
// =========================

class Enemy {

    constructor() {

        this.radius =
        Math.random() * 20 + 16;

        const side =
        Math.floor(Math.random() * 4);

        if (side === 0) {
            this.x = -50;
            this.y =
            Math.random() * canvas.height;
        }

        if (side === 1) {
            this.x = canvas.width + 50;
            this.y =
            Math.random() * canvas.height;
        }

        if (side === 2) {
            this.x =
            Math.random() * canvas.width;
            this.y = -50;
        }

        if (side === 3) {
            this.x =
            Math.random() * canvas.width;
            this.y = canvas.height + 50;
        }

        this.speed =
        Math.random() * 2 + 1.5;

        this.color =
        `hsl(${Math.random()*360},
        100%,60%)`;
    }

    update(delta) {

        const angle =
        Math.atan2(
            player.y - this.y,
            player.x - this.x
        );

        this.x +=
        Math.cos(angle)
        * this.speed
        * delta * 0.06;

        this.y +=
        Math.sin(angle)
        * this.speed
        * delta * 0.06;
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = this.color;

        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;

        ctx.fill();
    }
}

// =========================
// GEM
// =========================

class Gem {

    constructor() {

        this.radius = 12;

        this.x =
        Math.random()
        * (canvas.width - 100) + 50;

        this.y =
        Math.random()
        * (canvas.height - 100) + 50;
    }

    draw() {

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#ffe600";

        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffe600";

        ctx.fill();
    }
}

// =========================
// PARTICLES
// =========================

class Particle {

    constructor(x, y, color) {

        this.x = x;
        this.y = y;

        this.size =
        Math.random() * 5 + 2;

        this.speedX =
        (Math.random() - 0.5) * 8;

        this.speedY =
        (Math.random() - 0.5) * 8;

        this.life = 40;

        this.color = color;
    }

    update() {

        this.x += this.speedX;
        this.y += this.speedY;

        this.life--;
    }

    draw() {

        ctx.globalAlpha =
        this.life / 40;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = this.color;

        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

// =========================
// EFFECTS
// =========================

function createExplosion(x, y, color) {

    for (let i = 0; i < 15; i++) {

        particles.push(
            new Particle(x, y, color)
        );
    }
}

// =========================
// ENEMY SPAWNING
// =========================

function spawnEnemies() {

    if (!running) return;

    enemies.push(new Enemy());

    const delay =
    Math.max(250, 1200 - score * 2);

    spawnTimeout =
    setTimeout(spawnEnemies, delay);
}

// =========================
// COMBO
// =========================

function updateCombo() {

    if (score > 300) {

        combo = 10;

        comboText.innerText =
        "MEGA COMBO x10";
    }

    else if (score > 200) {

        combo = 5;

        comboText.innerText =
        "x5";
    }

    else if (score > 100) {

        combo = 2;

        comboText.innerText =
        "x2";
    }

    else {

        combo = 1;

        comboText.innerText =
        "x1";
    }
}

// =========================
// GAME LOOP
// =========================

function animate(timestamp) {

    if (!running) return;

    requestAnimationFrame(animate);

    const delta =
    timestamp - lastTime;

    lastTime = timestamp;

    ctx.fillStyle =
    "rgba(9,11,20,0.25)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    player.update(delta);
    player.draw();

    // GEMS

    gems.forEach((gem, gemIndex) => {

        gem.draw();

        const dist =
        Math.hypot(
            player.x - gem.x,
            player.y - gem.y
        );

        if (dist <
            player.radius + gem.radius) {

            score += 10 * combo;

            createExplosion(
                gem.x,
                gem.y,
                "#ffe600"
            );

            gems.splice(gemIndex, 1);

            gems.push(new Gem());

            updateCombo();
        }
    });

    // ENEMIES

    enemies.forEach(enemy => {

        enemy.update(delta);
        enemy.draw();

        const dist =
        Math.hypot(
            player.x - enemy.x,
            player.y - enemy.y
        );

        if (dist <
            player.radius +
            enemy.radius) {

            endGame();
        }
    });

    // PARTICLES

    particles.forEach((particle, index) => {

        particle.update();
        particle.draw();

        if (particle.life <= 0) {

            particles.splice(index, 1);
        }
    });

    score += delta * 0.01;

    scoreText.innerText =
    "Score: " + Math.floor(score);
}

// =========================
// START GAME
// =========================

function startGame() {

    score = 0;
    combo = 1;

    enemies = [];
    gems = [];
    particles = [];

    player = new Player();

    gems.push(new Gem());

    running = true;

    gameOverScreen.style.display =
    "none";

    spawnEnemies();

    requestAnimationFrame(animate);
}

// =========================
// END GAME
// =========================

function endGame() {

    running = false;

    clearTimeout(spawnTimeout);

    finalScoreText.innerText =
    "Score: " + Math.floor(score);

    gameOverScreen.style.display =
    "block";
}

// =========================
// RESTART
// =========================

function restartGame() {
    startGame();
}

// =========================
// RESIZE
// =========================

window.addEventListener("resize", () => {

    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

// =========================
// START
// =========================

startGame();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SURVIVOR: ROGUE BOSS EDITION</title>
    <style>
        body { margin: 0; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; inset: 20px; pointer-events: none; z-index: 10; }
        .bar-container { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0 15px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; transition: width 0.3s; }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #00ffaa); width: 0%; transition: width 0.3s; }
        
        #boss-ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; }
        .boss-bar-bg { width: 60vw; height: 12px; background: rgba(255,0,85,0.2); border: 1px solid #ff0055; border-radius: 6px; overflow: hidden; }
        #boss-hp-fill { height: 100%; background: #ff0055; box-shadow: 0 0 15px #ff0055; width: 100%; transition: width 0.1s; }

        #overlay, #shop-overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; }
        .card { background: #0a0f1e; border: 2px solid #00e5ff; padding: 20px; margin: 10px; width: 240px; cursor: pointer; text-align: center; border-radius: 15px; transition: 0.3s; }
        .card:hover:not(.disabled) { background: #00e5ff; color: #000; transform: translateY(-5px); box-shadow: 0 0 20px #00e5ff; }
        .disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; }
        
        button { padding: 15px 40px; background: #00e5ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        h1 { margin: 0 0 20px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 32px; font-weight: bold; color: #00e5ff;">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 14px; color: #ccff00;">SHARDS: <span id="shardText">0</span></div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px;">LEVEL <span id="lvlText">1</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
</div>

<div id="boss-ui">
    <div style="color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 4px;">NEON WARDEN</div>
    <div class="boss-bar-bg"><div id="boss-hp-fill"></div></div>
</div>

<div id="overlay">
    <h1 style="color:#00e5ff">AUGMENT SYSTEM</h1>
    <div id="choices" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<div id="shop-overlay">
    <h1 style="color:#ccff00">TOTAL SHARDS: <span id="totalShards">0</span></h1>
    <p>Install permanent hardware upgrades</p>
    <div id="shop-items" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
    <button onclick="location.reload()" style="margin-top:20px">INITIATE RUN</button>
</div>

<canvas id="game"></canvas>

<script>
// --- DATA PERSISTENCE ---
const SAVE_KEY = "neon_survivor_final";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { 
    shards: 0, 
    upgrades: { hp: 0, dmg: 0, speed: 0 } 
};
function saveMeta() { localStorage.setItem(SAVE_KEY, JSON.stringify(meta)); }

// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, t, d, v=0.05) {
    if(audioCtx.state === 'suspended') return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

// --- SETUP ---
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, cX, cY;
function resize() { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
    cX = w/2; cY = h/2; 
}
window.onresize = resize; resize();

const state = { running: true, score: 0, shards: 0, time: 0, shake: 0, bossActive: false };
const keys = {};
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(audioCtx.state === 'suspended') audioCtx.resume(); };
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

// --- CLASSES ---
class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 15;
        this.speed = 4.5 + (meta.upgrades.speed * 0.5);
        this.maxHp = 100 + (meta.upgrades.hp * 25);
        this.hp = this.maxHp;
        this.bulletDmg = 35 + (meta.upgrades.dmg * 10);
        this.xp = 0; this.nextXP = 100; this.lvl = 1;
        this.fireRate = 450; this.lastShot = 0; this.bulletCount = 1;
    }
    update() {
        let mx = 0, my = 0;
        if(keys['w']) my--; if(keys['s']) my++;
        if(keys['a']) mx--; if(keys['d']) mx++;
        const mag = Math.hypot(mx, my) || 1;
        this.x += (mx/mag)*this.speed; this.y += (my/mag)*this.speed;
        if(Date.now() - this.lastShot > this.fireRate) this.shoot();
    }
    shoot() {
        const target = enemies.reduce((p, c) => {
            const d = Math.hypot(c.x-this.x, c.y-this.y);
            return d < p.dist ? {o:c, dist:d} : p;
        }, {o:null, dist:900}).o;
        if(!target) return;
        this.lastShot = Date.now();
        playSfx(600, 'sine', 0.1);
        const a = Math.atan2(target.y-this.y, target.x-this.x);
        for(let i=0; i<this.bulletCount; i++) {
            bullets.push(new Bullet(this.x, this.y, a + (i-(this.bulletCount-1)/2)*0.2, this.bulletDmg, true));
        }
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type; this.kbX = 0; this.kbY = 0; this.lastShot = 0;
        const cfg = {
            grunt: { r:18, hp:70, s:2.5, c:'#ff0055', isBoss: false },
            sniper: { r:16, hp:50, s:1.5, c:'#ffee00', isBoss: false },
            boss: { r:60, hp:2000 + (player.lvl * 500), s:1, c:'#ff0055', isBoss: true, maxHp: 2000 + (player.lvl * 500) }
        };
        Object.assign(this, cfg[type]);
    }
    update() {
        const dist = Math.hypot(player.x-this.x, player.y-this.y);
        const a = Math.atan2(player.y-this.y, player.x-this.x);
        
        if(this.isBoss && state.time % 100 === 0) {
            for(let i=0; i<12; i++) bullets.push(new Bullet(this.x, this.y, (Math.PI*2/12)*i, 15, false));
            playSfx(100, 'square', 0.4);
        } else if(this.type === 'sniper' && dist < 400) {
            if(Date.now() - this.lastShot > 2000) {
                bullets.push(new Bullet(this.x, this.y, a, 15, false));
                this.lastShot = Date.now();
            }
        } else {
            this.x += Math.cos(a)*this.speed + this.kbX;
            this.y += Math.sin(a)*this.speed + this.kbY;
        }
        
        this.kbX *= 0.8; this.kbY *= 0.8;
        if(dist < this.r + player.r) { player.hp -= 0.5; state.shake = 5; }
    }
}

class Bullet {
    constructor(x,y,a,d,isPlayer) {
        this.x=x; this.y=y; this.a=a; this.d=d; this.isP=isPlayer;
        this.s = isPlayer ? 15 : 6; this.life = 100;
    }
    update() {
        this.x += Math.cos(this.a)*this.s; this.y += Math.sin(this.a)*this.s; this.life--;
        if(!this.isP && Math.hypot(this.x-player.x, this.y-player.y) < player.r) {
            player.hp -= 10; state.shake = 15; this.life = 0;
            playSfx(80, 'sawtooth', 0.2);
        }
    }
}

// --- GAME CONTROLLER ---
const player = new Player();
const enemies = [];
const bullets = [];

function spawnEnemy() {
    if(state.bossActive && enemies.some(e => e.isBoss)) return;
    const angle = Math.random() * Math.PI * 2;
    const dist = 700;
    const x = player.x + Math.cos(angle) * dist;
    const y = player.y + Math.sin(angle) * dist;

    if (state.score > 0 && state.score % 2000 === 0 && !state.bossActive) {
        state.bossActive = true;
        enemies.push(new Enemy(x, y, 'boss'));
        document.getElementById('boss-ui').style.display = 'flex';
    } else {
        enemies.push(new Enemy(x, y, Math.random() > 0.8 ? 'sniper' : 'grunt'));
    }
}

function loop() {
    if(!state.running) return;

    // Clear background
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, w, h);

    // Camera
    ctx.save();
    if(state.shake > 0) {
        ctx.translate(Math.random()*state.shake, Math.random()*state.shake);
        state.shake *= 0.9;
    }
    ctx.translate(w/2 - player.x, h/2 - player.y);

    // Grid (Visual Reference)
    ctx.strokeStyle = "rgba(0, 229, 255, 0.1)";
    for(let i = -2000; i < 2000; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    player.update();
    // Draw Player
    ctx.fillStyle = '#00e5ff';
    ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

    // Enemies
    for(let i = enemies.length-1; i >= 0; i--) {
        const e = enemies[i];
        e.update();
        ctx.fillStyle = e.c;
        ctx.shadowColor = e.c;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();

        // Hit by player bullet
        bullets.forEach(b => {
            if(b.isP && Math.hypot(b.x-e.x, b.y-e.y) < e.r) {
                e.hp -= b.d; b.life = 0;
                if(e.isBoss) document.getElementById('boss-hp-fill').style.width = (e.hp/e.maxHp*100)+'%';
            }
        });

        if(e.hp <= 0) {
            if(e.isBoss) { state.bossActive = false; document.getElementById('boss-ui').style.display = 'none'; }
            state.score += e.isBoss ? 1000 : 50;
            document.getElementById('scoreText').innerText = state.score;
            enemies.splice(i, 1);
        }
    }

    // Bullets
    for(let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.update();
        ctx.fillStyle = b.isP ? '#00e5ff' : '#ff0055';
        ctx.fillRect(b.x-2, b.y-2, 4, 4);
        if(b.life <= 0) bullets.splice(i, 1);
    }

    ctx.restore();

    // UI
    document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100) + '%';
    if(player.hp <= 0) {
        state.running = false;
        alert("GAME OVER! Score: " + state.score);
        location.reload();
    }

    state.time++;
    if(state.time % 60 === 60) spawnEnemy();

    requestAnimationFrame(loop);
}

loop();
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameOver = false;

        // Player Object
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            size: 40,
            color: '#00ffcc',
            speed: 8
        };

        // Enemy Logic
        const enemies = [];
        class Enemy {
            constructor() {
                this.size = 30 + Math.random() * 20;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -this.size;
                this.speed = 3 + Math.random() * 4;
                this.color = '#ff4d4d';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function handleInput() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.size) player.x += player.speed;
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.size) player.y += player.speed;
        }

        // Collision Detection
        function checkCollision(p, e) {
            return p.x < e.x + e.size &&
                   p.x + p.size > e.x &&
                   p.y < e.y + e.size &&
                   p.y + p.size > e.y;
        }

        // Spawn Loop
        setInterval(() => {
            if (!gameOver) enemies.push(new Enemy());
        }, 800);

        // Main Game Loop
        function animate() {
            if (gameOver) {
                ctx.fillStyle = 'white';
                ctx.font = '48px sans-serif';
                ctx.fillText('GAME OVER', canvas.width / 2 - 130, canvas.height / 2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            handleInput();

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Update/Draw Enemies
            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();

                // Check for Hit
                if (checkCollision(player, enemy)) {
                    gameOver = true;
                }

                // Score and Cleanup
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
</script>
</body>
</html>

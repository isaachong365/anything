<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Glow Survival</title>

<style>

html, body{
    margin:0;
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
}

#ui div{
    margin:5px 0;
    font-size:20px;
}

#upgradeMenu{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    z-index:20;
}

.card{
    width:220px;
    padding:20px;
    margin:10px;
    border-radius:14px;
    background:#101828;
    border:2px solid #00e5ff;
    color:white;
    cursor:pointer;
    text-align:center;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
}

#gameOver{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.8);
    color:white;
    z-index:30;
}

button{
    padding:16px 30px;
    font-size:22px;
    border:none;
    border-radius:14px;
    background:#00e5ff;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
    <div id="xp">XP: 0 / 100</div>
    <div id="wave">Wave: 1</div>
    <div id="health">HP: 100</div>
    <div id="weapon">Weapon: Blaster</div>
</div>

<div id="upgradeMenu"></div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">
        PLAY AGAIN
    </button>
</div>

<canvas id="game"></canvas>

<script>

// ======================
// CANVAS
// ======================

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

// ======================
// UI
// ======================

const scoreText =
document.getElementById("score");

const levelText =
document.getElementById("level");

const xpText =
document.getElementById("xp");

const waveText =
document.getElementById("wave");

const healthText =
document.getElementById("health");

const weaponText =
document.getElementById("weapon");

const upgradeMenu =
document.getElementById("upgradeMenu");

const gameOverScreen =
document.getElementById("gameOver");

// ======================
// INPUT
// ======================

const keys = {};

document.addEventListener(
    "keydown",
    e=>{

    keys[e.key.toLowerCase()] = true;

    if(e.code === "Space"){

        e.preventDefault();

        dash();
    }
});

document.addEventListener(
    "keyup",
    e=>{
    keys[e.key.toLowerCase()] = false;
});

// ======================
// GAME VARIABLES
// ======================

let enemies = [];
let bullets = [];
let enemyBullets = [];
let particles = [];
let gems = [];

let score = 0;
let wave = 1;

let running = true;

let shake = 0;

// ======================
// PLAYER
// ======================

class Player{

    constructor(){

        this.x = canvas.width/2;
        this.y = canvas.height/2;

        this.radius = 20;

        this.speed = 5;

        this.hp = 100;

        this.level = 1;

        this.xp = 0;

        this.nextXP = 100;

        this.weapon = "blaster";

        this.fireRate = 250;

        this.lastShot = 0;

        this.damage = 20;
    }

    update(delta){

        let dx = 0;
        let dy = 0;

        if(keys["w"] || keys["arrowup"]) dy--;
        if(keys["s"] || keys["arrowdown"]) dy++;
        if(keys["a"] || keys["arrowleft"]) dx--;
        if(keys["d"] || keys["arrowright"]) dx++;

        const len = Math.hypot(dx,dy);

        if(len){
            dx /= len;
            dy /= len;
        }

        this.x += dx * this.speed * delta * 0.06;
        this.y += dy * this.speed * delta * 0.06;

        this.x = Math.max(
            this.radius,
            Math.min(
                canvas.width - this.radius,
                this.x
            )
        );

        this.y = Math.max(
            this.radius,
            Math.min(
                canvas.height - this.radius,
                this.y
            )
        );

        if(Date.now() - this.lastShot >
            this.fireRate){

            this.shoot();

            this.lastShot = Date.now();
        }
    }

    shoot(){

        const target = getNearestEnemy();

        if(!target) return;

        const angle = Math.atan2(
            target.y - this.y,
            target.x - this.x
        );

        if(this.weapon === "blaster"){

            bullets.push(
                new Bullet(
                    this.x,
                    this.y,
                    angle,
                    this.damage,
                    "#ffffff"
                )
            );
        }

        if(this.weapon === "shotgun"){

            for(let i=-2;i<=2;i++){

                bullets.push(
                    new Bullet(
                        this.x,
                        this.y,
                        angle + i*0.15,
                        this.damage * 0.7,
                        "#ffe600"
                    )
                );
            }
        }

        if(this.weapon === "laser"){

            bullets.push(
                new Bullet(
                    this.x,
                    this.y,
                    angle,
                    this.damage * 2,
                    "#ff00ff",
                    12
                )
            );
        }
    }

    gainXP(amount){

        this.xp += amount;

        while(this.xp >= this.nextXP){

            this.xp -= this.nextXP;

            this.level++;

            this.nextXP += 50;

            openUpgradeMenu();
        }
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI*2
        );

        ctx.fillStyle = "#00e5ff";

        ctx.shadowBlur = 30;
        ctx.shadowColor = "#00e5ff";

        ctx.fill();
    }
}

// ======================
// BULLET
// ======================

class Bullet{

    constructor(
        x,
        y,
        angle,
        damage,
        color,
        size=6
    ){

        this.x=x;
        this.y=y;

        this.angle=angle;

        this.speed=12;

        this.damage=damage;

        this.radius=size;

        this.color=color;
    }

    update(delta){

        this.x +=
        Math.cos(this.angle)
        * this.speed
        * delta * 0.06;

        this.y +=
        Math.sin(this.angle)
        * this.speed
        * delta * 0.06;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI*2
        );

        ctx.fillStyle=this.color;

        ctx.shadowBlur=20;
        ctx.shadowColor=this.color;

        ctx.fill();
    }
}

// ======================
// ENEMY
// ======================

class Enemy{

    constructor(type="normal"){

        this.type = type;

        const side =
        Math.floor(Math.random()*4);

        if(side===0){
            this.x=-50;
            this.y=Math.random()*canvas.height;
        }

        if(side===1){
            this.x=canvas.width+50;
            this.y=Math.random()*canvas.height;
        }

        if(side===2){
            this.x=Math.random()*canvas.width;
            this.y=-50;
        }

        if(side===3){
            this.x=Math.random()*canvas.width;
            this.y=canvas.height+50;
        }

        this.radius=20;
        this.speed=2;
        this.hp=50;
        this.color="red";

        if(type==="fast"){
            this.speed=5;
            this.radius=12;
            this.hp=20;
            this.color="#ffe600";
        }

        if(type==="tank"){
            this.speed=1;
            this.radius=40;
            this.hp=200;
            this.color="#8b5cf6";
        }

        if(type==="boss"){
            this.speed=1;
            this.radius=90;
            this.hp=1000;
            this.color="#ff00aa";
        }
    }

    update(delta){

        const angle =
        Math.atan2(
            player.y - this.y,
            player.x - this.x
        );

        this.x +=
        Math.cos(angle)
        * this.speed
        * delta * 0.06;

        this.y +=
        Math.sin(angle)
        * this.speed
        * delta * 0.06;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI*2
        );

        ctx.fillStyle=this.color;

        ctx.shadowBlur=20;
        ctx.shadowColor=this.color;

        ctx.fill();
    }
}

// ======================
// GEM
// ======================

class Gem{

    constructor(x,y){

        this.x=x;
        this.y=y;

        this.radius=8;
    }

    update(){

        const dx = player.x - this.x;
        const dy = player.y - this.y;

        this.x += dx * 0.02;
        this.y += dy * 0.02;

        const dist =
        Math.hypot(dx,dy);

        if(dist <
            player.radius + this.radius){

            player.gainXP(20);

            score += 10;

            return true;
        }

        return false;
    }

    draw(){

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.radius,
            0,
            Math.PI*2
        );

        ctx.fillStyle="#ffe600";

        ctx.shadowBlur=20;
        ctx.shadowColor="#ffe600";

        ctx.fill();
    }
}

// ======================
// PARTICLES
// ======================

class Particle{

    constructor(x,y,color){

        this.x=x;
        this.y=y;

        this.dx=
        (Math.random()-0.5)*10;

        this.dy=
        (Math.random()-0.5)*10;

        this.life=30;

        this.color=color;
    }

    update(){

        this.x += this.dx;
        this.y += this.dy;

        this.life--;
    }

    draw(){

        ctx.globalAlpha =
        this.life / 30;

        ctx.fillStyle =
        this.color;

        ctx.fillRect(
            this.x,
            this.y,
            4,
            4
        );

        ctx.globalAlpha = 1;
    }
}

// ======================
// FUNCTIONS
// ======================

function createExplosion(x,y,color){

    shake = 10;

    for(let i=0;i<20;i++){

        particles.push(
            new Particle(x,y,color)
        );
    }
}

function getNearestEnemy(){

    let nearest = null;
    let dist = Infinity;

    for(const enemy of enemies){

        const d =
        Math.hypot(
            enemy.x-player.x,
            enemy.y-player.y
        );

        if(d < dist){

            dist = d;

            nearest = enemy;
        }
    }

    return nearest;
}

function dash(){

    let dx=0;
    let dy=0;

    if(keys["w"]) dy--;
    if(keys["s"]) dy++;
    if(keys["a"]) dx--;
    if(keys["d"]) dx++;

    const len =
    Math.hypot(dx,dy);

    if(len){

        dx/=len;
        dy/=len;

        player.x += dx * 120;
        player.y += dy * 120;
    }

    createExplosion(
        player.x,
        player.y,
        "#00e5ff"
    );
}

function spawnEnemy(){

    if(!running) return;

    let type = "normal";

    const rand = Math.random();

    if(rand < 0.2) type="fast";
    else if(rand < 0.35) type="tank";

    enemies.push(new Enemy(type));

    if(score > 2000 &&
        Math.random() < 0.03){

        enemies.push(
            new Enemy("boss")
        );
    }

    setTimeout(
        spawnEnemy,
        Math.max(250,1000-wave*40)
    );
}

spawnEnemy();

function openUpgradeMenu(){

    running = false;

    upgradeMenu.style.display =
    "flex";

    upgradeMenu.innerHTML = "";

    const upgrades = [

        {
            name:"Shotgun",
            effect:()=>{
                player.weapon="shotgun";
            }
        },

        {
            name:"Laser",
            effect:()=>{
                player.weapon="laser";
            }
        },

        {
            name:"Attack Speed",
            effect:()=>{
                player.fireRate =
                Math.max(
                    60,
                    player.fireRate - 30
                );
            }
        },

        {
            name:"Damage",
            effect:()=>{
                player.damage += 10;
            }
        },

        {
            name:"Speed",
            effect:()=>{
                player.speed += 1;
            }
        },

        {
            name:"Heal",
            effect:()=>{
                player.hp += 30;
            }
        }
    ];

    const selected = [];

    while(selected.length < 3){

        const up =
        upgrades[
            Math.floor(
                Math.random()
                * upgrades.length
            )
        ];

        if(!selected.includes(up)){

            selected.push(up);
        }
    }

    selected.forEach(up=>{

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML =
        `<h2>${up.name}</h2>`;

        card.onclick = ()=>{

            up.effect();

            weaponText.innerText =
            "Weapon: " + player.weapon;

            upgradeMenu.style.display =
            "none";

            running = true;

            lastTime =
            performance.now();

            requestAnimationFrame(
                animate
            );
        };

        upgradeMenu.appendChild(card);
    });
}

// ======================
// PLAYER
// ======================

const player = new Player();

let lastTime = 0;

// ======================
// GAME LOOP
// ======================

function animate(timestamp){

    if(!running) return;

    requestAnimationFrame(animate);

    const delta =
    timestamp - lastTime;

    lastTime = timestamp;

    ctx.save();

    if(shake > 0){

        ctx.translate(
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );

        shake *= 0.9;
    }

    ctx.fillStyle =
    "rgba(5,8,22,0.25)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    player.update(delta);
    player.draw();

    // BULLETS

    for(
        let b=bullets.length-1;
        b>=0;
        b--
    ){

        const bullet = bullets[b];

        bullet.update(delta);
        bullet.draw();

        // remove offscreen

        if(
            bullet.x < -100 ||
            bullet.x > canvas.width+100 ||
            bullet.y < -100 ||
            bullet.y > canvas.height+100
        ){

            bullets.splice(b,1);

            continue;
        }

        for(
            let e=enemies.length-1;
            e>=0;
            e--
        ){

            const enemy = enemies[e];

            const dist =
            Math.hypot(
                bullet.x-enemy.x,
                bullet.y-enemy.y
            );

            if(
                dist <
                bullet.radius +
                enemy.radius
            ){

                enemy.hp -=
                bullet.damage;

                createExplosion(
                    bullet.x,
                    bullet.y,
                    enemy.color
                );

                bullets.splice(b,1);

                if(enemy.hp <= 0){

                    gems.push(
                        new Gem(
                            enemy.x,
                            enemy.y
                        )
                    );

                    enemies.splice(e,1);

                    score += 20;
                }

                break;
            }
        }
    }

    // ENEMIES

    for(const enemy of enemies){

        enemy.update(delta);
        enemy.draw();

        const dist =
        Math.hypot(
            player.x-enemy.x,
            player.y-enemy.y
        );

        if(
            dist <
            player.radius +
            enemy.radius
        ){

            player.hp -= 0.2;

            shake = 5;
        }
    }

    // GEMS

    for(
        let i=gems.length-1;
        i>=0;
        i--
    ){

        const gem = gems[i];

        if(gem.update()){

            gems.splice(i,1);

            continue;
        }

        gem.draw();
    }

    // PARTICLES

    for(
        let i=particles.length-1;
        i>=0;
        i--
    ){

        const p = particles[i];

        p.update();
        p.draw();

        if(p.life <= 0){

            particles.splice(i,1);
        }
    }

    // GAME OVER

    if(player.hp <= 0){

        running = false;

        gameOverScreen.style.display =
        "flex";
    }

    // UI

    wave =
    1 + Math.floor(score / 400);

    scoreText.innerText =
    "Score: " + Math.floor(score);

    levelText.innerText =
    "Level: " + player.level;

    xpText.innerText =
    "XP: " +
    player.xp +
    " / " +
    player.nextXP;

    waveText.innerText =
    "Wave: " + wave;

    healthText.innerText =
    "HP: " +
    Math.floor(player.hp);

    ctx.restore();
}

animate(0);

</script>
</body>
</html>

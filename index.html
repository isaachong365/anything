<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR ELITE</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-pink: #ff0055; --neon-green: #ccff00; --neon-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        #ui { display: none; position: absolute; inset: 20px; pointer-events: none; z-index: 10; font-size: clamp(12px, 2.5vw, 16px); }
        #scoreBox { font-size: clamp(22px, 5vw, 32px); font-weight: bold; color: var(--neon-blue); }
        .bar-container { width: clamp(150px, 40vw, 220px); height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0 10px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; transition: width 0.1s; box-shadow: 0 0 10px var(--neon-pink); }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #00ffaa); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-blue); }
        #skill-bar { height: 100%; background: var(--neon-purple); width: 0%; box-shadow: 0 0 10px var(--neon-purple); }
        
        #minimap { position: absolute; top: 20px; right: 20px; width: clamp(80px, 15vw, 120px); height: clamp(80px, 15vw, 120px); background: rgba(0,0,0,0.6); border: 1px solid var(--neon-blue); border-radius: 8px; z-index: 20; overflow: hidden; pointer-events: none; display: none; }
        #minimap-canvas { width: 100%; height: 100%; }

        #boss-ui { display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70%; text-align: center; z-index: 10; }
        .boss-bar { width: 100%; height: 12px; background: rgba(255,0,85,0.2); border: 1px solid #ff0055; border-radius: 6px; overflow: hidden; box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        #boss-hp-fill { height: 100%; background: #ff0055; width: 100%; transition: width 0.1s; }

        #menu-overlay, #shop-overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box; }
        #shop-overlay { display: none; }
        
        .shop-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .upgrade-card { background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue); padding: 15px; border-radius: 12px; width: 140px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upgrade-card:hover { background: var(--neon-blue); color: #000; transform: translateY(-5px); }
        
        button { padding: clamp(10px, 3vw, 15px) clamp(20px, 6vw, 40px); background: var(--neon-blue); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: clamp(14px, 3.5vw, 18px); margin-top: 20px; color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .glitch { animation: glitch-anim 0.2s infinite; text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
        @keyframes glitch-anim { 0% { transform: translate(0); } 20% { transform: translate(-3px, 2px); } 100% { transform: translate(0); } }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 229, 255, 0.3); border-radius: 50%; display: none; touch-action: none; z-index: 50; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: radial-gradient(circle, var(--neon-blue), #008699); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); pointer-events: none; }
        #skill-hint { font-size: 10px; color: var(--neon-purple); margin-top: 5px; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 class="glitch" style="color: var(--neon-blue); font-size: clamp(32px, 8vw, 64px); margin-bottom: 5px;">NEON SURVIVOR</h1>
    <button id="start-btn">ENGAGE RUN</button>
</div>

<div id="ui">
    <div id="scoreBox">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 12px; color: var(--neon-green);">WALLET: <span id="shardText">0</span> 💎</div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px;">LVL <span id="lvlText">1</span> | <span style="color:var(--neon-purple)">ARSENAL ELITE</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
    <div id="skill-hint">NOVA READY (SPACE/TAP)</div>
    <div class="bar-container"><div id="skill-bar"></div></div>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<div id="boss-ui">
    <div style="color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 3px;">NEON WARDEN</div>
    <div class="boss-bar"><div id="boss-hp-fill"></div></div>
</div>

<div id="shop-overlay">
    <h1 style="color:var(--neon-pink)" class="glitch">SYSTEM TERMINATED</h1>
    <h3 id="finalScoreDisplay"></h3>
    <h2 id="walletDisplay">0 💎</h2>
    <div class="shop-container">
        <div class="upgrade-card" onclick="buyMeta('hp')"><b>+ HEALTH</b><br><span id="cost-hp">100</span> 💎</div>
        <div class="upgrade-card" onclick="buyMeta('speed')"><b>+ SPEED</b><br><span id="cost-speed">100</span> 💎</div>
    </div>
    <button onclick="location.reload()">RE-INITIALIZE RUN</button>
</div>

<div id="joystick-zone"><div id="joystick-stick"></div></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap-canvas'), mCtx = mCanvas.getContext('2d');
let w, h, player, enemies = [], lasers = [], gems = [], particles = [], boss = null;
let shootTimer = 0, lastTime = 0, skillTimer = 0;
const SAVE_KEY = "neon_meta_v4";

let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, hpLvl: 0, speedLvl: 0 };
const state = { running: false, score: 0, lastBossScore: 0, sessionShards: 0, difficulty: 1, skillCooldown: 5000 };
let keys = {};

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let joyPos = { x: 0, y: 0, active: false };

if(isMobile) {
    const jZone = document.getElementById('joystick-zone');
    jZone.style.display = 'block';
    jZone.addEventListener('touchstart', e => { 
        if(e.touches[0].clientX < w/2) joyPos.active = true; 
        else activateSkill();
    });
    window.addEventListener('touchmove', e => { if(joyPos.active) { e.preventDefault(); updateJoy(e.touches[0]); } }, {passive: false});
    window.addEventListener('touchend', () => { joyPos.active = false; document.getElementById('joystick-stick').style.transform = `translate(0,0)`; });
}

function updateJoy(t) {
    const rect = document.getElementById('joystick-zone').getBoundingClientRect();
    const dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
    const dist = Math.hypot(dx, dy), max = 45;
    const lx = dist > max ? dx * (max/dist) : dx, ly = dist > max ? dy * (max/dist) : dy;
    joyPos.x = lx / max; joyPos.y = ly / max;
    document.getElementById('joystick-stick').style.transform = `translate(${lx}px, ${ly}px)`;
}

window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') activateSkill(); };
window.onkeyup = e => keys[e.code] = false;

function activateSkill() {
    let now = Date.now();
    if(now - skillTimer < state.skillCooldown) return;
    skillTimer = now;
    particles.push({ x: player.x, y: player.y, r: 10, isNova: true, life: 1.0 });
    enemies.forEach(en => {
        if(Math.hypot(en.x - player.x, en.y - player.y) < 250) en.hp -= 10;
    });
    if(boss && Math.hypot(boss.x - player.x, boss.y - player.y) < 250) boss.hp -= 10;
}

function spawnParticles(x, y, color, count=10) {
    for(let i=0; i<count; i++) {
        particles.push({ x, y, color, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1.0 });
    }
}

class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 15;
        this.maxHp = 100 + (meta.hpLvl * 25); this.hp = this.maxHp;
        this.xp = 0; this.maxXp = 50; this.lvl = 1;
        this.speed = 4 + (meta.speedLvl * 0.4);
        this.orbAngle = 0;
    }
    update() {
        let mx = 0, my = 0;
        if(keys['KeyW'] || keys['ArrowUp']) my--; if(keys['KeyS'] || keys['ArrowDown']) my++;
        if(keys['KeyA'] || keys['ArrowLeft']) mx--; if(keys['KeyD'] || keys['ArrowRight']) mx++;
        if(joyPos.active) { mx = joyPos.x; my = joyPos.y; }
        if(mx !== 0 || my !== 0) {
            const mag = Math.hypot(mx, my);
            this.x += (mx/mag) * this.speed; this.y += (my/mag) * this.speed;
        }
        this.orbAngle += 0.05;
    }
    draw() {
        ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
        ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        for(let i=0; i<3; i++) {
            let ang = this.orbAngle + (i * Math.PI * 2 / 3);
            let ox = this.x + Math.cos(ang) * 60, oy = this.y + Math.sin(ang) * 60;
            ctx.fillStyle = '#bd00ff'; ctx.beginPath(); ctx.arc(ox, oy, 6, 0, Math.PI*2); ctx.fill();
            enemies.forEach(en => { if(Math.hypot(en.x-ox, en.y-oy) < en.r + 6) en.hp -= 0.05; });
        }
    }
}

function buyMeta(type) {
    let cost = (type === 'hp' ? meta.hpLvl : meta.speedLvl) * 150 + 100;
    if(meta.shards >= cost) {
        meta.shards -= cost;
        if(type === 'hp') meta.hpLvl++; else meta.speedLvl++;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        updateShopUI();
    }
}

function updateShopUI() {
    document.getElementById('walletDisplay').innerText = meta.shards + " 💎";
    document.getElementById('cost-hp').innerText = (meta.hpLvl * 150 + 100);
    document.getElementById('cost-speed').innerText = (meta.speedLvl * 150 + 100);
}

function update(time) {
    if(!state.running) return;
    state.difficulty = 1 + (state.score / 5000);
    ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, w, h);
    ctx.save(); ctx.translate(w/2 - player.x, h/2 - player.y);
    
    player.update();
    player.draw();

    // Skill Cooldown UI
    let skillProgress = Math.min(1, (Date.now() - skillTimer) / state.skillCooldown);
    document.getElementById('skill-bar').style.width = (skillProgress * 100) + '%';

    // Triple Shot Combat
    if (time - shootTimer > 400) {
        let target = boss || enemies.find(en => Math.hypot(en.x - player.x, en.y - player.y) < 600);
        if(target) {
            for(let i=-1; i<=1; i++) {
                lasers.push({ x: player.x, y: player.y, tx: target.x + (i*30), ty: target.y + (i*30), life: 8 });
            }
            target.hp -= 1; shootTimer = time;
            if(boss) document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.maxHp*100)+'%';
        }
    }

    particles.forEach((p, i) => {
        if(p.isNova) {
            p.r += 12; p.life -= 0.04;
            ctx.strokeStyle = `rgba(189, 0, 255, ${p.life})`;
            ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
            if(p.life <= 0) particles.splice(i, 1);
        } else {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = `rgba(255,0,85,${p.life})`; ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) particles.splice(i, 1);
        }
    });

    gems.forEach((g, i) => {
        const d = Math.hypot(player.x - g.x, player.y - g.y);
        if(d < 120) { g.x += (player.x - g.x)*0.2; g.y += (player.y - g.y)*0.2; }
        ctx.fillStyle = g.boss ? '#ccff00' : '#00e5ff'; ctx.fillRect(g.x-4, g.y-4, 8, 8);
        if(d < 20) {
            gems.splice(i, 1); player.xp += g.boss ? 150 : 15; state.sessionShards += g.boss ? 20 : 1;
            document.getElementById('shardText').innerText = meta.shards + state.sessionShards;
            if(player.xp >= player.maxXp) {
                player.lvl++; player.xp = 0; player.maxXp *= 1.3;
                player.hp = Math.min(player.maxHp, player.hp + 20);
                document.getElementById('lvlText').innerText = player.lvl;
            }
            document.getElementById('xp-bar').style.width = (player.xp/player.maxXp*100)+'%';
        }
    });

    if(state.score >= state.lastBossScore + 5000 && !boss) {
        state.lastBossScore += 5000;
        boss = { x: player.x+500, y: player.y, r: 60, hp: 60, maxHp: 60, speed: 1.3 };
        document.getElementById('boss-ui').style.display = 'block';
    }

    if(boss) {
        let a = Math.atan2(player.y-boss.y, player.x-boss.x);
        boss.x += Math.cos(a)*boss.speed; boss.y += Math.sin(a)*boss.speed;
        ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI*2); ctx.fill();
        if(boss.hp <= 0) {
            spawnParticles(boss.x, boss.y, '#f05', 50);
            for(let i=0; i<15; i++) gems.push({x: boss.x+Math.random()*40-20, y: boss.y+Math.random()*40-20, boss: true});
            boss = null; state.score += 1000; document.getElementById('boss-ui').style.display = 'none';
        } else if(Math.hypot(player.x-boss.x, player.y-boss.y) < player.r + boss.r) player.hp -= 1.0;
    }

    // Variety Enemies
    if(Math.random() < 0.03 && !boss) {
        let type = Math.random();
        let en = { x: player.x+(Math.random()-0.5)*w*2, y: player.y+(Math.random()-0.5)*h*2, r: 12, hp: 1, speed: 2, color: '#f05' };
        if(type > 0.85) { en.r = 25; en.hp = 6; en.speed = 1; en.color = '#bd00ff'; } // Sentinel
        else if(type < 0.15) { en.r = 7; en.hp = 1; en.speed = 4.5; en.color = '#ccff00'; } // Glitcher
        enemies.push(en);
    }

    enemies.forEach((en, i) => {
        let a = Math.atan2(player.y-en.y, player.x-en.x);
        en.x += Math.cos(a)*(en.speed * state.difficulty); en.y += Math.sin(a)*(en.speed * state.difficulty);
        ctx.fillStyle = en.color; ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
        if(en.hp <= 0) {
            spawnParticles(en.x, en.y, en.color, 10); gems.push({x: en.x, y: en.y});
            enemies.splice(i, 1); state.score += 10; document.getElementById('scoreText').innerText = state.score;
        } else if(Math.hypot(player.x-en.x, player.y-en.y) < player.r + en.r) player.hp -= 0.4;
    });

    lasers.forEach((l, i) => {
        ctx.strokeStyle = `rgba(0, 229, 255, ${l.life/8})`; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.tx, l.ty); ctx.stroke();
        if(--l.life <= 0) lasers.splice(i, 1);
    });

    ctx.restore();

    // Minimap
    mCtx.fillStyle = '#000'; mCtx.fillRect(0,0,120,120);
    enemies.forEach(en => {
        let mx = 60 + (en.x - player.x) * 0.08, my = 60 + (en.y - player.y) * 0.08;
        mCtx.fillStyle = en.color; mCtx.fillRect(mx, my, 2, 2);
    });
    if(boss) {
        let bx = 60 + (boss.x - player.x) * 0.08, by = 60 + (boss.y - player.y) * 0.08;
        mCtx.fillStyle = '#ff0'; mCtx.fillRect(bx-2, by-2, 4, 4);
    }
    mCtx.fillStyle = '#0ff'; mCtx.fillRect(58, 58, 4, 4);

    document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100) + '%';
    if(player.hp <= 0) {
        state.running = false; meta.shards += state.sessionShards;
        localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
        document.getElementById('finalScoreDisplay').innerText = "SCORE: " + state.score;
        updateShopUI(); document.getElementById('shop-overlay').style.display = 'flex';
    }

    requestAnimationFrame(update);
}

const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; mCanvas.width = 120; mCanvas.height = 120; };
window.onresize = resize; resize();
document.getElementById('start-btn').onclick = () => {
    player = new Player(); state.running = true;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    document.getElementById('minimap').style.display = 'block';
    document.getElementById('shardText').innerText = meta.shards;
    requestAnimationFrame(update);
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Survival</title>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// ======================
// GAME VARIABLES
// ======================

let wave = 1;
let enemies = [];
let enemiesAlive = 0;
let waveInProgress = false;

// ======================
// SPAWN ENEMIES
// ======================

function spawnWave() {
    waveInProgress = true;

    let amount = wave * 3;

    enemiesAlive = amount;
    enemies = [];

    for (let i = 0; i < amount; i++) {
        enemies.push({
            hp: 100
        });
    }

    console.log("Wave", wave, "spawned");
}

// ======================
// KILL ENEMY
// ======================

function killEnemy(index) {
    enemies.splice(index, 1);

    enemiesAlive--;

    console.log("Enemies left:", enemiesAlive);

    // NEXT WAVE
    if (enemiesAlive <= 0) {
        waveInProgress = false;

        wave++;

        setTimeout(() => {
            spawnWave();
        }, 2000);
    }
}

// ======================
// GAME LOOP
// ======================

function gameLoop() {

    // Example auto-kill enemy every second
    if (waveInProgress && enemies.length > 0) {
        killEnemy(0);
    }

    requestAnimationFrame(gameLoop);
}

// ======================
// START GAME
// ======================

spawnWave();

setInterval(() => {
    if (waveInProgress && enemies.length > 0) {
        killEnemy(0);
    }
}, 1000);

gameLoop();

</script>
    
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    font-size:18px;
}

#upgradeMenu{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
    z-index:20;
}

.upgradeContainer{
    display:flex;
    gap:20px;
}

.card{
    width:200px;
    padding:20px;
    border-radius:12px;
    background:#101828;
    border:2px solid #00e5ff;
    color:white;
    cursor:pointer;
    text-align:center;
}

#gameOver{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    color:white;
    z-index:30;
}

button{
    padding:14px 28px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00e5ff;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
    <div id="xp">XP: 0 / 100</div>
    <div id="wave">Wave: 1</div>
    <div id="health">HP: 100</div>
    <div id="weapon">Weapon: Blaster</div>
</div>

<div id="upgradeMenu">
    <div class="upgradeContainer" id="upgradeCards"></div>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>

// =====================
// CANVAS
// =====================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// =====================
// INPUT
// =====================
const keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// =====================
// GAME STATE
// =====================
let bullets = [];
let enemies = [];
let particles = [];
let gems = [];

let score = 0;
let wave = 1;
let running = true;
let shake = 0;

// =====================
// PLAYER
// =====================
class Player{
    constructor(){
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.radius = 20;
        this.speed = 5;
        this.hp = 100;

        this.weapon = "Blaster";
        this.damage = 20;

        this.xp = 0;
        this.nextXP = 100;
        this.level = 1;

        this.lastShot = 0;
        this.fireRate = 250;
    }

    update(){
        let dx = 0, dy = 0;

        if(keys["w"]) dy--;
        if(keys["s"]) dy++;
        if(keys["a"]) dx--;
        if(keys["d"]) dx++;

        const len = Math.hypot(dx,dy) || 1;

        this.x += (dx/len) * this.speed;
        this.y += (dy/len) * this.speed;

        this.x = Math.max(this.radius, Math.min(canvas.width-this.radius,this.x));
        this.y = Math.max(this.radius, Math.min(canvas.height-this.radius,this.y));

        if(Date.now() - this.lastShot > this.fireRate){
            this.shoot();
            this.lastShot = Date.now();
        }
    }

    shoot(){
        const target = getNearestEnemy();
        if(!target) return;

        const angle = Math.atan2(target.y-this.y, target.x-this.x);

        bullets.push(new Bullet(this.x,this.y,angle,this.damage));
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle = "#00e5ff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00e5ff";
        ctx.fill();
    }

    gainXP(x){
        this.xp += x;

        while(this.xp >= this.nextXP){
            this.xp -= this.nextXP;
            this.level++;
            this.nextXP += 50;
            openUpgradeMenu();
        }
    }
}

// =====================
// BULLET
// =====================
class Bullet{
    constructor(x,y,a,d){
        this.x=x;
        this.y=y;
        this.a=a;
        this.speed=12;
        this.damage=d;
        this.r=6;
    }

    update(){
        this.x += Math.cos(this.a)*this.speed;
        this.y += Math.sin(this.a)*this.speed;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    }
}

// =====================
// ENEMY
// =====================
class Enemy{
    constructor(type="normal"){
        const side = Math.floor(Math.random()*4);

        if(side===0){ this.x=-50; this.y=Math.random()*canvas.height; }
        if(side===1){ this.x=canvas.width+50; this.y=Math.random()*canvas.height; }
        if(side===2){ this.x=Math.random()*canvas.width; this.y=-50; }
        if(side===3){ this.x=Math.random()*canvas.width; this.y=canvas.height+50; }

        this.radius = 20;
        this.hp = 50;
        this.speed = 2;
        this.color = "red";

        if(type==="fast"){ this.speed=5; this.hp=20; this.color="yellow"; }
        if(type==="tank"){ this.speed=1; this.hp=200; this.radius=40; this.color="purple"; }
    }

    update(){
        const a = Math.atan2(player.y-this.y, player.x-this.x);
        this.x += Math.cos(a)*this.speed;
        this.y += Math.sin(a)*this.speed;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle=this.color;
        ctx.fill();
    }
}

// =====================
// GEM
// =====================
class Gem{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.r=8;
    }

    update(){
        const dx = player.x-this.x;
        const dy = player.y-this.y;

        this.x += dx*0.02;
        this.y += dy*0.02;

        if(Math.hypot(dx,dy) < 25){
            player.gainXP(20);
            score += 10;
            return true;
        }
        return false;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.fill();
    }
}

// =====================
// FUNCTIONS
// =====================
function getNearestEnemy(){
    let best=null,dist=1e9;

    for(const e of enemies){
        const d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d<dist){dist=d;best=e;}
    }

    return best;
}

function spawnEnemy(){
    if(!running) return;

    let type="normal";
    let r=Math.random();

    if(r<0.2) type="fast";
    else if(r<0.35) type="tank";

    enemies.push(new Enemy(type));

    setTimeout(spawnEnemy, Math.max(250,1000-wave*30));
}

function openUpgradeMenu(){
    running=false;

    const menu=document.getElementById("upgradeMenu");
    const box=document.getElementById("upgradeCards");

    menu.style.display="flex";
    box.innerHTML="";

    const upgrades=[
        {name:"Damage",fn:()=>player.damage+=10},
        {name:"Speed",fn:()=>player.speed+=1},
        {name:"Heal",fn:()=>player.hp+=30},
        {name:"Fire Rate",fn:()=>player.fireRate=Math.max(60,player.fireRate-30)}
    ];

    const pick=[];

    while(pick.length<3){
        const u=upgrades[Math.floor(Math.random()*upgrades.length)];
        if(!pick.includes(u)) pick.push(u);
    }

    pick.forEach(u=>{
        const c=document.createElement("div");
        c.className="card";
        c.innerHTML=u.name;

        c.onclick=()=>{
            u.fn();
            menu.style.display="none";
            running=true;
            requestAnimationFrame(loop);
        };

        box.appendChild(c);
    });
}

// =====================
// INIT
// =====================
const player = new Player();
spawnEnemy();

// =====================
// LOOP
// =====================
function loop(){
    if(!running) return;

    requestAnimationFrame(loop);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    player.update();
    player.draw();

    // bullets
    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.update();
        b.draw();

        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
        }

        for(let j=enemies.length-1;j>=0;j--){
            let e=enemies[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<e.radius){
                e.hp-=b.damage;
                bullets.splice(i,1);

                if(e.hp<=0){
                    enemies.splice(j,1);
                    gems.push(new Gem(e.x,e.y));
                    score+=20;
                }

                break;
            }
        }
    }

    // enemies
    for(const e of enemies){
        e.update();
        e.draw();

        if(Math.hypot(player.x-e.x,player.y-e.y)<e.radius+player.radius){
            player.hp-=0.2;
        }
    }

    // gems
    for(let i=gems.length-1;i>=0;i--){
        if(gems[i].update()) gems.splice(i,1);
        else gems[i].draw();
    }

    // wave system (YOUR ORIGINAL IDEA FIXED)
    wave = 1 + Math.floor(score/400);

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("level").innerText="Level: "+player.level;
    document.getElementById("xp").innerText=`XP: ${player.xp}/${player.nextXP}`;
    document.getElementById("wave").innerText="Wave: "+wave;
    document.getElementById("health").innerText="HP: "+Math.floor(player.hp);

    if(player.hp<=0){
        running=false;
        document.getElementById("gameOver").style.display="flex";
    }
}

loop();
</script>

</body>
</html>

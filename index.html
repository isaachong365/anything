<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>glow survival</title>
    <style>
        body { margin: 0; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; inset: 20px; pointer-events: none; }
        .bar-container { width: 200px; height: 8px; background: #111; border: 1px solid #333; margin: 5px 0 15px 0; }
        #hp-bar { height: 100%; background: #ff0055; box-shadow: 0 0 10px #ff0055; transition: width 0.2s; }
        #xp-bar { height: 100%; background: #00e5ff; box-shadow: 0 0 10px #00e5ff; transition: width 0.2s; }
        #overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; }
        .card { background: #0a0f1e; border: 2px solid #00e5ff; padding: 20px; margin: 10px; width: 220px; cursor: pointer; text-align: center; border-radius: 12px; transition: 0.3s; }
        .card:hover { background: #00e5ff; color: #000; transform: translateY(-5px); }
        h1 { margin: 0; color: #ff0055; text-shadow: 0 0 20px #ff0055; font-size: 48px; }
        .stat-label { font-size: 12px; letter-spacing: 2px; color: #aaa; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 28px; color: #00e5ff;">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 14px; color: #555;">BEST: <span id="bestText">0</span></div>
    <div class="stat-label" style="margin-top:20px">INTEGRITY</div>
    <div class="bar-container"><div id="hp-bar" style="width: 100%"></div></div>
    <div class="stat-label">EXP - LEVEL <span id="lvlText">1</span></div>
    <div class="bar-container"><div id="xp-bar" style="width: 0%"></div></div>
</div>

<div id="overlay">
    <h1 id="overlayTitle">AUGMENTATION</h1>
    <div id="choices" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<canvas id="game"></canvas>

<script>
// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let w, h, centerX, centerY;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2; centerY = h / 2;
}
window.addEventListener('resize', resize);
resize();

// --- STATE & SAVING ---
const state = {
    running: true,
    score: 0,
    best: localStorage.getItem('neon_best') || 0,
    time: 0,
    shake: 0
};
document.getElementById('bestText').innerText = state.best;

const keys = {};
window.onkeydown = e => { 
    keys[e.key.toLowerCase()] = true;
    if(audioCtx.state === 'suspended') audioCtx.resume();
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

// --- CLASSES ---
class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 15;
        this.speed = 4.5; this.hp = 100; this.maxHp = 100;
        this.xp = 0; this.nextXP = 100; this.lvl = 1;
        this.fireRate = 450; this.lastShot = 0;
        this.bulletDmg = 35; this.bulletCount = 1;
    }
    update() {
        let mx = 0, my = 0;
        if (keys['w']) my--; if (keys['s']) my++;
        if (keys['a']) mx--; if (keys['d']) mx++;
        const mag = Math.hypot(mx, my) || 1;
        this.x += (mx / mag) * this.speed;
        this.y += (my / mag) * this.speed;
        if (Date.now() - this.lastShot > this.fireRate) this.shoot();
    }
    shoot() {
        const target = enemies.reduce((prev, curr) => {
            const d = Math.hypot(curr.x - this.x, curr.y - this.y);
            return (d < prev.dist) ? {obj: curr, dist: d} : prev;
        }, {obj: null, dist: 1000}).obj;
        if (!target) return;
        this.lastShot = Date.now();
        playSound(600, 'triangle', 0.1);
        const angle = Math.atan2(target.y - this.y, target.x - this.x);
        for(let i=0; i<this.bulletCount; i++){
            const off = (i - (this.bulletCount-1)/2) * 0.2;
            bullets.push(new Bullet(this.x, this.y, angle + off, this.bulletDmg));
        }
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.knockbackX = 0; this.knockbackY = 0;
        this.type = type;
        if(type === 'swarmer') {
            this.r = 10; this.hp = 20; this.speed = 4.5; this.color = '#ff80bf'; this.val = 50;
        } else if(type === 'tank') {
            this.r = 30; this.hp = 300; this.speed = 1.2; this.color = '#7d00ff'; this.val = 500;
        } else {
            this.r = 18; this.hp = 60; this.speed = 2.5; this.color = '#ff0055'; this.val = 100;
        }
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed + this.knockbackX;
        this.y += Math.sin(angle) * this.speed + this.knockbackY;
        this.knockbackX *= 0.85; this.knockbackY *= 0.85;
        if (Math.hypot(this.x - player.x, this.y - player.y) < this.r + player.r) {
            player.hp -= 0.4; state.shake = 8;
        }
    }
}

class Bullet {
    constructor(x,y,a,dmg) { this.x=x; this.y=y; this.a=a; this.dmg=dmg; this.s=14; this.life=80; }
    update() { this.x += Math.cos(this.a)*this.s; this.y += Math.sin(this.a)*this.s; this.life--; }
}

class Gem {
    constructor(x,y) { this.x=x; this.y=y; this.r=5; }
    update() {
        const d = Math.hypot(player.x-this.x, player.y-this.y);
        if(d < 150) { this.x += (player.x-this.x)*0.12; this.y += (player.y-this.y)*0.12; }
        return d < player.r + this.r;
    }
}

class Particle {
    constructor(x,y,c) {
        this.x=x; this.y=y; this.c=c; this.life=1;
        this.vx=(Math.random()-0.5)*12; this.vy=(Math.random()-0.5)*12;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.03; }
}

// --- INSTANCES ---
const player = new Player();
let bullets = [], enemies = [], gems = [], particles = [];

function spawnLoop() {
    if (!state.running) return;
    const angle = Math.random() * Math.PI * 2;
    const ex = player.x + Math.cos(angle) * w;
    const ey = player.y + Math.sin(angle) * h;
    
    let type = 'grunt';
    const rand = Math.random();
    if(rand < 0.15) type = 'tank';
    else if(rand < 0.4) type = 'swarmer';

    enemies.push(new Enemy(ex, ey, type));
    setTimeout(spawnLoop, Math.max(150, 1200 - (state.time / 10)));
}

function showUpgrade() {
    state.running = false;
    const overlay = document.getElementById('overlay');
    const choices = document.getElementById('choices');
    overlay.style.display = 'flex';
    choices.innerHTML = '';

    const opts = [
        { t: "KINETIC BOOST", d: "Increase Movement", f: () => player.speed += 1 },
        { t: "SPLIT SHOT", d: "+1 Projectile", f: () => player.bulletCount++ },
        { t: "HEAVY BOLTS", d: "+Damage", f: () => player.bulletDmg += 25 },
        { t: "NANO-REPAIR", d: "Recover Health", f: () => player.hp = Math.min(player.maxHp, player.hp + 50) },
        { t: "OVERCLOCK", d: "Faster Fire Rate", f: () => player.fireRate *= 0.8 }
    ];

    opts.sort(() => Math.random() - 0.5).slice(0, 3).forEach(u => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${u.t}</h3><p>${u.d}</p>`;
        div.onclick = () => { u.f(); overlay.style.display = 'none'; state.running = true; loop(); };
        choices.appendChild(div);
    });
}

function loop() {
    if (!state.running) return;
    state.time++;
    ctx.fillStyle = '#02040a'; ctx.fillRect(0, 0, w, h);
    
    let sx = (Math.random()-0.5)*state.shake; let sy = (Math.random()-0.5)*state.shake;
    state.shake *= 0.9;

    const toScreen = (x, y) => ({ x: x - player.x + centerX + sx, y: y - player.y + centerY + sy });

    // Grid
    ctx.strokeStyle = '#0a1020';
    for(let x = -player.x % 80; x < w; x += 80) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y = -player.y % 80; y < h; y += 80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

    player.update();
    const pPos = toScreen(player.x, player.y);
    ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.arc(pPos.x, pPos.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    bullets = bullets.filter(b => {
        b.update();
        const bP = toScreen(b.x, b.y);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(bP.x, bP.y, 4, 0, Math.PI*2); ctx.fill();
        let hit = false;
        enemies.forEach(e => {
            if(Math.hypot(b.x-e.x, b.y-e.y) < e.r) {
                e.hp -= b.dmg; e.knockbackX += Math.cos(b.a)*6; e.knockbackY += Math.sin(b.a)*6;
                hit = true;
            }
        });
        return !hit && b.life > 0;
    });

    enemies.forEach((e, i) => {
        e.update();
        const eP = toScreen(e.x, e.y);
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(eP.x, eP.y, e.r, 0, Math.PI*2); ctx.fill();
        if(e.hp <= 0) {
            playSound(150, 'sawtooth', 0.2, 0.05);
            state.score += e.val;
            gems.push(new Gem(e.x, e.y));
            for(let j=0; j<6; j++) particles.push(new Particle(e.x, e.y, e.color));
            enemies.splice(i, 1);
        }
    });

    gems = gems.filter(g => {
        const gP = toScreen(g.x, g.y);
        ctx.fillStyle = '#ccff00';
        ctx.beginPath(); ctx.arc(gP.x, gP.y, g.r, 0, Math.PI*2); ctx.fill();
        if(g.update()) {
            player.xp += 25;
            if(player.xp >= player.nextXP) {
                player.lvl++; player.xp = 0; player.nextXP *= 1.25; showUpgrade();
            }
            return false;
        }
        return true;
    });

    particles = particles.filter(p => {
        const pP = toScreen(p.x, p.y);
        ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
        ctx.fillRect(pP.x, pP.y, 3, 3); ctx.globalAlpha = 1;
        p.update(); return p.life > 0;
    });

    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
    document.getElementById('xp-bar').style.width = (player.xp / player.nextXP * 100) + '%';
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('lvlText').innerText = player.lvl;

    if(player.hp <= 0) {
        if(state.score > state.best) localStorage.setItem('neon_best', state.score);
        state.running = false;
        document.getElementById('overlayTitle').innerText = "FATAL ERROR";
        document.getElementById('choices').innerHTML = `<button onclick="location.reload()" style="padding: 15px 40px; background: #ff0055; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">REBOOT SYSTEM</button>`;
        document.getElementById('overlay').style.display = 'flex';
    }

    requestAnimationFrame(loop);
}

spawnLoop();
loop();
</script>
</body>
</html>

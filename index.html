<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SURVIVOR: ZENITH ULTIMATUM</title>
    <style>
        :root { --blue: #00e5ff; --pink: #ff0055; --green: #ccff00; --purple: #bd00ff; --red: #ff3333; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010206; color: #fff; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 1; }
        
        body::after { content: " "; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 200; background-size: 100% 3px, 3px 100%; pointer-events: none; }

        #ui { position: absolute; inset: 20px; pointer-events: none; z-index: 10; display: none; }
        .bar { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        #hp-fill { height: 100%; background: var(--pink); width: 100%; transition: 0.2s; }
        #xp-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.2s; }

        .overlay { position: absolute; inset: 0; background: rgba(1, 2, 6, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; text-align: center; backdrop-filter: blur(10px); }
        .btn { padding: 15px 30px; background: none; border: 1px solid var(--blue); color: var(--blue); cursor: pointer; font-family: inherit; margin: 8px; transition: 0.3s; pointer-events: auto; font-weight: bold; letter-spacing: 2px; }
        .btn:hover { background: var(--blue); color: #000; box-shadow: 0 0 25px var(--blue); transform: scale(1.05); }
        .hardcore-btn { border-color: var(--red); color: var(--red); }
        .hardcore-btn:hover { background: var(--red); color: #000; box-shadow: 0 0 25px var(--red); }

        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--purple); padding: 15px; width: 180px; margin: 8px; cursor: pointer; pointer-events: auto; }
        .card:hover { border-color: var(--green); background: rgba(255,255,255,0.1); }

        #vo-log { position: absolute; bottom: 30px; width: 100%; text-align: center; color: var(--green); font-size: 14px; letter-spacing: 3px; z-index: 50; pointer-events: none; }
        #leaderboard { margin-top: 20px; font-size: 11px; color: #557; border-top: 1px solid #223; padding-top: 10px; width: 300px; }
    </style>
</head>
<body>

<div id="vo-log">>> SYSTEM_READY</div>

<div id="menu-overlay" class="overlay">
    <h1 style="color: var(--blue); font-size: 40px; margin: 0; letter-spacing: 10px;">ZENITH ULTIMATUM</h1>
    <p id="best-score" style="color: var(--purple);">BEST_RECORD: 0</p>
    <button class="btn" onclick="initGame(false)">NORMAL_BOOT</button>
    <button class="btn hardcore-btn" onclick="initGame(true)">HARDCORE_DIRECTIVE [3X XP]</button>
    <div id="leaderboard">
        <b>TOP_NODES</b><br>
        <div id="lb-list">LOADING...</div>
    </div>
</div>

<div id="level-overlay" class="overlay" style="display:none">
    <h2 style="color: var(--green)">EVOLUTION_SELECTED</h2>
    <div id="perk-list" style="display:flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<div id="quest-overlay" class="overlay" style="display:none">
    <h2 id="quest-title" style="color: var(--purple)">TRANSMISSION_INBOUND</h2>
    <p id="quest-text" style="max-width: 450px; line-height: 1.5;"></p>
    <div id="choice-list" style="display:flex"></div>
</div>

<div id="death-overlay" class="overlay" style="display:none">
    <h1 style="color: var(--pink)">CORE_CRITICAL</h1>
    <h2 id="shard-count" style="color: var(--green)">0 💎</h2>
    <div style="display:flex">
        <div class="card" onclick="buyMeta('hp')"><b>+ ARMOR</b><br><span id="cost-hp">100</span> 💎</div>
        <div class="card" onclick="buyMeta('speed')"><b>+ ENGINE</b><br><span id="cost-speed">100</span> 💎</div>
    </div>
    <button class="btn" onclick="location.reload()">REBOOT_SYSTEM</button>
</div>

<div id="ui">
    <div style="color: var(--blue); font-size: 20px;">DATA_SYNC: <span id="scoreText">0</span></div>
    <div id="weapon-tag" style="color: var(--green); font-size: 11px;">MODE: PULSE_LASER</div>
    <div class="bar"><div id="hp-fill"></div></div>
    <div class="bar"><div id="xp-fill"></div></div>
    <div style="font-size: 11px;">LVL <span id="lvlText">1</span> | DIST <span id="distText">0</span>m</div>
</div>

<canvas id="game"></canvas>

<script>
let audio;
function initAudio() {
    if (!audio) {
        audio = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audio && audio.state === 'suspended') {
        audio.resume();
    }
}

const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, player, enemies = [], lasers = [], enemyLasers = [], drones = [], particles = [], stars = [];
let worldDist = 0, lastFire = 0, shake = 0;
let keys = {};

const SAVE_KEY = "zenith_ultimatum_final";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { shards: 0, hpLvl: 0, speedLvl: 0, bestScore: 0 };
let state = { running: false, score: 0, shards: 0, lvl: 1, xp: 0, xpNext: 100, hc: false, mod: 'none', weapon: 'pulse', lastQ: 0 };

const WEAPONS = {
    pulse: { n: "PULSE", rate: 350, dmg: 10, count: 1, color: '#bd00ff' },
    spread: { n: "SPREAD", rate: 550, dmg: 8, count: 3, color: '#ccff00' },
    rail: { n: "RAIL", rate: 1100, dmg: 60, count: 1, color: '#00e5ff' }
};

const QUESTS = [{ 
    d: 1500, 
    t: "AI TERMINAL", 
    m: "Save compromised system files or scavenge reactor components?", 
    c: [
        {t: "SAVE (REFRESH HP)", e: () => { player.hp = player.maxHp; speak("INTEGRITY_RESTORED"); }}, 
        {t: "SCAVENGE (+DMG)", e: () => { player.dmgMult = 2; speak("WEAPONS_OVERCLOCKED"); }}
    ] 
}];

function speak(t) { document.getElementById('vo-log').innerText = `>> ${t}`; }

function sfx(f, t, d, v=0.02) {
    if(!audio) return;
    try {
        let o = audio.createOscillator(), g = audio.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audio.currentTime);
        g.gain.setValueAtTime(v, audio.currentTime); 
        g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
        o.connect(g); g.connect(audio.destination); 
        o.start(); o.stop(audio.currentTime + d);
    } catch(e){}
}

// Initial Leaderboard Generation
function renderLeaderboard() {
    document.getElementById('best-score').innerText = `BEST_RECORD: ${meta.bestScore}`;
    const mockLB = [
        {name: "X_AE_A12", score: Math.max(meta.bestScore * 1.5, 12000)},
        {name: "CYBER_DYNE", score: Math.max(meta.bestScore * 1.1, 8500)},
        {name: "YOU", score: meta.bestScore},
        {name: "NEO_GUEST", score: 500}
    ].sort((a,b) => b.score - a.score);
    
    const lbContainer = document.getElementById('lb-list');
    lbContainer.innerHTML = mockLB.map((entry, index) => `<div>#0${index+1} ${entry.name} - ${Math.floor(entry.score)}</div>`).join('');
}
renderLeaderboard();

function initGame(hc) {
    initAudio();
    state.hc = hc;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    
    player = { 
        x: 100, 
        y: h/2, 
        hp: hc ? 1 : (100 + meta.hpLvl*20), 
        maxHp: hc ? 1 : (100 + meta.hpLvl*20), 
        speed: 4 + meta.speedLvl*0.5, 
        dmgMult: 1, 
        r: 15 
    };
    
    for(let i=0; i<60; i++) stars.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*2 + 1});
    state.running = true;
    speak(hc ? "HARDCORE_DIRECTIVE_ENGAGED" : "NEURAL_LINK_STABLE");
    if(hc) document.body.style.filter = "contrast(1.2) saturate(1.5) hue-rotate(-20deg)";
    
    setInterval(spawn, 1000);
    requestAnimationFrame(loop);
}

function buyMeta(type) {
    let cost = 100;
    if(type === 'hp' && meta.shards >= cost) {
        meta.shards -= cost; meta.hpLvl++;
    } else if(type === 'speed' && meta.shards >= cost) {
        meta.shards -= cost; meta.speedLvl++;
    } else {
        sfx(150, 'sawtooth', 0.2, 0.05);
        return;
    }
    localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
    sfx(600, 'sine', 0.3);
    document.getElementById('shard-count').innerText = `${meta.shards} 💎`;
}

function spawn() {
    if(!state.running || document.getElementById('level-overlay').style.display === 'flex' || document.getElementById('quest-overlay').style.display === 'flex') return;
    const isBoss = worldDist > 5000 && !enemies.some(e=>e.boss);
    if(isBoss) {
        enemies.push({ x: w+100, y: h/2, hp: 1000, maxHp: 1000, r: 50, s: 0.5, boss: true, color: '#ff0055', lastS: 0 });
        speak("ZENITH_GUARDIAN_DETECTED");
        sfx(100, 'sawtooth', 1.0, 0.1);
    } else {
        const type = Math.random();
        enemies.push({ 
            x: w+50, 
            y: Math.random()*(h-40) + 20, 
            hp: 15 + (worldDist/500), 
            r: type>0.8 ? 18 : 12, 
            s: 2.5+(worldDist/3000), 
            color: type>0.8?'#bd00ff':'#00e5ff', 
            type: type>0.8?'shooter':'chaser', 
            lastS: 0 
        });
    }
}

function triggerQuest(q) {
    state.running = false;
    const qOverlay = document.getElementById('quest-overlay');
    document.getElementById('quest-title').innerText = q.t;
    document.getElementById('quest-text').innerText = q.m;
    const cList = document.getElementById('choice-list');
    cList.innerHTML = '';
    q.c.forEach(choice => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.innerText = choice.t;
        b.onclick = () => {
            choice.e();
            qOverlay.style.display = 'none';
            state.running = true;
            requestAnimationFrame(loop);
        };
        cList.appendChild(b);
    });
    qOverlay.style.display = 'flex';
}

function triggerLevelUp() {
    state.running = false;
    const lvlOverlay = document.getElementById('level-overlay');
    const pList = document.getElementById('perk-list');
    pList.innerHTML = '';
    
    const available = [
        {t: "MODE: SPREAD_LASER", e: () => state.weapon = 'spread'},
        {t: "MODE: RAIL_GUN", e: () => state.weapon = 'rail'},
        {t: "REPAIR NANITES (+25 HP)", e: () => player.hp = Math.min(player.maxHp, player.hp + 25)},
        {t: "OVERCLOCK REACTION (+10% SPD)", e: () => player.speed *= 1.1}
    ];

    // Pick 3 random options
    for(let i=0; i<3; i++) {
        let choice = available[Math.floor(Math.random()*available.length)];
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<b>UPGRADE</b><br><small>${choice.t}</small>`;
        card.onclick = () => {
            choice.e();
            document.getElementById('weapon-tag').innerText = `MODE: ${WEAPONS[state.weapon].n}`;
            lvlOverlay.style.display = 'none';
            state.running = true;
            requestAnimationFrame(loop);
        };
        pList.appendChild(card);
    }
    lvlOverlay.style.display = 'flex';
}

function handleDeath() {
    state.running = false;
    if(state.score > meta.bestScore) meta.bestScore = state.score;
    meta.shards += Math.floor(state.shards);
    localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
    
    document.getElementById('shard-count').innerText = `${meta.shards} 💎`;
    document.getElementById('death-overlay').style.display = 'flex';
    document.getElementById('ui').style.display = 'none';
    sfx(80, 'sawtooth', 1.5, 0.1);
}

function loop() {
    if(!state.running) return;
    
    // Clear & Screen Shake Transform logic
    ctx.fillStyle = "rgba(1, 2, 6, 0.3)";
    ctx.fillRect(0,0,w,h);
    
    ctx.save();
    if (shake > 0) {
        let dx = (Math.random() - 0.5) * shake;
        let dy = (Math.random() - 0.5) * shake;
        ctx.translate(dx, dy);
        shake *= 0.9;
    }

    worldDist += 1;
    document.getElementById('distText').innerText = worldDist;

    // Quest System Link Check
    if(QUESTS[0] && worldDist >= QUESTS[0].d && state.lastQ < QUESTS[0].d) {
        state.lastQ = QUESTS[0].d;
        triggerQuest(QUESTS.shift());
        ctx.restore();
        return;
    }

    // Interactive Starfield Rendering Loop
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        s.x -= s.s;
        if(s.x < 0) s.x = w;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    });

    // Control Schemes Map
    let vy = 0; 
    if(keys['KeyW'] || keys['ArrowUp']) vy = -1; 
    if(keys['KeyS'] || keys['ArrowDown']) vy = 1;
    player.y = Math.max(20, Math.min(h-20, player.y + vy * player.speed));

    // Player Rendering Profile
    ctx.shadowBlur = 15;
    ctx.shadowColor = varColor('--blue');
    ctx.fillStyle = varColor('--blue');
    ctx.beginPath();
    ctx.moveTo(player.x + 20, player.y);
    ctx.lineTo(player.x - 10, player.y - 12);
    ctx.lineTo(player.x - 10, player.y + 12);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Automated Weapons Combat Deployment Loop
    const wp = WEAPONS[state.weapon];
    let now = Date.now();
    if(now - lastFire > wp.rate) {
        lastFire = now;
        sfx(440, 'triangle', 0.1, 0.03);
        if(wp.count === 1) {
            lasers.push({x: player.x + 20, y: player.y, vx: 12, vy: 0, dmg: wp.dmg * player.dmgMult, color: wp.color, r: wp.n === "RAIL"? 5 : 3});
        } else {
            for(let i=0; i<wp.count; i++) {
                lasers.push({x: player.x + 20, y: player.y, vx: 11, vy: (i - 1) * 2.5, dmg: wp.dmg * player.dmgMult, color: wp.color, r: 3});
            }
        }
    }

    // Projectile Vectors Evaluation Matrix
    lasers.forEach((l, li) => {
        l.x += l.vx; l.y += l.vy;
        ctx.fillStyle = l.color;
        ctx.beginPath(); ctx.arc(l.x, l.y, l.r, 0, Math.PI*2); ctx.fill();
        if(l.x > w) lasers.splice(li, 1);
    });

    // Threat Logic Deployment Engine Loop
    enemies.forEach((e, ei) => {
        e.x -= e.s;
        
        // Custom Enemy Subroutine Handling
        if(e.type === 'shooter' && !e.boss) {
            e.y += Math.sin(worldDist/20) * 1.5;
            if(now - e.lastS > 2000) {
                e.lastS = now;
                enemyLasers.push({x: e.x, y: e.y, vx: -6, vy: 0});
            }
        } else if(e.boss) {
            e.y = (h/2) + Math.sin(worldDist/50) * (h/3);
            if(now - e.lastS > 800) {
                e.lastS = now;
                enemyLasers.push({x: e.x, y: e.y, vx: -7, vy: (Math.random() - 0.5) * 4});
            }
        }

        // Hostile Component Paint Profile
        ctx.fillStyle = e.color;
        ctx.shadowBlur = 10; ctx.shadowColor = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Player Impact Calculations
        let distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
        if(distToPlayer < e.r + player.r) {
            player.hp -= e.boss ? 50 : 20;
            shake = 15;
            enemies.splice(ei, 1);
            sfx(120, 'sawtooth', 0.3, 0.08);
            document.getElementById('hp-fill').style.width = `${Math.max(0, (player.hp/player.maxHp)*100)}%`;
            if(player.hp <= 0) handleDeath();
        }

        // Damage Collision Array Map Verification Loop
        lasers.forEach((l, li) => {
            if(Math.hypot(l.x - e.x, l.y - e.y) < e.r + l.r) {
                e.hp -= l.dmg;
                lasers.splice(li, 1);
                // Create damage splash particles
                for(let p=0; p<4; p++) particles.push({x: e.x, y: e.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 20, color: e.color});
                
                if(e.hp <= 0) {
                    sfx(200, 'square', 0.15, 0.04);
                    let payout = e.boss ? 500 : 15;
                    let xpGained = e.boss ? 300 : 25;
                    if(state.hc) xpGained *= 3;

                    state.score += payout;
                    state.shards += e.boss ? 15 : (Math.random() > 0.7 ? 1 : 0);
                    state.xp += xpGained;
                    
                    document.getElementById('scoreText').innerText = Math.floor(state.score);
                    enemies.splice(ei, 1);

                    // Check Progression Caps
                    if(state.xp >= state.xpNext) {
                        state.lvl++;
                        state.xp -= state.xpNext;
                        state.xpNext = Math.floor(state.xpNext * 1.4);
                        document.getElementById('lvlText').innerText = state.lvl;
                        sfx(880, 'sine', 0.5, 0.06);
                        triggerLevelUp();
                    }
                    document.getElementById('xp-fill').style.width = `${(state.xp/state.xpNext)*100)}%`;
                }
            }
        });

        if(e.x < -100) enemies.splice(ei, 1);
    });

    // Hazard Projectiles Array Logic Mapping Loop
    enemyLasers.forEach((el, eli) => {
        el.x += el.vx; el.y += el.vy;
        ctx.fillStyle = varColor('--pink');
        ctx.beginPath(); ctx.arc(el.x, el.y, 4, 0, Math.PI*2); ctx.fill();

        if(Math.hypot(el.x - player.x, el.y - player.y) < player.r + 4) {
            player.hp -= state.hc ? 1 : 15;
            shake = 8;
            enemyLasers.splice(eli, 1);
            sfx(110, 'sawtooth', 0.2, 0.07);
            document.getElementById('hp-fill').style.width = `${Math.max(0, (player.hp/player.maxHp)*100)}%`;
            if(player.hp <= 0) handleDeath();
        }
        if(el.x < -20) enemyLasers.splice(eli, 1);
    });

    // Splash Particles Tracking Execution
    particles.forEach((p, pi) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
        if(p.life <= 0) particles.splice(pi, 1);
    });

    ctx.restore();
    requestAnimationFrame(loop);
}

function varColor(name) {
    if(name === '--blue') return '#00e5ff';
    if(name === '--pink') return '#ff0055';
    return '#fff';
}

window.addEventListener('keydown', e => { keys[e.code] = true; initAudio(); });
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('resize', () => { if(state.running) { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }});
</script>

</body>
</html>

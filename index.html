<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SURVIVOR: ROGUE BOSS EDITION</title>
    <style>
        body { margin: 0; background: #02040a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; inset: 20px; pointer-events: none; z-index: 10; }
        .bar-container { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0 15px 0; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; transition: width 0.3s; }
        #xp-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #00ffaa); width: 0%; transition: width 0.3s; }
        
        #boss-ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; }
        .boss-bar-bg { width: 60vw; height: 12px; background: rgba(255,0,85,0.2); border: 1px solid #ff0055; border-radius: 6px; overflow: hidden; }
        #boss-hp-fill { height: 100%; background: #ff0055; box-shadow: 0 0 15px #ff0055; width: 100%; transition: width 0.1s; }

        #overlay, #shop-overlay { position: absolute; inset: 0; background: rgba(2, 4, 10, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; z-index: 100; }
        .card { background: #0a0f1e; border: 2px solid #00e5ff; padding: 20px; margin: 10px; width: 240px; cursor: pointer; text-align: center; border-radius: 15px; transition: 0.3s; }
        .card:hover:not(.disabled) { background: #00e5ff; color: #000; transform: translateY(-5px); box-shadow: 0 0 20px #00e5ff; }
        .disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; }
        
        button { padding: 15px 40px; background: #00e5ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        h1 { margin: 0 0 20px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 32px; font-weight: bold; color: #00e5ff;">SCORE: <span id="scoreText">0</span></div>
    <div style="font-size: 14px; color: #ccff00;">SHARDS: <span id="shardText">0</span></div>
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div style="font-size: 12px;">LEVEL <span id="lvlText">1</span></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
</div>

<div id="boss-ui">
    <div style="color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 4px;">NEON WARDEN</div>
    <div class="boss-bar-bg"><div id="boss-hp-fill"></div></div>
</div>

<div id="overlay">
    <h1 style="color:#00e5ff">AUGMENT SYSTEM</h1>
    <div id="choices" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<div id="shop-overlay">
    <h1 style="color:#ccff00">TOTAL SHARDS: <span id="totalShards">0</span></h1>
    <p>Install permanent hardware upgrades</p>
    <div id="shop-items" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
    <button onclick="location.reload()" style="margin-top:20px">INITIATE RUN</button>
</div>

<canvas id="game"></canvas>

<script>
// --- DATA PERSISTENCE ---
const SAVE_KEY = "neon_survivor_final";
let meta = JSON.parse(localStorage.getItem(SAVE_KEY)) || { 
    shards: 0, 
    upgrades: { hp: 0, dmg: 0, speed: 0 } 
};
function saveMeta() { localStorage.setItem(SAVE_KEY, JSON.stringify(meta)); }

// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, t, d, v=0.05) {
    if(audioCtx.state === 'suspended') return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

// --- SETUP ---
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
let w, h, cX, cY;
function resize() { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
    cX = w/2; cY = h/2; 
}
window.onresize = resize; resize();

const state = { running: true, score: 0, shards: 0, time: 0, shake: 0, bossActive: false };
const keys = {};
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; audioCtx.resume(); };
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

// --- CLASSES ---
class Player {
    constructor() {
        this.x = 0; this.y = 0; this.r = 15;
        this.speed = 4.5 + (meta.upgrades.speed * 0.5);
        this.maxHp = 100 + (meta.upgrades.hp * 25);
        this.hp = this.maxHp;
        this.bulletDmg = 35 + (meta.upgrades.dmg * 10);
        this.xp = 0; this.nextXP = 100; this.lvl = 1;
        this.fireRate = 450; this.lastShot = 0; this.bulletCount = 1;
    }
    update() {
        let mx = 0, my = 0;
        if(keys['w']) my--; if(keys['s']) my++;
        if(keys['a']) mx--; if(keys['d']) mx++;
        const mag = Math.hypot(mx, my) || 1;
        this.x += (mx/mag)*this.speed; this.y += (my/mag)*this.speed;
        if(Date.now() - this.lastShot > this.fireRate) this.shoot();
    }
    shoot() {
        const target = enemies.reduce((p, c) => {
            const d = Math.hypot(c.x-this.x, c.y-this.y);
            return d < p.dist ? {o:c, dist:d} : p;
        }, {o:null, dist:900}).o;
        if(!target) return;
        this.lastShot = Date.now();
        playSfx(600, 'sine', 0.1);
        const a = Math.atan2(target.y-this.y, target.x-this.x);
        for(let i=0; i<this.bulletCount; i++) {
            bullets.push(new Bullet(this.x, this.y, a + (i-(this.bulletCount-1)/2)*0.2, this.bulletDmg, true));
        }
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type; this.kbX = 0; this.kbY = 0; this.lastShot = 0;
        const cfg = {
            grunt: { r:18, hp:70, s:2.5, c:'#ff0055', isBoss: false },
            sniper: { r:16, hp:50, s:1.5, c:'#ffee00', isBoss: false },
            boss: { r:60, hp:2000 + (player.lvl * 500), s:1, c:'#ff0055', isBoss: true, maxHp: 2000 + (player.lvl * 500) }
        };
        Object.assign(this, cfg[type]);
    }
    update() {
        const dist = Math.hypot(player.x-this.x, player.y-this.y);
        const a = Math.atan2(player.y-this.y, player.x-this.x);
        
        if(this.isBoss && state.time % 100 === 0) {
            for(let i=0; i<12; i++) bullets.push(new Bullet(this.x, this.y, (Math.PI*2/12)*i, 15, false));
            playSfx(100, 'square', 0.4);
        } else if(this.type === 'sniper' && dist < 400) {
            if(Date.now() - this.lastShot > 2000) {
                bullets.push(new Bullet(this.x, this.y, a, 15, false));
                this.lastShot = Date.now();
            }
        } else {
            this.x += Math.cos(a)*this.speed + this.kbX;
            this.y += Math.sin(a)*this.speed + this.kbY;
        }
        
        this.kbX *= 0.8; this.kbY *= 0.8;
        if(dist < this.r + player.r) { player.hp -= 0.5; state.shake = 5; }
    }
}

class Bullet {
    constructor(x,y,a,d,isPlayer) {
        this.x=x; this.y=y; this.a=a; this.d=d; this.isP=isPlayer;
        this.s = isPlayer ? 15 : 6; this.life = 100;
    }
    update() {
        this.x += Math.cos(this.a)*this.s; this.y += Math.sin(this.a)*this.s; this.life--;
        if(!this.isP && Math.hypot(this.x-player.x, this.y-player.y) < player.r) {
            player.hp -= 10; state.shake = 15; this.life = 0;
            playSfx(80, 'sawtooth', 0.2);
        }
    }
}

class Shard { 
    constructor(x,y,v=25) { this.x=x; this.y=y; this.v=v; } 
    update() {
        const d = Math.hypot(player.x-this.x, player.y-this.y);
        if(d < 180) { this.x+=(player.x-this.x)*0.15; this.y+=(player.y-this.y)*0.15; }
        return d < 20;
    }
}

// --- GAME CONTROLLER ---
const player = new Player();
let bullets = [], enemies = [], shards = [];

function spawn() {
    if(!state.running || state.bossActive) return;
    const a = Math.random()*Math.PI*2;
    const x = player.x + Math.cos(a)*w, y = player.y + Math.sin(a)*h;
    enemies.push(new Enemy(x, y, Math.random() < 0.25 ? 'sniper' : 'grunt'));
    setTimeout(spawn, Math.max(200, 1100 - state.time/10));
}

function checkBoss() {
    if(player.lvl % 3 === 0 && !state.bossActive) {
        state.bossActive = true;
        enemies = [new Enemy(player.x, player.y - 500, 'boss')];
        document.getElementById('boss-ui').style.display = 'flex';
        playSfx(50, 'sawtooth', 1, 0.2);
    }
}

function showUpgrade() {
    state.running = false;
    document.getElementById('overlay').style.display = 'flex';
    const choices = document.getElementById('choices'); choices.innerHTML = '';
    const pool = [
        { n: "RAPID PULSE", d: "-Fire Rate", f: () => player.fireRate *= 0.8 },
        { n: "SPLIT BEAM", d: "+1 Projectile", f: () => player.bulletCount++ },
        { n: "EMERGENCY REPAIR", d: "Heal 50% HP", f: () => player.hp = Math.min(player.maxHp, player.hp + player.maxHp/2) },
        { n: "OVERCHARGE", d: "+Damage", f: () => player.bulletDmg += 20 }
    ];
    pool.sort(()=>Math.random()-0.5).slice(0,3).forEach(u => {
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<h3>${u.n}</h3><p>${u.d}</p>`;
        c.onclick = () => { u.f(); document.getElementById('overlay').style.display='none'; state.running=true; loop(); };
        choices.appendChild(c);
    });
}

function showShop() {
    state.running = false;
    document.getElementById('shop-overlay').style.display = 'flex';
    document.getElementById('totalShards').innerText = meta.shards;
    const sItems = document.getElementById('shop-items'); sItems.innerHTML = '';
    const metaPool = [{id:'hp',n:'INTEGRITY'},{id:'dmg',n:'VOLTAGE'},{id:'speed',n:'THRUST'}];
    metaPool.forEach(u => {
        const cost = 25 * (meta.upgrades[u.id] + 1);
        const c = document.createElement('div'); 
        c.className = `card ${meta.shards < cost ? 'disabled' : ''}`;
        c.innerHTML = `<h3>${u.n}</h3><p>Lvl: ${meta.upgrades[u.id]}</p><p>Cost: ${cost} Shards</p>`;
        c.onclick = () => { if(meta.shards >= cost){ meta.shards-=cost; meta.upgrades[u.id]++; saveMeta(); showShop(); } };
        sItems.appendChild(c);
    });
}

function loop() {
    if(!state.running) return;
    state.time++; 
    ctx.fillStyle = '#02040a'; ctx.fillRect(0,0,w,h);
    let sx = (Math.random()-0.5)*state.shake, sy = (Math.random()-0.5)*state.shake; state.shake *= 0.9;
    const toS = (x,y) => ({ x: x-player.x+cX+sx, y: y-player.y+cY+sy });

    // Grid
    ctx.strokeStyle = '#0a1020';
    for(let x=-player.x%100; x<w; x+=100) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=-player.y%100; y<h; y+=100) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

    player.update();
    const pS = toS(player.x, player.y);
    ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
    ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.arc(pS.x, pS.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    bullets = bullets.filter(b => {
        b.update(); const bS = toS(b.x, b.y);
        ctx.fillStyle = b.isP ? '#fff' : '#ffee00';
        ctx.beginPath(); ctx.arc(bS.x, bS.y, 4, 0, Math.PI*2); ctx.fill();
        if(b.isP) enemies.forEach(e => { if(Math.hypot(b.x-e.x, b.y-e.y) < e.r){ e.hp -= b.d; b.life=0; } });
        return b.life > 0;
    });

    enemies.forEach((e, i) => {
        e.update(); const eS = toS(e.x, e.y);
        ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(eS.x, eS.y, e.r, 0, Math.PI*2); ctx.fill();
        if(e.isBoss) document.getElementById('boss-hp-fill').style.width = (e.hp/e.maxHp*100)+'%';
        if(e.hp <= 0) {
            if(e.isBoss) { state.bossActive = false; document.getElementById('boss-ui').style.display = 'none'; spawn(); player.xp += 400; }
            state.score += e.isBoss ? 1500 : 100; 
            shards.push(new Shard(e.x, e.y, e.isBoss ? 150 : 30));
            enemies.splice(i, 1); playSfx(100, 'sine', 0.1);
        }
    });

    shards = shards.filter(s => {
        const sS = toS(s.x, s.y); ctx.fillStyle = '#ccff00'; ctx.beginPath(); ctx.arc(sS.x, sS.y, 6, 0, Math.PI*2); ctx.fill();
        if(s.update()){ 
            state.shards++; player.xp += s.v; 
            if(player.xp >= player.nextXP){ 
                player.lvl++; player.xp=0; player.nextXP*=1.25; 
                checkBoss(); showUpgrade(); 
            }
            return false;
        } return true;
    });

    document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
    document.getElementById('xp-bar').style.width = (player.xp/player.nextXP*100)+'%';
    document.getElementById('scoreText').innerText = state.score;
    document.getElementById('shardText').innerText = state.shards;
    document.getElementById('lvlText').innerText = player.lvl;

    if(player.hp <= 0) { meta.shards += state.shards; saveMeta(); showShop(); }
    else requestAnimationFrame(loop);
}

spawn(); loop();
    // --- INITIALIZE ---
const player = new Player();
const enemies = [];
const bullets = [];
const shards = [];

function spawnEnemy() {
    if (state.bossActive) return;
    const angle = Math.random() * Math.PI * 2;
    const dist = 600;
    const x = player.x + Math.cos(angle) * dist;
    const y = player.y + Math.sin(angle) * dist;
    const type = Math.random() > 0.8 ? 'sniper' : 'grunt';
    enemies.push(new Enemy(x, y, type));
}

// --- MAIN LOOP ---
function loop() {
    if (!state.running) return;

    // 1. Clear Screen
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, w, h);

    // 2. Camera Shake & Follow
    ctx.save();
    if (state.shake > 0) {
        ctx.translate(Math.random() * state.shake, Math.random() * state.shake);
        state.shake *= 0.9;
    }
    ctx.translate(w/2 - player.x, h/2 - player.y);

    // 3. Update & Draw Player
    player.update();
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00e5ff';

    // 4. Handle Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.update();
        ctx.fillStyle = b.isP ? '#00e5ff' : '#ff0055';
        ctx.fillRect(b.x, b.y, 4, 4);
        if (b.life <= 0) bullets.splice(i, 1);
    }

    // 5. Handle Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.update();
        
        // Draw Enemy
        ctx.fillStyle = e.c;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
        ctx.fill();

        // Bullet Collision
        bullets.forEach(b => {
            if (b.isP && Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                e.hp -= b.d;
                b.life = 0;
            }
        });

        if (e.hp <= 0) {
            state.score += e.isBoss ? 1000 : 10;
            document.getElementById('scoreText').innerText = state.score;
            enemies.splice(i, 1);
        }
    }

    ctx.restore();

    // 6. UI Updates
    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    
    state.time++;
    if (state.time % 60 === 0) spawnEnemy();

    requestAnimationFrame(loop);
}

// Start Game
loop();
</script>
<script>
// --- INITIALIZATION ---
const player = new Player();
const enemies = [];
const bullets = [];
const shards = [];

// --- SPAWN LOGIC ---
function spawnEnemy() {
    if (state.bossActive && enemies.some(e => e.isBoss)) return;
    
    // Calculate a position outside the screen
    const angle = Math.random() * Math.PI * 2;
    const dist = 700; 
    const x = player.x + Math.cos(angle) * dist;
    const y = player.y + Math.sin(angle) * dist;
    
    // Spawn Boss every 5000 points
    if (state.score > 0 && state.score % 5000 === 0 && !state.bossActive) {
        state.bossActive = true;
        enemies.push(new Enemy(x, y, 'boss'));
        document.getElementById('boss-ui').style.display = 'flex';
    } else {
        const type = Math.random() > 0.8 ? 'sniper' : 'grunt';
        enemies.push(new Enemy(x, y, type));
    }
}

// --- CORE RENDER ENGINE ---
function loop() {
    if (!state.running) return;

    // 1. Clean Canvas
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, w, h);

    // 2. Camera Viewport (Follow Player)
    ctx.save();
    ctx.translate(w/2 - player.x, h/2 - player.y);

    // 3. Draw Background Grid (So you can see movement)
    ctx.strokeStyle = "rgba(0, 229, 255, 0.05)";
    for(let i = -2000; i < 2000; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    // 4. Update & Draw Player
    player.update();
    ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
    ctx.fill();

    // 5. Update & Draw Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.update();
        
        ctx.fillStyle = e.c;
        ctx.shadowColor = e.c;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
        ctx.fill();

        // Check Collision with Player Bullets
        bullets.forEach(b => {
            if (b.isP && Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                e.hp -= b.d;
                b.life = 0;
                if(e.isBoss) {
                    document.getElementById('boss-hp-fill').style.width = (e.hp / e.maxHp * 100) + "%";
                }
            }
        });

        if (e.hp <= 0) {
            if(e.isBoss) {
                state.bossActive = false;
                document.getElementById('boss-ui').style.display = 'none';
            }
            state.score += e.isBoss ? 1000 : 25;
            document.getElementById('scoreText').innerText = state.score;
            enemies.splice(i, 1);
        }
    }

    // 6. Update & Draw Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.update();
        ctx.fillStyle = b.isP ? '#00e5ff' : '#ff0055';
        ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
        if (b.life <= 0) bullets.splice(i, 1);
    }

    ctx.restore();

    // 7. Update UI & Timing
    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    state.time++;
    if (state.time % 100 === 0) spawnEnemy();

    requestAnimationFrame(loop);
}

// Start the game loop
loop();
</script>
</body>
</html>
